help_channelhacks: "🔹 `{i} शिफ्ट <चॅनेल वरून> |<चॅनेल> `\n     हे चॅनेल ए वरून चॅनेल बी वर सर्व जुनी पोस्ट हस्तांतरित करेल.\n      (आपण चॅनेलचा वापरकर्तानाव किंवा आयडी देखील वापरू शकता)\n      उदाहरणः `{i} शिफ्ट @एबीसी |@xyz`\n      [टीप - हे ('|') चिन्ह नेससेरी आहे]\n\nSource कोणत्याही स्त्रोत चॅनेलवरून कोणत्याही गंतव्य चॅनेलवर ऑटो-पोस्टिंग/सर्व नवीन संदेश अग्रेषित करण्यासाठी.\n\n   `{i} asource <चॅनेल वापरकर्तानाव किंवा आयडी>`\n      हे डेटाबेसमध्ये स्त्रोत चॅनेल जोडा\n   `{i} dsource <चॅनेल वापरकर्तानाव किंवा आयडी>`\n      हे डेटाबेसमधून स्त्रोत चॅनेल काढून टाका\n   `{i} listsource <चॅनेल वापरकर्तानाव किंवा आयडी>`\n      स्त्रोत चॅनेलची यादी दर्शवा\n\n\n   `{i} adest <चॅनेल वापरकर्तानाव किंवा आयडी>`\n      हे डेटाबेसमध्ये उर चॅनेल जोडा\n   `{i} ddest <चॅनेल वापरकर्तानाव किंवा आयडी>`\n      हे डेटाबेसमधून आपले चॅनेल काढून टाका\n   `{i} listdest <चॅनेल वापरकर्तानाव किंवा आयडी>`\n      आपल्या चॅनेलची यादी दर्शवा\n\n   'आपण डेटाबेसमध्ये बर्‍याच चॅनेल सेट करू शकता'\n   'ऑटो-पोस्ट वापरण्यासाठी `{i} setDB ऑटोपोस्ट ट्रू' 'वापरा"
