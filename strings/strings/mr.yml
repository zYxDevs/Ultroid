help_admintools: "अदृष्यतेची रूपरेषा\n\n``. प्रोमोट <वापरकर्ता/वापरकर्ता/वापरकर्तानाव प्रत्युत्तर द्या> `\n`` .डेमोटे\n    चॅटमध्ये वापरकर्त्यास प्रोत्साहन/डिमोट करा.\n\n.\n`` .अनबान`\n    चॅटमधून वापरकर्त्यास बंदी/बंदी द्या.\n\n.\n    चॅटमधून वापरकर्त्यास लाथ मारा.\n\n`` .Pin <संदेशास प्रत्युत्तर द्या> `\n    गप्पांमध्ये संदेश पिन करा\n`` .Tpin <Time> <टेम्प पिन संदेश> `\n. `.अनपिन (सर्व) <संदेशास प्रत्युत्तर द्या>`\n    गप्पांमध्ये संदेश अनपिन करा.\n\n. `.पिन्डेड`\n   सध्याच्या चॅटमध्ये पिन केलेला संदेश मिळवा.\n`` .लिस्टपिनडेड\n   सध्याच्या चॅटमध्ये सर्व पिन केलेले संदेश मिळवा\n\n.\n   चॅटमध्ये ऑटो हटवा सक्षम करा.\n\n. `.पर्जे <संदेशास प्रत्युत्तर द्या>`\n    प्रत्युत्तर दिलेल्या संदेशावरील सर्व संदेश शुद्ध करा.\n\n.\n    प्रत्युत्तर दिलेल्या संदेशावरील केवळ आपले संदेश पुसून टाका.\n\n\n    प्रत्युत्तरित वापरकर्त्याचे सर्व एमएसजी हटवा."
help_specialtools: "अदृष्यतेची रूपरेषा\n\n.\n    गुप्त संदेश पाठवा ..\n\n.\n.\n.\n.\n    कोट तयार करा ..\n\n. `{i} स्टिकर <क्वेरी>`\n    आपल्या इच्छेनुसार स्टिकर्स शोधा ..\n\n.\n    आपल्या इच्छित व्हिडिओ/जीआयएफमध्ये ठेवण्यासाठी ऑडिओ डाउनलोड करा.\n\n.\n    हे वरील ऑडिओ प्रत्युत्तर दिलेल्या व्हिडिओ/जीआयएफवर ठेवेल.\n\n. `{i} dob <जन्माची तारीख>`\n    केवळ डीडी/एमएम/वायवाय स्वरूपात ठेवा (उदा. डीओबी 01/01/1999).\n\n. `{i} भिंत <क्वेरी>`\n    आपल्या इच्छेनुसार एचडी वॉलपेपर शोधा .."
