help_devtools: "अदृष्यतेची रूपरेषा\n\n.\n`` {i} बॅश -सी <सेमीडीएस> condun कमांड आउटपुट म्हणून कार्बन प्रतिमा.\n    टेलीग्रामवर लिनक्स कमांड चालवा.\n\n.\n    टेलिग्राम वर पायथन कमांडचे मूल्यांकन करा.\n    शॉर्टकट:\n        क्लायंट = बॉट = इव्हेंट.क्लिएंट\n        ई = इव्हेंट\n        पी = प्रिंट\n        प्रत्युत्तर = इव्हेंटची प्रतीक्षा करा. get_reply_message ()\n        CHAT = event.chat_id\n\n.\n    टेलीग्राममधून सी ++ कोड चालवा.\n\n. `{i} sysinfo`\n    सिस्टम माहिती दर्शविते."
