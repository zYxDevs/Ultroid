help_ziptools: ".\n    प्रत्युत्तर दिलेली फाईल झिप करा\n    झिप वर संकेतशब्द सेट करण्यासाठी: `{i} झिप <संकेतशब्द>` फाईलला प्रत्युत्तर द्या\n\n. `{i} अनझिप <झिप फाइलला प्रत्युत्तर द्या>`\n    प्रत्युत्तर दिलेली फाईल अनझिप करा.\n\n.\n   बॅच अपलोड झिपसाठी बॅचमध्ये फाइल जोडा\n\n.\n   बॅच झिप अपलोड करा आपण `{i} अझिपमधून जोडलेल्या फायली\n   संकेतशब्द सेट करण्यासाठी: `{i} डोझिप <संकेतशब्द>`"
help_logo: "अदृष्यतेची रूपरेषा\n\n. `{i} लोगो <मजकूर>`\n   दिलेल्या मजकूराचा लोगो व्युत्पन्न करा\n   किंवा प्रतिमेला प्रत्युत्तर द्या, त्यावर आपला मजकूर लिहिण्यासाठी.\n   किंवा त्या फॉन्टसह लिहिण्यासाठी फॉन्ट फाईलला प्रत्युत्तर द्या."
