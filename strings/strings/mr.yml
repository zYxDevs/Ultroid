help_core: "अदृष्यतेची रूपरेषा\n\n. `{i} स्थापित <प्लगइनला प्रत्युत्तर द्या>`\n    प्लगइन स्थापित करण्यासाठी,\n  `{i} स्थापित करा f`\n    स्थापित करणे.\n\n. `{i} विस्थापित <प्लगइन नाव>`\n    प्लगइन अनलोड आणि काढण्यासाठी.\n\n. `{i} लोड <प्लगइन नाव>`\n    अनलोड केलेले अनधिकृत प्लगइन लोड करण्यासाठी.\n\n. `{i} अनलोड <प्लगइन नाव>`\n    अनधिकृत प्लगइन अनलोड करण्यासाठी.\n\n. `{i} मदत <प्लगइन नाव>`\n    प्रत्येक प्लगइनसाठी आपल्याला एक मदत मेनू (यासारख्या) दर्शवितो.\n\n.\n    दिलेल्या कच्च्या दुव्यावरून प्लगइन लोड करा."
