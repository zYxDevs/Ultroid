help_stickertools: "अदृष्यतेची रूपरेषा\n\n`` {i} नष्ट करा <अ‍ॅनिमेटेड स्टिकरला प्रत्युत्तर द्या> `\n    स्टिकर नष्ट करण्यासाठी.\n\n. `{i} लहान <मीडियाला प्रत्युत्तर द्या>`\n    लहान स्टिकर्स तयार करण्यासाठी.\n\n. `{i} कांग <प्रतिमा/स्टिकरला प्रत्युत्तर द्या>`\n    कांग स्टिकर (आपल्या पॅकमध्ये जोडा).\n\n.\n    कांग संपूर्ण स्टिकर सेट (सानुकूल नावासह).\n\n. `{मी} गोल <कोणत्याही माध्यमांना प्रत्युत्तर द्या>`\n    गोल स्टिकर काढण्यासाठी."
