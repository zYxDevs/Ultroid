help_fedutils: "अदृष्यतेची रूपरेषा\n\n.\n    आपण प्रशासक असलेल्या सर्व फीड्समधील व्यक्तीला फबन करा.\n\n.\n    आपण प्रशासक असलेल्या सर्व फीड्समधील व्यक्तीला अन-फबन करा.\n\nसहाय्यकात वगळण्यासाठी एफबीएन गट आणि फीड्स निर्दिष्ट करा.\n\n.\n    गुलाब मधील व्यक्तीचे फेड स्टेट गोळा करा.\n\n.\n    गुलाबकडून दिलेल्या फेड आयडीची किंवा आपल्या मालकीच्या फेडची फेडरेशनची माहिती गोळा करा."
