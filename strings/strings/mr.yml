help_imagetools: "अदृष्यतेची रूपरेषा\n\n. `{i} सीमा <फोटो/स्टिकरला प्रत्युत्तर द्या>`\n    त्या माध्यमांभोवती सीमा तयार करण्यासाठी ..\n    माजी - `{i} सीमा 12,22,23`\n       - `{i} सीमा 12,22,23; रुंदी (संख्या) `\n\n. `{i} ग्रे <कोणत्याही माध्यमांना प्रत्युत्तर द्या>`\n    ते ब्लॅक एन डी व्हाइट बनविण्यासाठी.\n\n. `{i} रंग <कोणत्याही ब्लॅक एनडी व्हाइट मीडियाला प्रत्युत्तर द्या>`\n    ते रंगीबेरंगी करण्यासाठी.\n\n`` {मी} टून <कोणत्याही माध्यमांना प्रत्युत्तर द्या>\n    ते टून करण्यासाठी.\n\n.\n    ते धोकादायक दिसण्यासाठी.\n\n. `{मी} नकारात्मक <कोणत्याही माध्यमांना प्रत्युत्तर द्या>`\n    नकारात्मक प्रतिमा बनविण्यासाठी.\n\n. `{i} ब्लर <कोणत्याही मीडियाला प्रत्युत्तर द्या>`\n    ते अस्पष्ट करण्यासाठी.\n\n. `{i} क्वाड <कोणत्याही मीडियाला प्रत्युत्तर द्या>`\n    भोवरा तयार करा.\n\n. `{i} आरसा <कोणत्याही माध्यमांना प्रत्युत्तर द्या>`\n    मिरर पिक तयार करण्यासाठी.\n\n. `{i} फ्लिप <कोणत्याही मीडियाला प्रत्युत्तर द्या>`\n    ते फ्लिप करण्यासाठी.\n\n. `{i} स्केच <कोणत्याही माध्यमांना प्रत्युत्तर द्या>`\n    त्याचे रेखाटन काढण्यासाठी.\n\n. `{i} निळा <कोणत्याही माध्यमांना प्रत्युत्तर द्या>`\n    फक्त मस्त.\n\n. `{i} csample <रंग नाव /रंग कोड>`\n   उदाहरणः `{i} csample red`\n             `{i} csample #ffffff`\n\n.\n    एक पिक्सिलेटेड प्रतिमा तयार करा .."
