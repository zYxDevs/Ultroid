help_imagetools: "-\n\n`` {i} সীমানা <ফটো/স্টিকার> `এর জবাব দিন\n    সেই মিডিয়াটির চারপাশে সীমানা তৈরি করতে ..\n    প্রাক্তন - `{i} সীমানা 12,22,23`\n       - `{i} সীমানা 12,22,23; প্রস্থ (সংখ্যায়) `\n\n• `{i} ধূসর <কোনও মিডিয়াতে উত্তর দিন>`\n    এটি কালো এনডি সাদা করতে।\n\n• `{i} রঙ <কোনও কালো এনডি হোয়াইট মিডিয়াতে জবাব দিন>`\n    এটি রঙিন করতে।\n\n• `{i} টুন <কোনও মিডিয়াতে জবাব দিন>`\n    এটি টুন করতে।\n\n• `{i} বিপদ <কোনও মিডিয়াতে উত্তর দিন>`\n    এটি বিপদ দেখতে।\n\n• `{i} নেতিবাচক <কোনও মিডিয়া>` উত্তর দিন `\n    নেতিবাচক চিত্র তৈরি করতে।\n\n`` {i} অস্পষ্ট <কোনও মিডিয়া> `উত্তর দিন`\n    এটি অস্পষ্ট করতে।\n\n• `{i} কোয়াড <কোনও মিডিয়া>` উত্তর দিন `\n    একটি ঘূর্ণি তৈরি করুন।\n\n`` {i} আয়না <কোনও মিডিয়া> `উত্তর দিন`\n    মিরর পিক তৈরি করতে।\n\n`` {i} ফ্লিপ <কোনও মিডিয়াতে উত্তর দিন> `\n    এটি ফ্লিপ করতে।\n\n`` {i} স্কেচ <কোনও মিডিয়া> `উত্তর দিন`\n    এর স্কেচ আঁকতে।\n\n• `{i} নীল <কোনও মিডিয়া>` উত্তর দিন `\n    শুধু শীতল।\n\n`` {i} csample <রঙের নাম /রঙ কোড> `\n   উদাহরণ: `{i} csample লাল\n             `{i} csample #ffffff`\n\n`` {i} পিক্সেলেটর <উত্তর চিত্র> `\n    একটি পিক্সেলেটেড চিত্র তৈরি করুন .."
help_instagram: "-\n\n`` {i} ইনস্টাগ্রাম <ইনস্টাগ্রাম url> `\n  `ইনস্টাগ্রাম মিডিয়া ডাউনলোড করুন ...`\n\n`` {i} ইনস্টাডেটা <ব্যবহারকারীর নাম> `\n  Covery কারও বা স্ব -এর ইনস্টাগ্রাম ডেটা পান\n\n`` {i} ইনস্টল <উত্তর ভিডিও/ফটো> <ক্যাপশন> `\n  `ইনস্টাগ্রামে মিডিয়া আপলোড করুন ...`\n\n`{i} igtv <উত্তর ভিডিও> <ক্যাপশন>`\n  Ig আইজিটিভিতে মিডিয়া আপলোড করুন ... `\n\n`{i} রিলস <উত্তর ভিডিও> <ক্যাপশন>`\n  Instagram ইনস্টাগ্রাম রিলে মিডিয়া আপলোড করুন ... `\n\nY আপনার সহকারীকে ক্যোয়ারির সাথে ইনলাইন যান `ইনস্ট্যাটম`\n   হোম পৃষ্ঠার পোস্ট পেতে ...\n\n`পূরণ করুন` insta_username` এবং `insta_password`\n  এটি ব্যবহার করার আগে .."
help_fakeaction: "-\n\n`{i} ftying <সময়/সেকেন্ডে>`\n    বর্তমান চ্যাটে জাল টাইপিং দেখান `\n\n`{i} faudio <সময়/সেকেন্ডে>`\n    Chal বর্তমান চ্যাটে জাল রেকর্ডিং অ্যাকশন দেখান `\n\n`{i} fvideo <সময়/সেকেন্ডে>`\n    Chal বর্তমান চ্যাটে জাল ভিডিও অ্যাকশন দেখান `\n\n`{i} fgame <সময়/সেকেন্ডে>`\n    Chal বর্তমান চ্যাটে জাল গেম খেলার ক্রিয়া দেখান `\n\n`{i} fsticker <সময়/সেকেন্ডে>`\n    The বর্তমান চ্যাটে নকল স্টিকার নির্বাচন করার ক্রিয়া দেখান `\n\n`` {i} ফ্লোকেশন <সময়/সেকেন্ডে> `\n    Chal বর্তমান চ্যাটে জাল অবস্থানের ক্রিয়া দেখান `\n\n`{i} fcontact <সময়/সেকেন্ডে>`\n    Chal বর্তমান চ্যাটে নকল যোগাযোগ নির্বাচন করার ক্রিয়া দেখান `\n\n`` {i} ফ্রাউন্ড <সময়/সেকেন্ডে> `\n    The বর্তমান চ্যাটে জাল ভিডিও বার্তা ক্রিয়া দেখান `\n\n`{i} fphoto <সময়/সেকেন্ডে>`\n    The বর্তমান চ্যাটে নকল প্রেরণ ফটো দেখান `\n\n`{i} fdocument <সময়/সেকেন্ডে>`\n    The বর্তমান চ্যাটে নকল প্রেরণ নথি দেখান `"
help_converter: "-\n\n`` {i} রূপান্তর <জিআইএফ/আইএমজি/স্টিকার/ওয়েবএম> `\n    এটিকে জিআইএফ / চিত্র / ওয়েবএম / সাধারণ স্টিকারে রূপান্তর করতে মিডিয়াতে জবাব দিন।\n\n`{i} ডক <ফাইলেনাম.এক্সটি>`\n    এটি একটি ফাইলে সংরক্ষণ করতে একটি পাঠ্য এমএসজি -তে জবাব দিন।\n\n• `{i} ওপেন`\n    এটির পাঠ্যটি প্রকাশ করতে কোনও ফাইলের জবাব দিন।\n\n`` {i} নামকরণ <ফাইলের নাম এক্সটেনশন> `\n    ফাইলটির নাম পরিবর্তন করুন\n\n`` {i} থাম্বনেইল <চিত্র/থাম্বনেইল ফাইলের জবাব দিন> `\n    আপনার কাস্টম থাম্বনেইল দিয়ে আপনার ফাইলটি আপলোড করুন।"
help_autoban: "`` {i} অটোকিক <অন/অফ> `\n    চালু - সক্ষম করতে।\n    বন্ধ - অক্ষম।\n    গ্রুপ থেকে স্বয়ংক্রিয়ভাবে নতুন যোগদানকারীদের কিক করুন।\n\n`` {i} cban`\n    ব্যবহৃত চ্যাটে চ্যানেল হিসাবে অটোব্যানিং প্রেরণ সক্ষম/অক্ষম করুন।\n\n`` {i} addwl <ব্যবহারকারীর নাম> `\n   চ্যানেলবান হোয়াইটলিস্টে চ্যানেল যুক্ত করুন।\n\n`` {i} Remwl <ব্যবহারকারীর নাম> `\n   চ্যানেলবান হোয়াইটলিস্ট থেকে চ্যানেল সরান।\n\n`` {i} listwl`: সমস্ত হোয়াইটলিস্ট চ্যানেলগুলি তালিকাভুক্ত করুন।"
help_button: "-\n\n• `{i} বোতাম <বোতাম ফর্ম্যাট সহ পাঠ্য\n   বোতাম তৈরি করুন আপনি পিককেও উত্তর দিতে পারেন\n\nফর্ম্যাট:- `{i} বোতাম ওহে!@ইউসুলট্রয়েড 😎।\n[আল্ট্রয়েড |t.me/theultroid * essupport |t.me/ultroidsupportchat |একই]\n[টিমুলট্রয়েড |t.me/teamultroid] `"
