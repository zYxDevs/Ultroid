help_warn: "`` {i} সতর্কতা <ব্যবহারকারী> <কারণ> `উত্তর দিন\n    সতর্কতা দেয়।\n\n`` {i} রিসেটওয়ার্ন <ব্যবহারকারী> `উত্তর দিন`\n    সমস্ত সতর্কতা পুনরায় সেট করতে।\n\n• `{i} সতর্কতা <ব্যবহারকারীকে জবাব দিন>`\n   কোনও ব্যবহারকারীর সতর্কতার তালিকা পেতে।\n\n`` {i} সেটওয়ার্ন <ওয়ার্ন গণনা> |<বান/নিঃশব্দ/কিক> `\n   সতর্কতার জন্য সতর্কতার গণনায় নম্বর সেট করুন\n   রাখার পরে '|'মার্ক নিষিদ্ধ/নিঃশব্দ/কিকের মতো অ্যাকশন রাখুন\n   এর ডিফল্ট 3 কিক\n   উদাহরণ: `সেটওয়ার্ন 5 |নিঃশব্দ"
help_blacklist: "-\n\n`` {i} ব্ল্যাকলিস্ট <শব্দ/একটি স্থান সহ সমস্ত শব্দ> `\n    সেই চ্যাটে চয়েসেন শব্দটি ব্ল্যাকলিস্ট করুন।\n\n`` {i} Remblacklist <ওয়ার্ড> `\n    ব্ল্যাকলিস্ট থেকে শব্দটি সরান ..\n\n`` {i} তালিকা ব্ল্যাকলিস্ট`\n    সমস্ত কালো তালিকাভুক্ত শব্দের তালিকা করুন।\n\n  'যদি কোনও ব্যক্তি ব্ল্যাকলিস্ট শব্দ ব্যবহার করে তবে তার এমএসজি মুছে ফেলা হবে'\n  'এবং আপনাকে অবশ্যই সেই আড্ডায় অ্যাডমিন হতে হবে'"
