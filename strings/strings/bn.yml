help_fileshare: "-\n\n`{i} স্টোর <উত্তর_টো_মেসেজ>`\n   উত্তরযুক্ত বার্তা/মিডিয়া সংরক্ষণ করুন এবং আপনার সহকারী বটের মাধ্যমে অ্যাক্সেস করতে সেই ফাইলটিতে একটি ভাগযোগ্য লিঙ্ক তৈরি করুন!\n\n`` {i} ডেলস্টোরড <সঞ্চিত ফাইলের লিঙ্ক> `\n    সঞ্চিত ফাইল মুছুন।\n\n`` {i} তালিকাভুক্ত\n   সমস্ত সঞ্চিত বার্তা পান।\n\nInine ইনলাইনে সঞ্চিত ফাইলগুলি দেখতে `ফিলস্টোর' সহ আপনার সহকারী বট দিয়ে ইনলাইন যান।"
help_fedutils: "-\n\n`` {i} সুপারফান <ব্যবহারকারী/ব্যবহারকারী/ব্যবহারকারীর নাম> `\n    আপনি অ্যাডমিনে থাকা সমস্ত ফিড জুড়ে থাকা ব্যক্তি fban।\n\n`` {i} সুপারুনফান <ব্যবহারকারী/ব্যবহারকারী/ব্যবহারকারীর নাম> `\n    আপনি অ্যাডমিনে থাকা সমস্ত ফিডের জুড়ে থাকা ব্যক্তিটি আন-ফ্যান।\n\nসহকারীকে বাদ দেওয়ার জন্য এফবিএএন গ্রুপ এবং ফেডগুলি নির্দিষ্ট করুন।\n\n`` {i} fstat <ব্যবহারকারীর নাম/আইডি/ব্যবহারকারীকে উত্তর> `\n    গোলাপের ব্যক্তির খাওয়ানো স্ট্যাট সংগ্রহ করুন।\n\n`{i} ফেডিনফো <(ফেডিড)>`\n    রোজ থেকে প্রদত্ত ফেড আইডি বা আপনার নিজের ফেডের ফেডারেশন তথ্য সংগ্রহ করুন।"
help_other: "-\n\n`` {i} প্রেরণ <ব্যবহারকারীর নাম/আইডি> <উত্তর/টাইপ> `\n    ব্যবহারকারী/চ্যাটে বার্তা প্রেরণ করুন।\n\n`{i} fwdrepy <sg>` এর উত্তর দিন `\n    কারও এমএসজিকে ব্যক্তিগতভাবে ফরোয়ার্ড করে জবাব দিন।\n\n`` {i} সংরক্ষণ করুন <উত্তর বার্তা> `\n    আপনার সংরক্ষিত বার্তা বাক্সে উত্তর দেওয়া এমএসজি সংরক্ষণ করুন।\n\n`` {i} fsave <উত্তর বার্তা> `\n    ফরোয়ার্ড যে আপনার সংরক্ষিত বার্তাগুলিতে এমএসজি জবাব দিয়েছে।"
