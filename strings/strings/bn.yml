help_profanityfilter: "-\n\n`` {i} অ্যাডপ্রোফ্যানিটি `\n   যদি কেউ চ্যাটে খারাপ শব্দ প্রেরণ করে, তবে বট সেই বার্তাটি মুছবে।\n\n`` {i} remprofanity`\n   অশ্লীল তালিকা থেকে চ্যাট থেকে।"
