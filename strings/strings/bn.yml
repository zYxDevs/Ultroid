help_beautify: "-\n\n`` {i} কার্বন <পাঠ্য/এমএসজি -র উত্তর/নথির জবাব> `\n    ডিফল্ট সেটিংস সহ পাঠ্যটি কার্বনাইজ করুন।\n\n`{i} rcarbon <পাঠ্য/উত্তর/ডকুমেন্টের জবাব/উত্তর>`\n    এলোমেলো বিজি রঙ সহ পাঠ্যটি কার্বনাইজ করুন।\n\n`{i} ccarbon <color> <টেক্সট/এমএসজি -র উত্তর/নথির জবাব>`\n    কাস্টম বিজি রঙ সহ পাঠ্যটি কার্বনাইজ করুন।\n\n`{i} রাইসো <অপ্ট-থিম> <পাঠ্য>/<বার্তার জবাব>`\n  `{i} রাইসো তালিকা -` থিমগুলির তালিকা পান `"
help_chats: "-\n\n`` {i} দেলচ্যাট <al চ্ছিক- ব্যবহারকারীর নাম/আইডি> `\n    গ্রুপটি মুছুন এই সিএমডি ব্যবহৃত হয়।\n\n`` {i} getlink`\n`` {i} getlink r` - `অ্যাডমিন অনুমোদনের সাথে লিঙ্ক তৈরি করুন`\n`` {i} getlink r শিরোনাম_হাউ - Link লিঙ্ক শিরোনাম সহ অ্যাডমিন অনুমোদন `\n`` {i} getLink 10` - new নতুন লিঙ্কে ব্যবহারের সীমা\n    গ্রুপের লিঙ্ক পান এই সিএমডি ব্যবহৃত হয়।\n\n`` {i} তৈরি (জি | বি | সি) <গ্রুপ_নাম>;<al চ্ছিক-ব্যবহারকারীর নাম> `\n    গোষ্ঠী তৈরি করুন একটি নির্দিষ্ট নাম।\n    জি - মেগাগ্রুপ/সুপারগ্রুপ\n    খ - ছোট গ্রুপ\n    সি - চ্যানেল\n\n`` {i} সেটজিপিক <ফটোতে উত্তর> <চ্যাট ব্যবহারকারীর নাম> `\n    গ্রুপের প্রোফাইল ফটো সেট করুন।\n\n• `{i} ডেলগপিক <চ্যাট ব্যবহারকারীর নাম -অরেশনাল>`\n    গ্রুপের প্রোফাইল ফটো মুছুন।\n\n`` {i} unnal``\n    একটি গোষ্ঠীর সমস্ত সদস্যকে অনিচ্ছুক করুন।\n\n`` {i} rmusers`\n    ব্যবহারকারীদের বিশেষভাবে সরান।"
fsh_3: "Charape একটি ভাগযোগ্য লিঙ্ক তৈরি করার জন্য একটি বার্তার জবাব দিন! `"
help_channelhacks: "চ্যানেল> | থেকে <`{i} শিফট <<থেকে চ্যানেল> `\n     এটি চ্যানেল এ থেকে চ্যানেল বিতে সমস্ত পুরানো পোস্ট স্থানান্তর করবে\n      (আপনি চ্যানেলের ব্যবহারকারীর নাম বা আইডিও ব্যবহার করতে পারেন)\n      উদাহরণ: `{i} শিফট @অ্যাবসি |@xyz`\n      [দ্রষ্টব্য - এটি ('|') চিহ্নটি নেসেসারি]\n\nA কোনও উত্স চ্যানেল থেকে যে কোনও গন্তব্য চ্যানেলে সমস্ত নতুন বার্তা অটো-পোস্টিং/ফরোয়ার্ড করার জন্য।\n\n   `{i} asource <চ্যানেল ব্যবহারকারীর নাম বা আইডি>`\n      এই ডাটাবেসে উত্স চ্যানেল যুক্ত করুন\n   `{i} dsource <চ্যানেল ব্যবহারকারীর নাম বা আইডি>`\n      এটি ডাটাবেস থেকে উত্স চ্যানেলগুলি সরান\n   `{i} তালিকাগুলি <চ্যানেল ব্যবহারকারীর নাম বা আইডি>`\n      উত্স চ্যানেলগুলির তালিকা দেখান\n\n\n   `{i} অ্যাডেস্ট <চ্যানেল ব্যবহারকারীর নাম বা আইডি>`\n      এটি ডাটাবেসে আপনার চ্যানেলগুলি যুক্ত করুন\n   `{i} dddest <চ্যানেল ব্যবহারকারীর নাম বা আইডি>`\n      এটি ডাটাবেস থেকে আপনার চ্যানেলগুলি সরান\n   {i} তালিকাভুক্ত <চ্যানেল ব্যবহারকারীর নাম বা আইডি> `\n      আপনার চ্যানেলগুলির তালিকা দেখান\n\n   'আপনি ডাটাবেসে অনেক চ্যানেল সেট করতে পারেন'\n   'অটো-পোস্ট ব্যবহার সক্রিয় করার জন্য `{i} সেটডিবি অটোপোস্ট ট্রু`'"
help_asstcmd: "-\n\n`` {i} addcmd <নতুন সিএমডি> <উত্তর> `\n   এটি সেই উত্তর বার্তাটি সহ আপনার সহকারী বটের জন্য নতুন সিএমডি সেট করবে।\n\n`{i} REMCMD <সিএমডি নাম>`\n   এটি আপনার সিএমডি অপসারণ করবে।\n\n`` {i} listcmd`\n   আপনার সমস্ত কাস্টম সিএমডির তালিকা পেতে।"
help_search: "-\n\n`` {i} Saavn <অনুসন্ধান ক্যোয়ারী> `\n    সাভন থেকে গান ডাউনলোড করুন।\n\n• `{i} গুগল <ক্যোয়ারী>`\n    গুগল অনুসন্ধান করার জন্য।\n\n`` {i} গিথুব <ব্যবহারকারীর নাম> `\n    ব্যবহারকারীদের গিটহাব প্রোফাইলের সম্পূর্ণ তথ্য পান।\n\n`` {i} img <ক্যোয়ারী> `\n  `{i} img <ক্যোয়ারী>;<ফলাফল না> `\n    চিত্র অনুসন্ধান করার জন্য।\n\n`` {i} বিপরীত\n    এর সসটি খুঁজে পেতে কোনও চিত্র বা স্টিকারের জবাব দিন।"
help_calculator: "-\n\n`` {i} CALC` - ইনলাইন ক্যালকুলেটর"
