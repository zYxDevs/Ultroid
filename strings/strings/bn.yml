help_qrcode: "-\n\n`{i} qrcode <পাঠ্য/পাঠ্যের উত্তর>`\n   Text পাঠ্য Qrcode তৈরি\n\n`{i} ADDQR <উত্তর চিত্র> <পাঠ্য>`\n   Text পাঠ্যটির কিউআর তৈরি করে এবং এটি চিত্রে যুক্ত করুন `\n\n• `{i} qrdecode <qrcode> on এর জবাব দিন`\n   `এটি Qrcode ডিকোড করে`"
