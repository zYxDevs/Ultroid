help_utilities: "-\n\n`` {i} কিকমেই: গ্রুপটি ছেড়ে যায়।\n\n`` {i} তারিখ `: ক্যালেন্ডার দেখান।\n\n`` {i} listereved`\n    আপনার নিজের সমস্ত ব্যবহারকারীর নাম (চ্যানেল/গোষ্ঠী) তালিকাভুক্ত করুন।\n\n`` {i} পরিসংখ্যান: আপনার প্রোফাইলের পরিসংখ্যান দেখুন।\n\n`` {i} পেস্ট` - text পাঠ্য ফাইলের দীর্ঘ পাঠ্য / উত্তর অন্তর্ভুক্ত করুন `\n\n`{i} তথ্য <ব্যবহারকারীর নাম/ব্যবহারকারী/চ্যাটিড>`\n    কারও এমএসজি জবাব দিন।\n\n`` {i} আমন্ত্রণ <ব্যবহারকারীর নাম/ব্যবহারকারী আইডি> `\n    চ্যাটে ব্যবহারকারী যুক্ত করুন।\n\n`` {i} rmbg <পিক> `উত্তর দিন`\n    সেই ছবি থেকে পটভূমি সরান।\n\n`` {i} টেলিগ্রাফ <মিডিয়া/পাঠ্য> `উত্তর দিন`\n    টেলিগ্রাফে মিডিয়া/পাঠ্য আপলোড করুন।\n\n`` {i} json <এমএসজি> `এর জবাব দিন\n    বার্তার জেএসএন এনকোডিং পান।\n\n• `{i} পরামর্শ <বার্তায় জবাব দিন> বা <পোল শিরোনাম>`\n    জবাব দেওয়া পরামর্শের জন্য একটি হ্যাঁ/কোনও পোল তৈরি করুন।\n\n`{i} ipinfo <আইপ্যাড্রেস>`: সেই আইপি ঠিকানা সম্পর্কে তথ্য পান।\n\n`` {i} সিপি <বার্তায় উত্তর> `\n   ফর্ম্যাট সহ উত্তরযুক্ত বার্তাটি অনুলিপি করুন। 24 ঘন্টা মেয়াদ শেষ হয়।\n`` {i} pst`\n   ফর্ম্যাটিং সহ অনুলিপি করা বার্তাটি আটকান।\n\n`` {i} থাম্ব <উত্তর ফাইল> `: উত্তরযুক্ত ফাইলের থাম্বনেইলটি ডাউনলোড করুন।\n\n• `{i} getMsg <বার্তা লিঙ্ক>`\n  ফরোয়ার্ড/অনুলিপি নিষেধাজ্ঞার সাথে চ্যাট থেকে বার্তা পান।"
help_bot: "`` {i} জীবিত |`{i} জীবিত ইনলাইন`\n    আপনার বট কাজ করছে কিনা তা পরীক্ষা করুন।\n\n`` {i} পিং`\n    আল্ট্রয়েডের প্রতিক্রিয়া সময় পরীক্ষা করুন।\n\n`` {i} আপডেট`\n    কোনও আপডেট পাওয়া গেলে চেঞ্জলগগুলি দেখুন।\n\n`` {i} Cmds`\n    সমস্ত প্লাগইন নাম দেখুন।\n\n`` {i} পুনঃসূচনা\n    আপনার বট পুনরায় চালু করতে।\n\n`` {i} লগস (সিস) `\n    পুরো টার্মিনাল লগগুলি পান।\n`` {i} লগ কার্বন`\n    কার্বনাইজড এসওয়াইএস লগগুলি পান।\nHer `{i} লগস হিরোকু`\n   হেরোকু লগগুলির সর্বশেষ 100 টি লাইন পান।\n\n`` {i} শাটডাউন`\n    আপনার বট বন্ধ করুন।"
help_sudo: "-\n\n`` {i} অ্যাডসুডো `\n    ব্যবহারকারীর জবাব দিয়ে বা <স্পেস> পৃথক ইউজারআইডি (গুলি) ব্যবহার করে সুডো ব্যবহারকারীদের যুক্ত করুন\n\n`` {i} ডেলসুডো`\n    ব্যবহারকারীর জবাব দিয়ে বা <স্পেস> পৃথক ইউজারআইডি (গুলি) ব্যবহার করে সুডো ব্যবহারকারীদের সরান\n\n`` {i} তালিকাগুলি\n    সমস্ত সুডো ব্যবহারকারীদের তালিকা করুন।"
help_fontgen: "`{i} ফন্ট <font নাম>: <পাঠ্য>`\n    পাঠ্যের জন্য বিভিন্ন ফন্ট তৈরি করুন।\n\n`` {i} font`\n    ফন্টের তালিকা পেতে"
help_usage: "`` {i} ব্যবহার `\n    সামগ্রিক ব্যবহার পান।\n\nHer `{i} হেরোকু ব্যবহার করুন\n   হেরোকু পরিসংখ্যান পান।\n\n`` {i} ব্যবহার ডিবি `\n   ডাটাবেস স্টোরেজ ব্যবহার পান।"
help_schedulemsg: "-\n\n• `{i} শিডিউল <পাঠ্য/এমএসজি> <সময়>` এর উত্তর\n    সময়ে আপনি দ্বিতীয় সংখ্যা হিসাবে দ্বিতীয় ব্যবহার করতে পারেন, বা 1 ঘন্টা বা 1 মি এর মতো\n    উদাহরণস্বরূপ।`{i} সময়সূচী হ্যালো 100` এটি 100 সেকেন্ডের পরে এমএসজি সরবরাহ করে।\n    উদাহরণস্বরূপ।`{i} সময়সূচী হ্যালো 1H` এটি এক ঘন্টা পরে এমএসজি সরবরাহ করে।"
