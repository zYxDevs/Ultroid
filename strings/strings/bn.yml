help_words: "-\n\n`` {i} অর্থ <শব্দ> `\n    শব্দের অর্থ পান।\n\n`{i} প্রতিশব্দ <শব্দ>`\n    সমস্ত প্রতিশব্দ পান।\n\n`` {i} প্রতিশব্দ <শব্দ> `\n    সমস্ত প্রতিশব্দ পান।\n\n`{i} ud <ওয়ার্ড>`\n    উরব্যান্ডেকশনারি থেকে শব্দের প্রতিরক্ষা আনুন।"
