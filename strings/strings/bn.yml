help_globaltools: "-\n\n`{i} গ্যাঙ্গ <উত্তর ব্যবহারকারী/ ব্যবহারকারীর নাম>`\n`` {i} ungban`\n    নিষিদ্ধ/বিশ্বব্যাপী।\n\n`` {i} gstat <ব্যবহারকারী/ব্যবহারকারী/ব্যবহারকারীর নাম> `\n   ব্যবহারকারী জিব্যানড কিনা তা পরীক্ষা করুন।\n\n`` {i} তালিকাগান `: সমস্ত জিব্যানড ব্যবহারকারীদের তালিকাভুক্ত করুন।\n\n`` {i} gmute` | `{i} ungmute` <উত্তর ব্যবহারকারী/ ব্যবহারকারীর নাম>\n    নিঃশব্দ/অবিবাহিত বিশ্বব্যাপী।\n\n`{i} gkick <উত্তর/ব্যবহারকারীর নাম>` `বিশ্বব্যাপী কিক ব্যবহারকারী`\n`{i} gast <পাঠ্য/উত্তর>` `বিশ্বব্যাপী সমস্ত জিআরপিএসে এমএসজি প্রেরণ করুন\n\n`{i} গ্যাডমিনকাস্ট <পাঠ্য/উত্তর>` `আপনার অ্যাডমিন চ্যাটে বিশ্বব্যাপী সম্প্রচারিত\n`{i} গুকাস্ট <পাঠ্য/উত্তর>` `বিশ্বব্যাপী সমস্ত প্রধানমন্ত্রী ব্যবহারকারীদের মধ্যে এমএসজি প্রেরণ করুন\n\n`{i} gblacklist <চ্যাট আইডি/ব্যবহারকারীর নাম/কিছুই নয় (বর্তমান চ্যাটের জন্য)`\n   ব্ল্যাকলিস্টে চ্যাট যুক্ত করুন এবং বৈশ্বিক সম্প্রচার উপেক্ষা করুন।\n`` {i} ungblacklist` Black ব্ল্যাকলিস্ট থেকে চ্যাটটি সরান `\n\n• `{i} gpromote <ব্যবহারকারী> <চ্যানেল/গোষ্ঠী/সমস্ত> <র‌্যাঙ্ক>` উত্তর দিন\n    আপনি প্রশাসক যেখানে বিশ্বব্যাপী ব্যবহারকারীকে প্রচার করুন\n    - কেবল গ্রুপ/চ্যানেল/সমস্ত ক্ষেত্রে প্রচার করবেন কিনা তা সেট করুন।\n    যেমন- `জিপ্রোমোট গ্রুপ বস` সমস্ত জিআরপিগুলিতে ব্যবহারকারীকে প্রচার করে।\n        `জিপ্রোমোট @ইউএসআরনেম সমস্ত সর` ~ সমস্ত গ্রুপ এবং চ্যানেলে ব্যবহারকারীকে প্রচার করুন\n`` {i} gdemote` - user বিশ্বব্যাপী ব্যবহারকারীকে ডেমোট করুন `"
