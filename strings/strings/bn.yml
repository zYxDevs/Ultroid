help_tag: "-\n\n`` {i} তাগল`\n    চ্যাট শীর্ষ 100 সদস্য ট্যাগ।\n\n`` {i} TAGADMINS`\n    সেই আড্ডার অ্যাডমিন্স ট্যাগ।\n\n`` {i} TAGOWNER`\n    সেই চ্যাটের ট্যাগ মালিক\n\n`` {i} ট্যাগবটস`\n    সেই আড্ডার বট ট্যাগ।\n\n`` {i} tagrec`\n    ট্যাগ সম্প্রতি সক্রিয় সদস্য।\n\n• `{i} টাগন`\n    অনলাইন সদস্যদের ট্যাগ করুন (কেবল গোপনীয়তা বন্ধ থাকলে কাজ করুন)।\n\n`` {i} TAGOFF`\n    অফলাইন সদস্যদের ট্যাগ করুন (কেবল গোপনীয়তা বন্ধ থাকলে কাজ করুন)।"
help_greetings: "-\n\n---- স্বাগত ----\n• `{i} সেটওয়েলকাম <বার্তা/বার্তায় উত্তর>`\n    বর্তমান চ্যাটে স্বাগতম বার্তা সেট করুন।\n\n`` {i} ক্লিয়ারওয়েলকাম `\n    বর্তমান চ্যাটে স্বাগতম মুছুন।\n\n`` {i} getwelcom`\n    বর্তমান চ্যাটে স্বাগত বার্তা পান।\n\n---- বিদায় ----\n`` {i} সেটগুডবাই <বার্তা/বার্তায় উত্তর> `\n    বর্তমান চ্যাটে বিদায় বার্তা সেট করুন।\n\n`` {i} ক্লিয়ারগুডবাই `\n    বর্তমান চ্যাটে বিদায় মুছুন।\n\n`` {i} getgoodby`\n    বর্তমান চ্যাটে বিদায় বার্তা পান।\n\n• `{i} থ্যাঙ্কমেমবার্স অন/অফ`\n    আপনার গ্রুপগুলিতে 100*x এর সদস্যদের গণনা করতে আপনাকে ধন্যবাদ স্টিকার প্রেরণ করুন।"
help_stickertools: "-\n\n`` {i} ধ্বংস <অ্যানিমেটেড স্টিকার> `এর জবাব দিন`\n    স্টিকার ধ্বংস করতে।\n\n`` {i} ক্ষুদ্র <মিডিয়া> `উত্তর দিন`\n    ক্ষুদ্র স্টিকার তৈরি করতে।\n\n`` {i} কং <চিত্র/স্টিকার> `এর জবাব দিন`\n    স্টিকার কং (আপনার প্যাক যোগ করুন)।\n\n`` {i} প্যাককাং <প্যাক নাম> `\n    সম্পূর্ণ স্টিকার সেট কং (কাস্টম নাম সহ)।\n\n• `{i} রাউন্ড <কোনও মিডিয়া>` উত্তর দিন `\n    বৃত্তাকার স্টিকার বের করতে।"
help_locks: "-\n\n`{i} লক <sgs/মিডিয়া/স্টিকার/জিআইএফ/গেমস/ইনলাইন/পোলস/আমন্ত্রণ/পিন/চেঞ্জ ইনফো>`\n    ব্যবহৃত গ্রুপে ব্যবহৃত সেটিংটি লক করুন।\n\n`{i} আনলক <sgs/মিডিয়া/স্টিকার/জিআইএফ/গেমস/ইনলাইন/পোলস/আমন্ত্রণ/পিন/চেঞ্জ ইনফো>`\n    ব্যবহৃত গ্রুপে ব্যবহৃত সেটিংটি আনলক করুন।"
