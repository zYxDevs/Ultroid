help_polls: "-\n\n`` {i} পোল <প্রশ্ন>;<বিকল্প>;<বিকল্প> `\n    প্রদত্ত বিকল্পগুলি সহ বেনামে পোল পান\n\n`` {i} পোল <প্রশ্ন>;<বিকল্প>;<বিকল্প> |<টাইপ> `\n    পছন্দসই প্রকারের সাথে নির্দিষ্ট পোলটি পান!\n    প্রকারটি `পাবলিক`,` একাধিক বা `কুইজ` এর যে কোনও হওয়া উচিত\n\n`` {i} পোল <প্রশ্ন>;<বিকল্প>;<বিকল্প> |কুইজ_ <উত্তর?\n    কুইজ পোলটি পান যেখানে উত্তর দিনটি সঠিক বিকল্পের সংখ্যা"
