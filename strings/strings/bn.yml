help_pmpermit: "-\n\n`` {i} a` বা `{i} অনুমোদন\n    প্রধানমন্ত্রীর কাছে কাউকে অনুমোদন দিন।\n\n• `{i} da` বা` {i}} Diverove`\n    প্রধানমন্ত্রীর কাছে কাউকে অস্বীকার করুন।\n\n`` {i} ব্লক `\n    কাউকে ব্লক করুন।\n\n`` {i} আনব্লক` |`{i} অলব্লক অল অলঙ্ক\n    কাউকে অবরুদ্ধ করুন।\n\n`` {i} nologpm`\n    ব্যবহারকারীর কাছ থেকে লগিং বার্তাগুলি বন্ধ করুন।\n\n`` {i} LOGPM`\n    ব্যবহারকারীর কাছ থেকে লগিং বার্তা শুরু করুন।\n\n`` {i} startarchive`\n    সংরক্ষণাগার নতুন পিএমএস।\n\n`` {i} স্টপার্কিভ`\n    নতুন পিএমএস সংরক্ষণাগার করবেন না।\n\n`` {i} ক্লিয়ারচাইভ`\n    অলৌকিক সমস্ত চ্যাট।\n\n`` {i} তালিকাভুক্তি\n   সমস্ত অনুমোদিত পিএমএস তালিকাভুক্ত করুন।"
help_snips: "-\n\n`` {i} যুক্ত করুন <শব্দ> <একটি বার্তায় জবাব দিন> `\n    উত্তর বার্তার সাথে সম্পর্কিত স্নিপ হিসাবে ব্যবহৃত শব্দটি যুক্ত করুন।\n\n`` {i} remsnip <শব্দ> `\n    স্নিপ শব্দটি সরান ..\n\n`` {i} তালিকানিপ`\n    সমস্ত স্নিপ তালিকা।\n\n• ব্যবহার:\n    টাইপ করুন `$ (ইউআর স্নিপ ওয়ার্ড)` সেট করা উত্তর দিন।"
