help_devtools: "-\n\n`` {i} বাশ <সিএমডিএস> `\n`{i} বাশ -সি <সিএমডিএস>` কার্বন চিত্র কমান্ড আউটপুট হিসাবে।\n    টেলিগ্রামে লিনাক্স কমান্ডগুলি চালান।\n\n`{i} মূল্যায়ন <কোড>`\n    টেলিগ্রামে পাইথন কমান্ডগুলি মূল্যায়ন করুন।\n    শর্টকাটস:\n        ক্লায়েন্ট = বট = ইভেন্ট.ক্লিয়েন্ট\n        ই = ইভেন্ট\n        পি = মুদ্রণ\n        উত্তর = ইভেন্টের জন্য অপেক্ষা করুন etet_reply_message ()\n        চ্যাট = ইভেন্ট.চ্যাট_আইডি\n\n`{i} সিপিপি <কোড>`\n    টেলিগ্রাম থেকে সি ++ কোড চালান।\n\n`{i} sysinfo`\n    সিস্টেম তথ্য দেখায়।"
