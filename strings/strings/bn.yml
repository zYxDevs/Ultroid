help_misc: "-\n\n`` {i} eod`\n    Today আজকের ইভেন্টটি পান `\n\n`{i} pntrst <লিঙ্ক/আইডি>`\n    পিন্টারেস্ট পিনগুলি ডাউনলোড করুন এবং প্রেরণ করুন\n\n`` {i} গ্যাজেট <অনুসন্ধান ক্যোয়ারী> `\n    টেলিগ্রাম থেকে গ্যাজেট অনুসন্ধান।\n\n`` {i} র্যান্ডমেজার `\n   এলোমেলো ব্যবহারকারী সম্পর্কে বিশদ তৈরি করুন।\n\n`` {i} Ascii <উত্তর চিত্র> `\n    উত্তর দেওয়া চিত্রটি এইচটিএমএলে রূপান্তর করুন।"
help_profile: "-\n\n`{i} সেটনাম <প্রথম নাম // শেষ নাম>`\n    আপনার প্রোফাইলের নাম পরিবর্তন করুন।\n\n`` {i} সেটবিও <বিআইও> `\n    আপনার প্রোফাইল বায়ো পরিবর্তন করুন।\n\n`` {i} সেটপিক <পিক> refort\n    আপনার প্রোফাইল পিক পরিবর্তন করুন।\n\n`{i} ডেলপফপি <n> (al চ্ছিক)`\n    একটি প্রোফাইল পিক মুছুন, যদি কোনও মান না দেওয়া হয় তবে অন্যথায় ছবিগুলির সংখ্যা মুছুন।\n\n`` {i} পোটো <ব্যবহারকারীর নাম> `\n    উপলভ্য হলে চ্যাট/ব্যবহারকারীর ফটো আপলোড করুন।"
