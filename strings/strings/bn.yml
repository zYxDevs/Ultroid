help_notes: "-\n\n`` {i} অ্যাডনোট <ওয়ার্ড> <একটি বার্তায় জবাব দিন> `\n    উত্তরযুক্ত বার্তা এবং চয়েসেন ওয়ার্ডের সাথে ব্যবহৃত চ্যাটে নোট যুক্ত করুন।\n\n`` {i} রিমনোট <শব্দ> `\n    ব্যবহৃত চ্যাট থেকে নোটটি সরান।\n\n`` {i} তালিকানোট`\n    সমস্ত নোট তালিকা।\n\n• ব্যবহার:\n   গোষ্ঠীতে নোটগুলি সেট করুন যাতে সমস্ত এটি ব্যবহার করতে পারে।\n   টাইপ করুন `#(নোটের কীওয়ার্ড)` এটি পেতে"
