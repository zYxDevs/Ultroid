help_database: "-\n\n• ** ডাটাবেস কমান্ড, এটি কী তা আপনি না জানলে ব্যবহার করবেন না***\n\n`` {i} সেটডিবি কী |মান\n    ডাটাবেসে মান সেট করুন।\n    যেমন:\n    `{i} SETDB হাই সেখানে\n    `{i} সেটডিবি হাই হাই |আল্ট্রয়েড এখানে `\n    `{i} SETDB -DB- এর বহির্গমন মানগুলিতে মান যুক্ত করতে` {i} SETDB -E ভেরিয়েবল মান `\n\n`` {i} deldb কী`\n    ডিবি থেকে কী মুছুন।\n\n• `{i} রেন্ডব পুরানো কীনাম |নতুন কীনাম `\n    কী নাম আপডেট করুন"
help_admintools: "-\n\n• `.প্রোমোট <ব্যবহারকারী/ব্যবহারকারী/ব্যবহারকারীর নাম>`\n• `.ডেমোট`\n    চ্যাটে ব্যবহারকারীকে প্রচার/হ্রাস করুন।\n\n• `.বান <ব্যবহারকারী/ব্যবহারকারী/ব্যবহারকারীর নাম> <কারণ>`\n• `.unban`\n    চ্যাট থেকে ব্যবহারকারীকে নিষিদ্ধ/নিষিদ্ধ করুন।\n\n• `। কিক <ব্যবহারকারী/ব্যবহারকারী/ব্যবহারকারীর নাম> <কারণ>`\n    চ্যাট থেকে ব্যবহারকারীকে লাথি দিন।\n\n• `.পিন <বার্তায় জবাব দিন>`\n    চ্যাটে বার্তাটি পিন করুন\n• `.tpin <সময়> <টেম্প পিন বার্তা>`\n• `.এনপিন (সমস্ত) <বার্তায় জবাব দিন>`\n    আড্ডায় বার্তাগুলি আনপিন করুন।\n\n• `.পিনেড`\n   বর্তমান চ্যাটে পিনযুক্ত বার্তা পান।\n• `। লিস্টপিনেড`\n   বর্তমান চ্যাটে সমস্ত পিনযুক্ত বার্তা পান\n\n• `.আউটোডিলিট <24 ঘন্টা/7 ডি/1 মি/অফ>`\n   চ্যাটে অটো মুছুন বার্তাগুলি সক্ষম করুন।\n\n• `.পুরজ <বার্তার জবাব>`\n    জবাব দেওয়া বার্তা থেকে সমস্ত বার্তা শুদ্ধ করুন।\n\n• `.purgem <বার্তার জবাব>`\n    জবাব দেওয়া বার্তা থেকে কেবল আপনার বার্তাগুলি পরিষ্কার করুন।\n\n• `.পুরগেল`\n    উত্তরযুক্ত ব্যবহারকারীর সমস্ত এমএসজি মুছুন।"
