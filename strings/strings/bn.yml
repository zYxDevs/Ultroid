help_downloadupload: "-\n\n`{i} ul <পাথ/টু/ফাইল>`\n    টেলিগ্রামে ফাইল আপলোড করুন।\n    প্রয়োজনীয়তা অনুসারে ফাইলের নামের আগে বা পরে নিম্নলিখিত যুক্তিগুলি ব্যবহার করুন:\n      `-স্ট্রিম` স্ট্রিম হিসাবে আপলোড করতে।\n      `-ডিলিট` আপলোড করার পরে ফাইল মুছতে।\n      `-কোনও থাম্বনেইল ছাড়াই আপলোড করা।\n\n`{i} dl <ফাইলের নাম (al চ্ছিক)>`\n    ডাউনলোড করতে ফাইলের জবাব দিন।\n\n`` {i} ডাউনলোড <ডিডিএল> (| ফাইলের নাম) `\n    ডিডিএল ব্যবহার করে ডাউনলোড করুন।যদি না দেওয়া হয় তবে ফাইলের নামটি অটোজেনেট করবে।"
help_variables: "-\n\n`` {i} ভের <ভেরিয়েবল নাম> `\n   প্রদত্ত পরিবর্তনশীল নামের মান পান।\n\n• `{i} টাইপ <ভেরিয়েবল নাম>`\n   পরিবর্তনশীল প্রকার পান।\n\n• `{i} ডিবি <কী>` পেতে\n   প্রদত্ত কীটির ডিবি মান পান।\n\n`` {i} কীগুলি পান `\n   সমস্ত রেডিস কী পান।"
help_antiflood: "-\n\n`` {i} সেটফ্লুড <ইন্টিগার> `\n    একটি আড্ডায় বন্যার সীমা নির্ধারণ করুন।\n\n`` {i} Remflod`\n    একটি চ্যাট থেকে বন্যার সীমা সরান।\n\n`` {i} getflod`\n    একটি আড্ডার বন্যার সীমা পান।"
help_tools: "-\n\n`` {i} বৃত্ত `\n    ভিডিও নোট পেতে একটি অডিও গান বা জিআইএফ -এর জবাব দিন।\n\n`` {i} ls`\n    সমস্ত ফাইল একটি ডিরেক্টরি ভিতরে পান।\n\n`` {i} বটস\n    তাদের পারমা-লিঙ্কের সাথে বর্তমান চ্যাটে বটের সংখ্যা দেখায়।\n\n`` {i} hl <a লিঙ্ক> <পাঠ্য-বিকল্প> `\n    বার্তা হিসাবে একটি হোয়াইটস্পেসের সাথে লিঙ্কটি এম্বেড করে।\n\n`` {i} id`\n    এর আইডি পেতে একটি স্টিকারের জবাব দিন\n    একজন ব্যবহারকারীকে তার আইডি পেতে জবাব দিন\n    জবাব না দিয়ে আপনি চ্যাটের আইডি পাবেন\n\n`` {i} এসজি <কোনও ব্যবহারকারী> <ব্যবহারকারীর নাম/আইডি> `উত্তর দিন\n    উত্তরযুক্ত ব্যবহারকারীর তাঁর নামের ইতিহাস পান।\n\n`{i} tr <ডেসট ল্যাং কোড> <(উত্তর দিন) একটি বার্তা>`\n    অনুবাদ বার্তা পান।\n\n`` {i} ওয়েবশট <url> `\n    ওয়েবপৃষ্ঠার একটি স্ক্রিনশট পান।\n\n`` {i} শর্টুরল <url> <আইডি-বিকল্প> `\n    কোন url সংক্ষিপ্ত করুন ..."
