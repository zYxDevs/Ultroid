help_echo: "• `{i} addeCho <Ответить любому>`\n   Начать сообщение Auto Echo отвечаемого пользователя.\n\n• `{i} Remecho <Ответить любому>`\n   Выключи это\n\n• `{i} disteCho <Ответить любому>`\n   Чтобы получить список."
help_mediatools: "-\n\n• `{i} MediaInfo <Ответить на медиа>`\n   Чтобы получить информацию об этом.\n\n• `{i} rotate <градуал/угол> <Ответить на СМИ>`\n   Поверните любое видео/фото/носитель ..\n   Примечание: для видео это должен быть угол 90 -х годов"
help_mute: "-\n\n• `{i} mute <Ответить на MSG/ идентификатор пользователя>`\n    Морепет пользователь в текущем чате.\n\n• `{i} inecute <Ответить на MSG/ идентификатор пользователя>`\n    Закрепительный пользователь в текущем чате.\n\n• `{i} dmute <Ответить на MSG/ идентификатор пользователя>`\n    Морет пользователь в текущем чате, удалив MSGS.\n\n• `{i} undmute <Ответить на MSG/ Использовать ID>`\n    Закрепленное пользователь DATED в текущем чате.\n\n• `{i} tmute <Time> <Ответить на MSG/ Использовать ID>`\n    S- секунды\n    м- минуты\n    H- часов\n    дни\n    Морепет пользователь в текущем чате со временем."
help_pmpermit: "-\n\n• `{i} a` или` {i} одобрение\n    Одобрить кого -то в PM.\n\n• `{i} da` или` {i} не одобряет\n    Не одобряйте кого -то в PM.\n\n• `{i} block`\n    Заблокировать кого -то.\n\n• `{i} unblock` |`{i} разблокировать все\n    Разблокировать кого -то.\n\n• `{i} nologpm`\n    Прекратите регистрировать сообщения от пользователя.\n\n• `{i} logpm`\n    Начните регистрировать сообщения от пользователя.\n\n• `{i} startArchive`\n    Архив Новый ПМС.\n\n• `{i} Stop Archive\n    Не архивируйте новые PMS.\n\n• `{i} cleararchive`\n    Unarchive все чаты.\n\n• `{i} ListApproved`\n   Перечислите все утвержденные PMS."
help_snips: "-\n\n• `{i} addsnip <word> <ответить на сообщение>`\n    Добавьте используемое слово в качестве SNIP, относящегося к отвечаемому сообщению.\n\n• `{i} remsnip <word>`\n    Удалите слово snip ..\n\n• `{i} listsnip`\n    Перечислите все снеки.\n\n• Использовать :\n    Введите `$ (ur snip word)` получить ответ."
help_fileshare: "-\n\n• `{i} Store <prepet_to_message>`\n   Храните отвечаемое сообщение/носитель и генерируйте общую ссылку на этот файл, чтобы получить доступ через вашего помощника бота!\n\n• `{i} delstored <Ссылка сохраненного файла>`\n    Удалить сохраненный файл.\n\n• `{i} ListStored`\n   Получите все сохраненные сообщения.\n\n• Следуйте встроенном со своим помощником бота с «Filestore», чтобы увидеть сохраненные файлы в inline."
help_fedutils: "-\n\n• `{i} superfban <Ответить пользователю/userid/username>`\n    Fban человека во всех федералах, в которых вы являетесь администратором.\n\n• `{i} superunfban <Ответить пользователю/userid/username>`\n    Не-Fban Человек во всех федералах, в которых вы являетесь администратором.\n\nУкажите Fban Group и Feds, чтобы исключить в помощнике.\n\n• `{i} fStat <username/id/ответить пользователю>`\n    Соберите ФРС статистику человека в Роуз.\n\n• `{i} FedInfo <(fedId)>`\n    Соберите федерацию информации о данном идентификаторе ФРС или о владельце ФРС, от Розы."
help_other: "-\n\n• `{i} Отправить <username/id> <reply/type>`\n    Отправить сообщение пользователю/чату.\n\n• `{i} fwdreply <Ответить на msg>`\n    Ответьте чему -то MSG, пересылав его наедине.\n\n• `{i} Сохранить <Ответить сообщение>`\n    Сохраните этот ответ MSG для UR Saved Message Box.\n\n• `{i} fsave <Ответить сообщение>`\n    Перестаньте, что ответило на MSG на ваши сохраненные сообщения."
help_warn: "• `{i} Warn <Ответить пользователю> <Aons>`\n    Дает предупреждение.\n\n• `{i} ResetWarn <Ответить пользователю>`\n    Сбросить все предупреждает.\n\n• `{i} предупреждает <Ответить пользователю>`\n   Чтобы получить список предупреждений пользователя.\n\n• `{i} setWarn <warn count> |<ban/mute/kick> `\n   Установите номер в Warn Count для предупреждений\n   После посадки |'Mark Plte Action Like Ban/Mute/Kick\n   Его по умолчанию 3 удара\n   Пример: `setWarn 5 |Морет"
help_blacklist: "-\n\n• `{i} BlackList <Word/All Summes с пространством>`\n    Черный список выбранного слова в этом чате.\n\n• `{i} Remblacklist <word>`\n    Удалите слово из черного списка ..\n\n• `{i} ListBlackList`\n    Перечислите все слова с черным списком.\n\n  «Если человек использует черный список, его/ее MSG будет удалено '\n  'И вы должны быть администратором в этом чате'"
help_utilities: "-\n\n• `{i} Kickme`: оставляет группу.\n\n• `{i} date`: показать календаре.\n\n• `{i} listreserved`\n    Перечислите все имена пользователей (каналы/группы), которые у вас есть.\n\n• `{i} STATS`: См. Статистику вашего профиля.\n\n• `{i} paste` -` включить длинный текст / Ответить в текстовый файл.\n\n• `{i} info <username/userid/chatid>`\n    Ответьте чему -то MSG.\n\n• `{i} Пригласить <username/userId>`\n    Добавьте пользователя в чат.\n\n• `{i} rmbg <Ответить на PIC>`\n    Удалите фон с этой картинки.\n\n• `{i} Telegraph <Ответить на Media/text>`\n    Загрузите носитель/текст в Telegraph.\n\n• `{i} json <Ответить на msg>`\n    Получите кодирование сообщения JSON.\n\n• `{i} предложить <ответить на сообщение> или <title в опросе>`\n    Создайте опрос «да/нет» для ответного предложения.\n\n• `{i} ipinfo <ipaddress>`: получить информацию об этом IP -адресе.\n\n• `{i} cpy <ответить на сообщение>`\n   Скопируйте отвечаемое сообщение с форматированием. Истекает в 24 часах.\n• `{i} pst`\n   Вставьте скопированное сообщение с форматированием.\n\n• `{i} Thumb <Ответ -файл>`: Загрузите миниатюр отвечаемого файла.\n\n• `{i} getMsg <ссылка сообщения>`\n  Получите сообщения из чатов с ограничениями вперед/копирование."
help_bot: "• `{i} Alive` |`{i} живой inline`\n    Проверьте, работает ли ваш бот.\n\n• `{i} ping`\n    Проверьте время отклика Ультроида.\n\n• `{i} update`\n    См. Чанкологи, если есть обновление.\n\n• `{i} cmds`\n    Просмотреть все названия плагинов.\n\n• `{i} перезапуск\n    Чтобы перезапустить вашего бота.\n\n• `{i} logs (sys)`\n    Получите полные журналы терминала.\n• `{i} журналы Carbon`\n    Получите карбонизированные журналы Sys.\n• `{i} журналы Heroku`\n   Получите последние 100 строк журналов Heroku.\n\n• `{i} shutdown`\n    Выключите своего бота."
help_sudo: "-\n\n• `{i} addsudo`\n    Добавить пользователей SUDO, отвечая пользователю или используя <space> разделенные иид пользователей (ы)\n\n• `{i} delsudo`\n    Удалить пользователей SUDO, отвечая пользователю или используя <splape> разделенное иид пользователей (ы)\n\n• `{i} listsudo`\n    Перечислите всех пользователей SUDO."
help_fontgen: "• `{i} font <font name>: <Text>`\n    Создайте разные шрифты для текста.\n\n• `{i} font`\n    Чтобы получить список шрифтов"
help_usage: "• `{i} Использование\n    Получите общее использование.\n\n• `{i} Использование Heroku`\n   Получите статистику Heroku.\n\n• `{i} Использование DB`\n   Получите использование хранилища базы данных."
help_schedulemsg: "-\n\n• `{i} Расписание <Текст/Ответить на msg> <Time>`\n    Со временем вы можете использовать второе в качестве числа, или, например, 1H или 1M\n    например.`{i} Расписание Hello 100 'Он доставляет MSG через 100 сек.\n    например.`{i} Расписание привет 1H` он доставляет MSG через час."
help_downloadupload: "-\n\n• `{i} ul <path/to/file>`\n    Загрузить файлы на телеграмме.\n    Используйте следующие аргументы до или после имени файла в соответствии с требованием:\n      `-Stream` для загрузки как поток.\n      `-delete`, чтобы удалить файл после загрузки.\n      `-Нет, чтобы загрузить без миниатюры.\n\n• `{i} dl <fileName (необязательно)>`\n    Ответьте на файл для скачивания.\n\n• `{i} Скачать <ddl> (| fileName)`\n    Скачать с помощью DDL.Будет автогенутировать имя файла, если не дано."
help_variables: "-\n\n• `{i} получить var <Имя переменной>`\n   Получите значение заданного имени переменной.\n\n• `{i} получить тип <Имя переменной>`\n   Получите тип переменной.\n\n• `{i} получить db <Key>`\n   Получите значение DB данного ключа.\n\n• `{i} получить ключи\n   Получите все ключи Redis."
help_antiflood: "-\n\n• `{i} setflood <integer>`\n    Установите ограничение наводнения в чате.\n\n• `{i} remflood`\n    Удалите предел наводнения из чата.\n\n• `{i} getflood`\n    Получите предел наводнения чата."
help_tools: "-\n\n• `{i} Circle`\n    Ответьте на аудио -песню или GIF, чтобы получить видеометь.\n\n• `{i} ls`\n    Получите все файлы в каталоге.\n\n• `{i} Ботс\n    Показывает количество ботов в текущем чате с их Perma Link.\n\n• `{i} hl <a link> <text-optional>`\n    Внедряет ссылку с пробелом в качестве сообщения.\n\n• `{i} id`\n    Ответьте наклейку, чтобы получить свой идентификатор\n    Ответьте пользователю, чтобы получить свой идентификатор\n    Не отвечая, вы получите идентификатор чата\n\n• `{i} sg <Ответить пользователю> <пользователя/id>`\n    Получите историю его названия отвечаемого пользователя.\n\n• `{i} tr <dest lang code> <(ответить) сообщение>`\n    Получите переведенное сообщение.\n\n• `{i} webshot <url>`\n    Получите скриншот веб -страницы.\n\n• `{i} shortUrl <url> <id-optional>`\n    сократить любой URL ..."
help_webupload: "-\n\n• `{i} webUpload`\n    Загрузите файлы на другом сервере."
help_profanityfilter: "-\n\n• `{i} addProfanity`\n   Если кто -то отправляет плохое слово в чате, то бот удалит это сообщение.\n\n• `{i} Remprofanity`\n   Из чата из списка ненормативной лексики."
cmda: "✘ Доступны команды"
help_imagetools: "-\n\n• `{i} граница <Ответить на фото/наклейку>`\n    Чтобы создать границу вокруг этих средств массовой информации ..\n    Ex - `{i} граница 12,22,23`\n       - `{i} граница 12,22,23; ширина (по числу) `\n\n• `{i} grey <Ответить на любой медиа>`\n    Чтобы сделать это черным и белым.\n\n• `{i} color <Ответить на любой черный и белый носитель>`\n    Чтобы сделать это красочным.\n\n• `{i} toon <Ответить на любой медиа>`\n    Чтобы сделать это.\n\n• `{i} Опасность <Ответить на любые средства массовой информации>`\n    Чтобы это выглядело в опасности.\n\n• `{i} отрицательный <Ответить на любой медиа>`\n    Сделать негативное изображение.\n\n• `{i} blur <Ответить на любой медиа>`\n    Чтобы сделать это размытым.\n\n• `{i} Quad <Ответить на любой медиа>`\n    Создайте вихрь.\n\n• `{i} Зеркало <ответьте на любой медиа>`\n    Чтобы создать зеркальное фото.\n\n• `{i} Flip <Ответить на любой медиа>`\n    Чтобы он перевернул.\n\n• `{i} sketch <ответьте на любой медиа>`\n    Чтобы нарисовать свой эскиз.\n\n• `{i} Blue <Ответить на любой медиа>`\n    просто круто.\n\n• `{i} csample <Цветовое имя /Цветовой код>`\n   Пример: `{i} csample red`\n             `{i} csample #ffffff`\n\n• `{i} Pixelator <Ответ изображение>`\n    Создайте пиксельное изображение .."
help_instagram: "-\n\n• `{i} instadl <Instagram url>`\n  `Скачать Instagram Media ...`\n\n• `{i} enstadata <seername>`\n  `Получите данные в Instagram кого -то или самости\n\n• `{i} Instaul <Ответить видео/фото> <caption>`\n  `Загрузите медиа в Instagram ...`\n\n• `{i} igtv <Ответ видео> <caption>`\n  `Загрузить медиа в IGTV ...`\n\n• `{i} REELS <Ответ видео> <Pation>`\n  `Загрузите носитель на барабаны в Instagram ...`\n\n• Пойдите в соответствии с вашим помощником с запросом `instatm`\n   Чтобы получить сообщения на главной странице ...\n\n• Заполните `insta_username` и` insta_password`\n  Перед его использованием .."
help_fakeaction: "-\n\n• `{i} ftyping <Time/in secs>`\n    `Показать фальшивый набор в текущем чате.\n\n• `{i} faudio <Time/in secs>`\n    `Показать фальшивое действие записи в текущем чате.\n\n• `{i} fvideo <Time/in secs>`\n    `Показать фальшивое видео действий в текущем чате.\n\n• `{i} fgame <Time/in secs>`\n    `Показать фальшивый игровую игру в текущем чате.\n\n• `{i} fsticker <Time/in secs>`\n    `Показать поддельную наклейку, выбирая действие в текущем чате.\n\n• `{i} flock <Time/in secs>`\n    `Показать фальшивое место в текущем чате.\n\n• `{i} fcontact <Time/in secs>`\n    `Показать фальшивый контакт, выбирая действие в текущем чате.\n\n• `{i} fround <Time/in secs>`\n    `Показать фальшивое действие видео -сообщения в текущем чате.\n\n• `{i} fphoto <Time/in secs>`\n    `Показать фальшивую отправку фото в текущем чате.\n\n• `{i} fdocument <Time/in secs>`\n    `Показать фальшивую отправку документа в текущем чате."
help_converter: "-\n\n• `{i} конвертировать <gif/img/quiper/webm>`\n    Ответьте на носитель, чтобы преобразовать его в GIF / Image / Webm / обычная наклейка.\n\n• `{i} doc <filename.ext>`\n    Ответьте на текстовый MSG, чтобы сохранить его в файле.\n\n• `{i} open`\n    Ответьте на файл, чтобы раскрыть его текст.\n\n• `{i} rename <имя файла с расширением>`\n    Переименовать файл\n\n• `{i} Thumbnail <Ответ на Image/Thumbnail File>`\n    Загрузите свой файл с помощью пользовательской миниатюры."
help_autoban: "• `{i} Autokick <On/Off>`\n    на - включить.\n    Выкл - отключить.\n    Автоматически нажимайте новых присоединенных пользователей из группы.\n\n• `{i} cban`\n    Включить/отключить автобаннинг отправить в качестве канала в использованном чате.\n\n• `{i} addwl <username>`\n   Добавить канал в Whitelist Channelban.\n\n• `{i} remwl <username>`\n   Удалить канал из Whitelist Channelban.\n\n• `{i} listwl`: список всех белых каналов."
help_button: "-\n\n• `{i} кнопка <текст с кнопкой форматом\n   создать кнопку, которую вы также можете ответить на рис.\n\nФормат:- `{i} Кнопка Привет!@USEULTROID 😎.\n[Ультроид |t.me/theultroid!t.me/ultroidsupportchat |такой же]\n[Teamultroid |t.me/teamultroid] `"
help_videotools: "-\n\n• `{i} образец <продолжительность за секунды>`\n   Создает короткий образец видео ..\n\n• `{i} vshots <Количество снимков>`\n   Создает скриншот видео ..\n\n• `{i} vtrim <mart Time> - <End Time> В секундах\n    Обрезать длительное видео .."
help_words: "-\n\n• `{i} Значение <word>`\n    Получите значение слова.\n\n• `{i} синоним <word>`\n    Получите все синонимы.\n\n• `{i} antonym <word>`\n    Получите все антонимы.\n\n• `{i} ud <word>`\n    Получите Defenition от urbandictionary."
help_core: "-\n\n• `{i} установить <ответить на плагин>`\n    Чтобы установить плагин,\n  `{i} установить f\n    Чтобы заставить установку.\n\n• `{i} Уничтожить <имя плагина>`\n    Разгрузить и удалить плагин.\n\n• `{i} загрузить <имя плагина>`\n    Загрузить неофициальный плагин.\n\n• `{i} Unload <имя плагина>`\n    Разгрузить неофициальный плагин.\n\n• `{i} help <имя плагина>`\n    Показывает вам меню Help (например,) для каждого плагина.\n\n• `{i} getaddons <Raw ссылка на код>`\n    Загрузите плагины из данной необработанной ссылки."
help_globaltools: "-\n\n• `{i} gban <Ответ пользователь/ Имя пользователя>`\n• `{i} ungban`\n    Запрет/небан во всем мире.\n\n• `{i} gstat <ответить пользователю/userid/username>`\n   Проверьте, является ли пользователь GBAN.\n\n• `{i} listgban`: перечислить всех пользователей GBANNER.\n\n• `{i} gmute` | `{i} ungmute` <ответить пользователь/ имя пользователя>\n    Морет/звук глобально.\n\n• `{i} gkick <reply/username>` `` globally Kick user '\n• `{i} gcast <text/reply>` `Глобально отправлять MSG во всех grps`\n\n• `{i} gadmincast <text/reply>` `Глобально транслируется в ваших чатах администратора\n• `{i} gucast <text/reply>` `Глобально отправлять MSG во всех пользователях PM\n\n• `{i} gblacklist <идентификатор чата/имя пользователя/ничего (для текущего чата)`\n   Добавьте чат в BlackList и игнорируют глобальную трансляцию.\n• `{i} ungblacklist`` Удалить чат из BlackList.\n\n• `{i} gpromote <ответить пользователю> <канал/группа/все> <rank>`\n    глобально продвигать пользователя, где вы находитесь\n    - Установите, продвигать ли продвигать только группы/каналы/все.\n    Например, Gpromote Group Boss` ~ продвигает пользователя во всех GRP.\n        `gpromote @Username All SAR` ~ Продвигайте пользователя во всей группе и канале\n• `{i} gdemote` -` demote пользователь по всему миру"
help_filter: "-\n\n• `{i} addFilter <word> <ответить на сообщение>`\n    Добавьте используемое слово в качестве фильтра, связанного с отвеченным сообщением.\n\n• `{i} remfilter <word>`\n    Удалите отфильтрованного пользователя ..\n\n• `{i} ListFilter`\n    Перечислите все фильтры."
help_afk: "-\n\n• `{i} afk <необязательная причина>`\n    AFK означает вдали от клавиатуры,\n    После того, как это активируется, если кто -то помечает вам или сообщает вам, он/она получит автоматический ответ от бота.\n\n    (Примечание. Установите файл медиа в сообщениях AFK, отвечая на любой носитель с помощью `{i} afk <sound>`)."
help_broadcast: "• `{i} addch <id/ответить в список/none>`\n    Добавьте чат в базу данных.Добавляет текущий чат, если не указан идентификатор.\n\n• `{i} remch <all/id/ne>`\n    Удаляет указанный чат (текущий чат, если не указан) или все чаты.\n\n• `{i} трансляция <ответить на msg>`\n    Отправьте ответное сообщение во все чаты в базе данных.\n\n• `{i}\n     Переместите сообщение во все чаты в базе данных.\n\n• `{i} ListChannels`\n    Чтобы получить список всех добавленных чатов."
help_resize: "-\n\n• `{i} size <Ответить на медиа>`\n   Чтобы получить размер этого.\n\n• `{i} resize <cumber> <cumber>`\n   Чтобы изменить размер изображения на x, y -ось.\n   например.`{i} Изменение размера 690 960`"
help_giftools: "• `{i} invertgif`\n  Сделайте GIF перевернут (негатив).\n\n• `{i} bwgif`\n  Сделать GIF черно -белый\n\n• `{i} rvgif`\n  Обратите внимание на GIF\n\n• `{i} vtog`\n  Ответьте на видео, он создаст GIF\n  Видео к GIF\n\n• `{i} gif <Query>`\n   Отправить видео относительно запроса."
help_vctools: "-\n\n• `{i} startVC`\n    Начать группу звоните в группе.\n\n• `{i} stopvc`\n    Остановите группу звонок в группе.\n\n• `{i} vctitle <Title>`\n    Измените звонок за титульную группу.\n\n• `{i} vcinvite`\n    Пригласите всех членов группы в групповом звонке.\n    (Вы должны быть присоединены)"
help_extra: "-\n\n• `{i} del <Ответить на сообщение>`\n    Удалить отвечаемое сообщение.\n\n• `{i} РЕДАКТИРОВАТЬ <Новое сообщение>`\n    Отредактируйте свое последнее сообщение или ответили MSG.\n\n• `{i} копировать <ответить на сообщение>`\n    Копия отвечает сообщение / СМИ.\n\n• `{i} Ответить\n    Ответьте последним отправленным MSG ответить пользователю."
help_audiotools: "✘ Доступны команды -\n`.makevoice <Ответить на аудио>`\n   Создает голосовую заметку из Audio.\n\n`.ATRIM <Со времени> - <TOME>`\n   Тримить аудио в соответствии с данным времени.\n   Время должно быть в секундах.`.atrim 50-70`\n\n`.extractaudio <Ответить на СМИ>`\n   Чтобы извлечь из него звук."
help_chatbot: "-\n\n• `{i} addai <Ответить пользователю/Дайте userName/userId>`\n   Добавьте AI Chatbot, чтобы ответить этому пользователю.\n\n• `{i} remai <Ответить пользователю/Дайте userName/userId>`\n   Удалите чат -бот ИИ.\n\n• `{i} repai <ответить пользователю/дать сообщение>`\n   Ответьте пользователю с помощью сообщения AI.\n\n• `{i} listai`\n   Перечислите в настоящее время AI добавлены пользователей."
help_ziptools: "• `{i} Zip <Ответить на файл>`\n    Застегивает ответный файл\n    Чтобы установить пароль на Zip: `{i} Zip <shours>` Ответить на файл\n\n• `{i} unzip <ответить на Zip File>`\n    Разарзание отвечаемого файла.\n\n• `{i} azip <ответить на файл>`\n   Добавить файл в партию для загрузки партии Zip\n\n• `{i} dozip`\n   Загрузите пакет Zip файлы, которые вы добавили из `{i} azip`\n   Чтобы установить пароль: `{i} dozip <пароль>`"
help_devtools: "-\n\n• `{i} bash <mmds>`\n• `{i} bash -c <mmds>` Углеродное изображение как выход команды.\n    Запустите команды Linux на Telegram.\n\n• `{i} eval <code>`\n    Оценить команды Python на телеграмме.\n    Ярлыки:\n        client = bot = event.client\n        E = событие\n        p = print\n        Ответить = await event.get_reply_message ()\n        чат = event.chat_id\n\n• `{i} cpp <code>`\n    Запустите C ++ код из Telegram.\n\n• `{i} sysinfo`\n    Показывает системную информацию."
help_beautify: "-\n\n• `{i} Carbon <Текст/Ответить на MSG/Ответ на документ>`\n    Карбонизируйте текст с настройками по умолчанию.\n\n• `{i} rcarbon <Текст/Ответить на MSG/Ответ на документ>`\n    Карбонизируйте текст, со случайными цветами BG.\n\n• `{i} ccarbon <color> <Текст/Ответить на MSG/Ответить на документ>`\n    Карбонизируйте текст, с пользовательскими цветами BG.\n\n• `{i} rayso <opt-theme> <text>/<ответить на сообщение>`\n  `{i} Rayso List` -` Получить список тем."
help_chats: "-\n\n• `{i} delchat <необязательный- имя пользователя/id>`\n    Удалить группу. Этот CMD используется.\n\n• `{i} getLink`\n• `{i} getLink R` -` Создать ссылку с утверждением администратора\n• `{i} getLink R Title_Here` -` Административный одобрение с названием ссылки\n• `{i} getLink 10` -` Ограничение использования в новой ссылке\n    Получите ссылку на группу, в этом CMD используется.\n\n• `{i} create (g | b | c) <group_name>;<необязательное имя имени> `\n    Создайте группу Woth конкретное имя.\n    G - Megagroup/Supergroup\n    B - небольшая группа\n    C - канал\n\n• `{i} setgpic <Ответить на фото> <chate username>`\n    Установите профиль фото группы.\n\n• `{i} delgpic <чат пользователя -имени -Optional>`\n    Удалить профиль фото группы.\n\n• `{i} unbanall`\n    Отказ всех членов группы.\n\n• `{i} rmusers\n    Удалить пользователей конкретно."
help_channelhacks: "🔹 `{i} shift <из канала> |<to Channel> `\n     Это перенесет весь старый пост из канала A на канал B.\n      (Вы можете использовать имя пользователя или идентификатор канала тоже)\n      Пример: `{i} shift @abc |@xyz`\n      [Примечание - это ('|') Знак - это Nessesary]\n\n🔹 Для автоматической публикации/пересылки всего нового сообщения из любого исходного канала в любой канал назначения.\n\n   `{i} asource <имени пользователя или id>`\n      Это добавление исходного канала в базу данных\n   `{i} dsource <Имя пользователя или id>`\n      Это удаляет исходные каналы из базы данных\n   `{i} listsource <имени пользователя канала или идентификатор>`\n      Показать список исходных каналов\n\n\n   `{i} adest <имя пользователя канала или id>`\n      Это добавляет UR -каналы в базу данных\n   `{i} ddest <имя пользователя или id>`\n      Это удалить UR -каналы из базы данных\n   `{i} listdest <имя пользователя или id>`\n      Показать список ваших каналов\n\n   'Вы можете установить много каналов в базе данных'\n   'Для активации Auto-Post используйте `{i} setdb autopost true`' '"
help_asstcmd: "-\n\n• `{i} addcmd <new cmd> <prepet>`\n   Он установит новый CMD для вашего помощника бота с этим ответным сообщением.\n\n• `{i} remcmd <cmd name>`\n   Это удалит ваш cmd.\n\n• `{i} listCmd`\n   Чтобы получить список всех ваших пользовательских CMD."
help_search: "-\n\n• `{i} saavn <Поисковый запрос>`\n    Скачать песни из Saavn.\n\n• `{i} Google <Query>`\n    Для поиска Google.\n\n• `{i} github <seername>`\n    Получите полную информацию о профиле пользователей GitHub.\n\n• `{i} img <Query>`\n  `{i} img <Query>;<Нет результатов> `\n    Для поиска изображений.\n\n• `{i} reverse`\n    Ответьте на изображение или наклейку, чтобы найти его соус."
help_calculator: "-\n\n• `{i} Calc` - встроенный калькулятор"
help_notes: "-\n\n• `{i} addnote <word> <ответить на сообщение>`\n    Добавьте примечание в используемом чате с ответным сообщением и выбранным словом.\n\n• `{i} remnote <word>`\n    Удалите заметку из использованного чата.\n\n• `{i} ListNote`\n    Перечислите все заметки.\n\n• Использовать :\n   Установите заметки в группе, чтобы все могли использовать его.\n   введите `#(ключевое слово note)` Чтобы получить его"
help_qrcode: "-\n\n• `{i} qrcode <text/ответить на текст>`\n   `Делает QRCode текста\n\n• `{i} addQr <Ответ изображение> <Text>`\n   `Сделает QR текста и добавьте его в изображение.\n\n• `{i} qrdecode <ответить на qrcode>`\n   `Это декодирует qrcode."
help_tag: "-\n\n• `{i} tagall`\n    Tag Top 100 участников чата.\n\n• `{i} Tagadmins`\n    Теги администраторов этого чата.\n\n• `{i} Taghouler`\n    Владелец этого чата\n\n• `{i} Tagbots`\n    Теги ботов этого чата.\n\n• `{i} tagrec`\n    Tag недавно активные участники.\n\n• `{i} tagon`\n    Теги онлайн -участников (работайте только в случае конфиденциальности).\n\n• `{i} tagoff`\n    Tag Offline участники (работайте только в случае конфиденциальности)."
help_greetings: "-\n\n---- Приветствует ----\n• `{i} setwelcome <Сообщение/Ответить на сообщение>`\n    Установите приветственное сообщение в текущем чате.\n\n• `{i} clearWelcome\n    Удалить приветствие в текущем чате.\n\n• `{i} getWelcome\n    Получите приветственное сообщение в текущем чате.\n\n---- До свидания ----\n• `{i} setgoodbye <Сообщение/Ответить на сообщение>`\n    Установите Goodbye Message в текущем чате.\n\n• `{i} cleargoodbye`\n    Удалить прощание в текущем чате.\n\n• `{i} getgoodbye`\n    Получите прощальное сообщение в текущем чате.\n\n• `{i} Спасибо, внедряют/выключите\n    Отправьте наклейку с благодарностью за то, чтобы ударить участников 100*х в ваших группах."
help_stickertools: "-\n\n• `{i} Уничтожить <Ответ на анимированную наклейку>`\n    Чтобы уничтожить наклейку.\n\n• `{i} Tiny <Ответить на медиа>`\n    Создать крошечные наклейки.\n\n• `{i} kang <Ответить на изображение/наклейка>`\n    Кан, наклейка (добавьте в свой пакет).\n\n• `{i} packkang <имя пакета>`\n    Kang Полный набор наклеек (с пользовательским именем).\n\n• `{i} Round <Ответить на любой медиа>`\n    Чтобы извлечь круглую наклейку."
help_locks: "-\n\n• `{i} Lock <MSGS/Media/Sticker/Gif/Games/inline/polls/Investies/PIN/ChangeInfo>`\n    Заблокируйте используемую настройку в использованной группе.\n\n• `{i} разблокировать <msgs/media/quiper/gif/games/inline/polls/invites/pin/changeinfo>`\n    Разблокируйте используемую настройку в использованной группе."
help_polls: "-\n\n• `{i} опрос <Вопрос>;<опция>;<опция> `\n    Получить анонимный опрос с данными вариантами\n\n• `{i} опрос <Вопрос>;<опция>;<Опция> |<Тип> `\n    Получите опрос, указанный с желаемым типом!\n    Тип должен быть любым из `public`,` несколько\n\n• `{i} опрос <Вопрос>;<опция>;<Опция> |quiz_ <отвечающий\n    Получите опрос викторины, где ответ на ответ является правильным"
help_cleanaction: "-\n\n• `{i} addClean`\n    Очистите все предстоящие действия MSG в добавленном чате, как кто -то присоединился/слева/PIN -код и т. Д.\n\n• `{i} remClean`\n    Удалить чат из базы данных.\n\n• `{i} ListClean`\n   Чтобы получить список всех чатов, где он активирован."
help_unsplash: "-\n\n• {i} unsplash <поисковый запрос>;<Нет фото>\n    Unsplash Image Search."
help_misc: "-\n\n• `{i} eod`\n    `Получите событие сегодняшнего дня\n\n• `{i} pntrst <link/id>`\n    Скачать и отправить Pinterest Pins\n\n• `{i} Гаджет <Поисковый запрос>`\n    Поиск гаджета из Telegram.\n\n• `{i} Randomuser`\n   Создайте подробности о случайном пользователе.\n\n• `{i} ascii <Ответ изображение>`\n    Конверт ответил изображение в HTML."
help_profile: "-\n\n• `{i} setName <Имя // Фамилия>`\n    Измените имя своего профиля.\n\n• `{i} setbio <bio>`\n    Измените биографию профиля.\n\n• `{i} setpic <Ответить на PIC>`\n    Измените фото профиля.\n\n• `{i} delpfp <n> (необязательно)`\n    Удалите одно профиль картинки, если не указано, иначе удалите n количество фото.\n\n• `{i} poto <seername>`\n    Загрузите фото чата/пользователя, если таковые имеются."
help_database: "-\n\n• ** Команды базы данных, не используйте, если вы не знаете, что это такое. **\n\n• `{i} cetdb клавиша |значение\n    Установить значение в базе данных.\n    например:\n    `{i} setdb Привет,\n    `{i} setdb Привет |ультраидный здесь '\n    `{i} setdb -extend value value` или` {i} setdb -e value value 'Чтобы добавить значение к значениям выхода в DB.\n\n• `{i} deldb Key`\n    Удалить ключ из DB.\n\n• `{i} rendb Old KeyName |Новое ключевое имя\n    Обновите имя ключа"
help_admintools: "-\n\n•.\n• `.demote`\n    Продвигайте/понизите пользователя в чате.\n\n• `.ban <Ответить пользователю/userid/username> <sonse>`\n• `.unban '\n    Запретите/отмените пользователя из чата.\n\n• `.kick <Ответить пользователю/userid/username> <sonse>`\n    Наденьте пользователя из чата.\n\n• `.pin <Ответить на сообщение>`\n    Прикрепите сообщение в чате\n• `.tpin <Time> <Сообщение Temp Pin>`\n• `.unpin (все) <Ответить на сообщение>`\n    Не отключите сообщения в чате.\n\n• `.pinned`\n   Получите прикрепленное сообщение в текущем чате.\n• `.listpinned`\n   Получить все закрепленные сообщения в текущем чате\n\n• `.AutoDelete <24H/7D/1M/OFF>`\n   Включить автоматические удаления сообщений в чате.\n\n• `.purge <Ответить на сообщение>`\n    Очистить все сообщения из отвечаемого сообщения.\n\n• `.purgeme <Ответить на сообщение>`\n    Очистите только ваши сообщения из отвечаемого сообщения.\n\n• `.purgeall`\n    Удалите все MSG отвечаемого пользователя."
help_logo: "-\n\n• `{i} логотип <Text>`\n   Генерировать логотип данного текста\n   Или ответьте на изображение, чтобы написать ваш текст на нем.\n   Или ответьте на файл шрифта, чтобы написать этим шрифтом."
help_specialtools: "-\n\n• `{i} wspr <username>`\n    Отправить секретное сообщение ..\n\n• `{i} Q <Color-optional>`\n• `{i} Q @username`\n• `{i} q r <color-optional>`\n• `{i} q count`:` несколько кавычек\n    Создайте цитаты ..\n\n• `{i} наклейка <Query>`\n    Поисковые наклейки по вашему желанию ..\n\n• `{i} getaudio <Ответить на аудио>`\n    Скачать Audio, чтобы поместить в ваше желаемое видео/GIF.\n\n• `{i} addaudio <Ответить на видео/GIF>`\n    Это поместит вышеупомянутое звук в ответное видео/GIF.\n\n• `{i} dob <дата рождения>`\n    Поместите только в формате DD/MM/YY (например, DOB 01/01/1999).\n\n• `{i} Wall <Query>`\n    Поиск HD обои согласно вашему желанию .."

