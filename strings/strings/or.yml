help_admintools: "-\n\n•। ପ୍ରୋଟୋଟେଟ୍ <ଉପଯୋଗକର୍ତ୍ତା / ୟୁଜର୍ / ଉପଯୋଗକର୍ତ୍ତା ନାମ> `\n• .Demote '\n    ଚାଟରେ ଉପଭୋକ୍ତାଙ୍କୁ ପ୍ରୋତ୍ସାହିତ କରନ୍ତୁ / ଭାଙ୍ଗନ୍ତୁ |\n\n•। '.Ban <ଉପଭୋକ୍ତା / ୟୁଜର୍ / ଉପଯୋଗକର୍ତ୍ତା ନାମ> <କାରଣ>`\n•। `.Nanban`\n    ଚାଟରୁ ଚାଳକକୁ ନିଷିଦ୍ଧ କରନ୍ତୁ / ଅବିବାହିତ କରନ୍ତୁ |\n\n•। '.Kick <ୟୁଜର୍ / ୟୁଜର୍ / ଉପଯୋଗକର୍ତ୍ତା ନାମ> <କାରଣ>`\n    ଚାଟୁ ଚାଳକକୁ ଚାଳକକୁ କିକ୍ କରନ୍ତୁ |\n\n• `.Pin <ବାର୍ତ୍ତା>`\n    ଚାଟ୍ ରେ ବାର୍ତ୍ତା ପିନ୍ କରନ୍ତୁ |\n•। '.TOPIN <ସମୟ> <ଟେମ୍ପ୍ ପିନ୍ ବାର୍ତ୍ତା>`\n•। '.UNPIN (ସମସ୍ତ) <ମେସେଜ୍> ଉତ୍ତର>`\n    ଚାଟ୍ ରେ ବାର୍ତ୍ତାଗୁଡ଼ିକୁ ଅନ୍ପାଇନ୍ କରନ୍ତୁ |\n\n•। '। ଭଣ୍ଡାର\n   ସାମ୍ପ୍ରତିକ ଚାଟ୍ ରେ ପିନିଡ୍ ବାର୍ତ୍ତା ପାଆନ୍ତୁ |\n• `। ବିଦ୍ୟମାନ\n   ସାମ୍ପ୍ରତିକ ଚାଟ୍ ରେ ସମସ୍ତ ପିନେଡ୍ ବାର୍ତ୍ତା ପାଆନ୍ତୁ |\n\n•। '.ଆଡୋଡେଲେଟ୍ <24h / 7d / 1m / off>`\n   ଚାଟ୍ ରେ ଅଟୋ ଡିଲିଟ୍ ମେସେଜ୍ ସକ୍ଷମ କରନ୍ତୁ |\n\n• `.purge <ବାର୍ତ୍ତା>'\n    ଉତ୍ତରପ୍ରାପ୍ତ ବାର୍ତ୍ତାରୁ ସମସ୍ତ ସନ୍ଦେଶକୁ ଶୁଦ୍ଧ କରନ୍ତୁ |\n\n• `.ପୁରଗେମ୍ <ମେସେଜ୍ କୁ ଉତ୍ତର>`\n    ଉତ୍ତରପ୍ରାପ୍ତ ବାର୍ତ୍ତାରୁ କେବଳ ଆପଣଙ୍କର ବାର୍ତ୍ତା ଶୁଦ୍ଧ କରନ୍ତୁ |\n\n•। '.ପୁରୋଜିଲ୍ |\n    ଉତ୍ତର ପ୍ରଦେଶର ସମସ୍ତ msgs ଡିଲିଟ୍ କରନ୍ତୁ |"
