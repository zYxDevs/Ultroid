help_fedutils: "-\n\n• `{i} Superfban <उपयोगकर्ता/userid/username>` का उत्तर दें\n    सभी खिलाए गए व्यक्ति में वह व्यक्ति है जिसमें आप व्यवस्थापक हैं।\n\n• `{i} Superunfban <उपयोगकर्ता/userid/username>` का उत्तर दें\n    अन-फबन उस व्यक्ति को सभी खिलाया जिसमें आप व्यवस्थापक हैं।\n\nFBAN समूह को निर्दिष्ट करें और सहायक को बाहर करने के लिए खिलाया।\n\n• `{i} fstat <उपयोगकर्ता नाम/id/उत्तर उपयोगकर्ता>`\n    गुलाब में व्यक्ति की फेड स्टेट इकट्ठा करें।\n\n• `{i} फेडिनफो <(फेडिड)>`\n    दिए गए फेड आईडी की फेडरेशन जानकारी, या फेड फेड यू ओन, रोज़ से एकत्र करें।"
gms_1: "एक मान्य संदेश लिंक प्रदान करें!"