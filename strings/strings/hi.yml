help_echo: "• `{i}addecho <रिप्लाई>`\n   रिप्लाई किए गए यूज़र के संदेशों को कॉपी करें।\n\n• `{i}remecho <रिप्लाई>`\n   इसे बंद करें\n\n• `{i}listecho`\n   जोड़े गए लोगों की सूची पाने के लिए।"
help_mediatools: "-\n\n• `{i}mediainfo <मीडिया पर रिप्लाई>`\n   किसी मीडिया के बारे में अधिक जानकारी प्राप्त करने के लिए।\n\n• `{i}rotate <degree/angle> <मीडिया पर रिप्लाई>`\n   किसी भी वीडियो/फोटो/मीडिया को घुमाएं ।।\n   नोट: वीडियो के लिए यह 90 के कोण होना चाहिए"
help_mute: "-\n\n• `{i}mute <रिप्लाई / यूजर ID>`\n    वर्तमान चैट में उपयुक्त यूज़र को म्यूट करें।\n\n• `{i}unmute <रिप्लाई/ यूज़र ID>`\n    वर्तमान चैट में उपयुक्त यूज़र को अनम्यूट करें।\n\n• `{i}dmute <रिप्लाई/ यूज़र ID>`\n     वर्तमान चैट में उपयुक्त यूज़र के संदेशों को नष्ट कर म्यूट करें।\n\n• `{i}undmute <रिप्लाई/ यूज़र ID>`\n    मौजूदा चैट में dmuted यूज़र को undmute करें।\n\n• `{i}tmute <time> <रिप्लाई/ यूजर ID>`\n    s- सेकंड\n    m- मिनट\n    h- घंटे\n    d- दिन\n    वर्तमान चैट में उपयुक्त यूज़र को निर्धारित समय के लिए म्यूट करें।"
help_pmpermit: "-\n\n• `{i}a` या `{i}approve`\n    व्यक्तिगत मैसेज करने की मंजूरी दें।\n\n• `{i}da` या `{i}disapprove`\n    व्यक्तिगत मैसेज को अस्वीकृत करे।\n\n• `{i}block`\n    यूजर को ब्लॉक करें।\n\n• `{i}unblock` |`{i}unblock all`\n    यूज़र को अनब्लॉक करें (किसी एक अथवा सभी)।\n\n• `{i}nologpm`\n    उपयुक्त यूज़र के मैसेजों को सहेजना बंद करें।\n\n• `{i}logpm`\n    उपयुक्त यूज़र के मैसेजो को सहेजें।\n\n• `{i}startarchive`\n    नए व्यक्तिगत संदेशों को आर्काइव में डालें।\n\n• `{i}stoparchive`\n    नए व्यक्तिगत संदेशों को संहेज बंद करें।\n\n• `{i}cleararchive`\n    आर्काइव से सभी चैट को निकाले।\n\n• `{i}listapproved`\n   व्यक्तिगत संदेश में स्वीकृत लोगों को सूचीबद्ध करें।"
help_snips: "-\n\n• `{i}addsnip <शब्द><रिप्लाई>`\n    उपयुक्त शब्द का प्रयोग रिप्लाई से संबंधित SNIP के रूप में करें।\n\n• `{i}remsnip <शब्द>`\n   SNIP से शब्द हटाएं।\n\n• `{i}listsnip`\n    सभी SNIPS को सूचीबद्ध करें।\n\n•    प्रयोग:   टाइप करें `$(शब्द)`।"
help_fileshare: "-\n\n• `{i}store <उत्तर_टो_मेसेज>`\n   उत्तरित संदेश/मीडिया को स्टोर करें और अपने सहायक बॉट के माध्यम से एक्सेस करने के लिए उस फ़ाइल के लिए एक साझा करने योग्य लिंक उत्पन्न करें!\n\n• `{i}delstored <संग्रहीत फ़ाइल का लिंक>`\n    संग्रहीत फ़ाइल हटाएं।\n\n• `{i}liststored`\n   सभी संग्रहीत संदेश प्राप्त करें।\n\n• इनलाइन में संग्रहीत फ़ाइलों को देखने के लिए `फ़िलस्टोर` के साथ अपने सहायक बॉट के साथ इनलाइन पर जाएं।"
help_other: "-\n\n• `{i}send <उपयोगकर्ता नाम/आईडी> <उत्तर/प्रकार>`\n    उपयोगकर्ता/चैट को संदेश भेजें।\n\n• `{i}fwdreply <MSG>` का उत्तर दें\n    किसी के संदेश को निजी तौर पर अग्रेषित करके उत्तर दें।\n\n• `{i}save <उत्तर संदेश>`\n    सहेजें MSG को उर सहेजे गए संदेश बॉक्स में सहेजें।\n\n• `{i}fsave <उत्तर संदेश>`\n    आगे जो कि संदेश को सहेजे गए संदेशों के लिए उत्तर दिया।"
help_warn: "• `{i}warn <उपयोगकर्ता का उत्तर> <कारण>`\n    चेतावनी देता है।\n\n• `{i}resetwarn <उपयोगकर्ता को उत्तर दें>`\n    सभी चेतावनी को रीसेट करने के लिए।\n\n• `{i} चेतावनी देता है <उपयोगकर्ता का उत्तर>`\n   उपयोगकर्ता की चेतावनी की सूची प्राप्त करने के लिए।\n\n• `{i} setwarn <Warn Count> |<प्रतिबंध/म्यूट/किक> `\n   चेतावनी के लिए वार्न काउंट में नंबर सेट करें\n   डालने के बाद '|'मार्क ने प्रतिबंध/मूक/किक जैसी कार्रवाई की\n   इसका डिफ़ॉल्ट 3 किक\n   उदाहरण: `SetWarn 5 |म्यूट`"
help_blacklist: "-\n\n• `{i}blacklist <शब्द/सभी शब्द एक स्थान के साथ>`\n    उस चैट में चुने हुए शब्द को ब्लैकलिस्ट करें।\n\n• `{i}remblacklist <वर्ड>`\n    ब्लैकलिस्ट से शब्द निकालें ।।\n\n• `{i} listblacklist`\n    सभी ब्लैकलिस्ट किए गए शब्दों को सूचीबद्ध करें।\n\n  'यदि कोई व्यक्ति ब्लैकलिस्ट शब्द का उपयोग करता है तो उसका संदेश हटा दिया जाएगा'\n  'और यू उस चैट में व्यवस्थापक होना चाहिए'"
help_utilities: "-\n\n• `{i}kickme`: समूह छोड़ देता है।\n\n• `{i} दिनांक`: कैलेंडर दिखाएं।\n\n• `{i}listreserved`\n    सभी उपयोगकर्ता नाम (चैनल/समूह) को सूचीबद्ध करें।\n\n• `{i}stats`: अपने प्रोफ़ाइल आँकड़े देखें।\n\n• `{i} पेस्ट` -` लंबे पाठ को शामिल करें / पाठ फ़ाइल का उत्तर दें। `\n\n• `{i} जानकारी <उपयोगकर्ता नाम/userid/chatid>`\n    किसी के संदेश को उत्तर दें।\n\n• `{i} आमंत्रित करें <username/userid>`\n    चैट में उपयोगकर्ता जोड़ें।\n\n• `{i} rmbg <पिक्चर का जवाब>`\n    उस तस्वीर से पृष्ठभूमि निकालें।\n\n• `{i} टेलीग्राफ <मीडिया/पाठ का उत्तर>`\n    टेलीग्राफ में मीडिया/पाठ अपलोड करें।\n\n• `{i} json <उत्तर का उत्तर>`\n    संदेश के JSON एन्कोडिंग प्राप्त करें।\n\n• `{i} सुझाव <संदेश का उत्तर दें> या <पोल शीर्षक>`\n    उत्तर दिए गए सुझाव के लिए एक हां/नहीं पोल ​​बनाएं।\n\n• `{i} ipinfo <iPaddress>`: उस IP पते के बारे में जानकारी प्राप्त करें।\n\n• `{i} cpy <संदेश का उत्तर>`\n   फॉर्मेटिंग के साथ उत्तरित संदेश को कॉपी करें। 24hrs में समाप्त हो रहा है।\n• `{i} pst`\n   प्रारूपण के साथ कॉपी किए गए संदेश को पेस्ट करें।\n\n• `{i} अंगूठे <उत्तर फ़ाइल>`: उत्तरित फ़ाइल का थंबनेल डाउनलोड करें।\n\n• `{i} getMSG <संदेश लिंक>`\n  आगे/कॉपी प्रतिबंधों के साथ चैट से संदेश प्राप्त करें।"
help_bot: "• `{i}alive` |`{i}alive inline`\n    जांचें कि क्या आपका बॉट काम कर रहा है।\n\n• `{i}ping`\n    अल्ट्रॉइड की प्रतिक्रिया समय की जाँच करें।\n\n• `{i}update`\n    यदि कोई अद्यतन उपलब्ध है, तो Changelogs देखें।\n\n• `{i} cmds`\n    सभी प्लगइन नाम देखें।\n\n• `{i} पुनरारंभ`\n    अपने बॉट को पुनरारंभ करने के लिए।\n\n• `{i} लॉग (sys)`\n    पूर्ण टर्मिनल लॉग प्राप्त करें।\n• `{i} लॉग कार्बन`\n    कार्बोनेटेड SYS लॉग प्राप्त करें।\n• `{i} लॉग हेरोकू`\n   हरोकू लॉग की नवीनतम 100 लाइनें प्राप्त करें।\n\n• `{i} शटडाउन`\n    अपना बॉट बंद करें।"
help_sudo: "-\n\n• `{i} addsudo`\n    उपयोगकर्ता को जवाब देकर या <स्पेस> सेपरेटेड यूजरआईडी (एस) का उपयोग करके सूडो उपयोगकर्ता जोड़ें\n\n• `{i}delsudo`\n    उपयोगकर्ता को जवाब देकर या <स्पेस> सेपरेटेड यूजरआईडी (एस) का उपयोग करके सूडो उपयोगकर्ताओं को निकालें\n\n• `{i} listsudo`\n    सभी SUDO उपयोगकर्ताओं को सूचीबद्ध करें।"
help_fontgen: "• `{i}font <फोंट का नाम> : <शब्द>`\n    अपने शब्द को अलग-अलग फोंट में प्रदर्शित करें।\n\n• `{i}font`\n    उपलब्ध फोंट की सूची प्राप्त करने के लिए"
help_usage: "• `{i}usage`\n    अपने होस्ट की usage की जानकारी प्राप्त करें।\n\n• `{i}usage heroku`\n   heroku dyno की जानकारी प्राप्त करें।\n\n• `{i}usage db`\n   अपने डेटाबेस के स्टोरेज की प्राप्त करें।"
help_schedulemsg: "-\n\n• `{i}schedule <मैसेज/रिप्लाई> <समय>`\n    समय में यू दूसरे नंबर के रूप में, या 1h या 1m की तरह उपयोग कर सकते हैं\n    जैसे।`{i} शेड्यूल हैलो 100` यह 100 सेकंड के बाद MSG वितरित करता है।\n    जैसे।`{i} शेड्यूल हैलो 1h` यह एक घंटे के बाद संदेश देता है।"
help_downloadupload: "-\n\n• `{i}ul <फाइल/का/स्थान>`\n    टेलीग्राम पर फाइल अपलोड करें।\n    आवश्यकतानुसार फ़ाइल नाम से पहले या बाद में निम्नलिखित तर्कों का उपयोग करें:\n      `--stream` वीडियो को stream में अपलोड करें।\n      `--delete` अपलोड करने के बाद फ़ाइल को डिलीट करें।\n      `--no-thumbnail` बिना thumbnail के अपलोड करें।\n\n• `{i}dl <filename (वैकल्पिक)>`\n    टेलीग्राम फाइल को डाउनलोड करें।\n\n• `{i}download <ddl> (| फ़ाइल का नाम (वैकल्पिक))`\n    किसी डायरेक्ट link (url) को डाउनलोड करें।"
help_variables: "-\n\n• `{i} var <चर नाम>` प्राप्त करें\n   दिए गए चर नाम का मान प्राप्त करें।\n\n• `{i} टाइप करें <चर नाम>`\n   चर प्रकार प्राप्त करें।\n\n• `{i} db <key>` प्राप्त करें\n   दी गई कुंजी का DB मान प्राप्त करें।\n\n• `{i} Keys`\n   सभी रेडिस कुंजियाँ प्राप्त करें।"
help_antiflood: "-\n\n• `{i}setflood <संख्या>`\n    एक चैट में बाढ़ की सीमा निर्धारित करें।\n\n• `{i} रेमफ्लड`\n    एक चैट से बाढ़ की सीमा निकालें।\n\n• `{i} getflood`\n    एक चैट की बाढ़ सीमा प्राप्त करें।"
help_tools: "-\n\n• `{i}circle`\n    वीडियो नोट प्राप्त करने के लिए एक ऑडियो या GIF pr उत्तर दें।\n\n• `{i} ls`\n    एक निर्देशिका के अंदर सभी फाइलें प्राप्त करें।\n\n• `{i} बॉट्स`\n    वर्तमान चैट में बॉट्स की संख्या उनके परमा-लिंक के साथ दिखाती है।\n\n• `{i} hl <a link> <टेक्स्ट-ऑप्शनल>`\n    संदेश के रूप में एक व्हाट्सएप के साथ लिंक को एम्बेड करता है।\n\n• `{i} id`\n    अपनी आईडी पाने के लिए एक स्टिकर का जवाब दें\n    अपनी आईडी प्राप्त करने के लिए एक उपयोगकर्ता को उत्तर दें\n    जवाब दिए बिना आपको चैट की आईडी मिलेगी\n\n• `{i} sg <एक उपयोगकर्ता का उत्तर> <उपयोगकर्ता नाम/id>`\n    उत्तर दिए गए उपयोगकर्ता का उसका नाम इतिहास प्राप्त करें।\n\n• `{i} tr <डेस्ट लैंग कोड> <(उत्तर) एक संदेश>`\n    अनुवादित संदेश प्राप्त करें।\n\n• `{i} webshot <url>`\n    वेबपेज का एक स्क्रीनशॉट प्राप्त करें।\n\n• `{i} shorturl <url> <id-optional>`\n    किसी भी URL को छोटा करें ..."
help_webupload: "-\n\n• `{i} webupload`\n    किसी अन्य सर्वर पर फ़ाइलें अपलोड करें।"
help_profanityfilter: "-\n\n• `{i} addProfanity`\n   यदि कोई चैट में बुरा शब्द भेजता है, तो बॉट उस संदेश को हटा देगा।\n\n• `{i} remprofanity`\n   अपवित्र सूची से चैट से।"
cmda: "✘ उपलब्ध कमांड हैं"
help_imagetools: "-\n\n• `{i}border <फोटो/स्टिकर पर रिप्लाई>`\n    उपयुक्त मीडिया की चारों ओर सीमा बनाने के लिए।\n    जैसे की - `{i}border 12,22,23`\n       - `{i}border 12,22,23; चौड़ाई (संख्या में) `\n\n• `{i}grey <किसी मीडिया पर रिप्लाई>`\n    मीडिया को सादा (black & white) बनाने के लिए।\n\n• `{i}color <सादे मीडिया पर रिप्लाई>`\n    किसी भी सादे (black and white) मीडिया को रंगीन बनाने के लिए।\n\n• `{i}toon <किसी भी मीडिया पर रिप्लाई>`\n    मीडिया को कार्टून में जैसा बनाने के लिए।\n\n• `{i}danger <मीडिया पर रिप्लाई>`\n    मीडिया में खतरे जैसा दिखाने के लिए।\n\n• `{i}negative <मीडिया पर रिप्लाई>`\n    मीडिया को नकारात्मक में बदलने के लिए।\n\n• `{i}blur <मीडिया पर रिप्लाई>`\n    मीडिया को धुंधला करने के लिए।\n\n• `{i}quad <मीडिया>`\n    मीडिया को भंवर जैसा दिखाने के लिए।\n\n• `{i}mirror <मीडिया पर रिप्लाई>`\n    मीडिया की दर्पण तस्वीर बनाने के लिए।\n\n• `{i}flip <मीडिया>`\n    मीडिया को फ्लिप करने के लिए।\n\n• `{i}sketch <मीडिया>`\n    मीडिया स्केच जैसा दिखने के लिए।\n\n• `{i}blue <मीडिया पर रिप्लाई>`\n    बहुत शानदार।\n\n• `{i}csample <रंग नाम/रंग कोड>`\n   उदाहरण: `{i}csample red`\n             `{i}csample #ffffff`\n\n• `{i}pixelator <फोटो पर रिप्लाई>`\n    एक pixelated छवि बनाएँ .."
help_instagram: "-\n\n• `{i}instadl <इंस्टाग्राम link>`\n  `इंस्टाग्राम मीडिया डाउनलोड करें ...`\n\n• `{i}instadata <इंस्टाग्राम यूजरनेम>`\n  `स्वयं अथवा किसी अन्य यूज़र की इंस्टाग्राम डेटा प्राप्त करें।`\n\n• `{i}instaul <वीडियो/फोटो पर रिप्लाई> <title>`\n  `Instagram पर मीडिया अपलोड करें ...`\n\n• `{i}igtv <वीडियो पर रिप्लाई> <title>`\n  `IGTV पर मीडिया अपलोड करें ...`\n\n• `{i}reels <वीडियो पर रिप्लाई> <title>`\n  `Instagram रील्स पर मीडिया अपलोड करें ...`\n\n•    इंस्टाग्राम होम पेज के पोस्ट पाने के लिए आप अपने assistant bot के inline search में `instatm` कमांड लिखें।\n\n•    इस plugin का उपयोग करने के पहले, आप `INSTA_USERNAME` और` INSTA_PASSWORD` आवश्य सेट कर लें।"
help_fakeaction: "-\n\n• `{i}ftyping <समय/secs>`\n    `वर्तमान चैट में नकली टाइपिंग दिखाएं।`\n\n• `{i}faudio <समय/secs>`\n    `वर्तमान चैट में नकली रिकॉर्डिंग कार्रवाई दिखाएं।`\n\n• `{i}fvideo <समय/secs>`\n    `वर्तमान चैट में नकली वीडियो कार्रवाई दिखाएं।`\n\n• `{i}fgame <समय/secs>`\n    `वर्तमान चैट में नकली खेल खेलना एक्शन दिखाओ।`\n\n• `{i}fsticker <समय/secs>`\n    `वर्तमान चैट में एक्शन चुनने वाले नकली स्टिकर दिखाएं।`\n\n• `{i}flocation <समय/secs>`\n    `वर्तमान चैट में नकली स्थान कार्रवाई दिखाएं।`\n\n• `{i}fcontact <समय/secs>`\n    `वर्तमान चैट में कार्रवाई चुनने के लिए नकली संपर्क दिखाएं।`\n\n• `{i}fround <समय/secs>`\n    `वर्तमान चैट में नकली वीडियो संदेश कार्रवाई दिखाएं।`\n\n• `{i}fphoto <समय/secs>`\n    `वर्तमान चैट में फोटो भेजने के लिए नकली दिखाओ।`\n\n• `{i}fdocument <समय/secs>`\n    `वर्तमान चैट में नकली भेजने का दस्तावेज़ दिखाओ।`"
help_converter: "-\n\n• `{i}convert <gif/img/sticker/webm>`\n    इसे GIF / IMAGE / WEBM / सामान्य स्टिकर में बदलने के लिए मीडिया को उत्तर दें।\n\n• `{i}doc <filename.ext>`\n    एक फ़ाइल में इसे सहेजने के लिए एक पाठ MSG का उत्तर दें।\n\n• `{i}open`\n    किसी फ़ाइल का उत्तर दें कि यह पाठ को प्रकट करने के लिए है।\n\n• `{i}rename <एक्सटेंशन के साथ फ़ाइल नाम>`\n    फ़ाइल का नाम बदलें\n\n• `{i}thumbnail <उत्तर छवि/थंबनेल फ़ाइल>`\n    अपनी कस्टम थंबनेल के साथ अपनी फ़ाइल अपलोड करें।"
help_autoban: "• `{i}autokick <on/off>`\n    पर - सक्षम करने के लिए।\n    बंद - अक्षम करने के लिए।\n    स्वचालित रूप से समूह के नए उपयोगकर्ताओं को किक करें।\n\n• `{i}cban`\n    उपयोग किए गए चैट में चैनल के रूप में ऑटोबैनिंग भेजने को सक्षम/अक्षम करें।\n\n• `{i}addwl <उपयोगकर्ता नाम>`\n   चैनलबन व्हाइटलिस्ट में चैनल जोड़ें।\n\n• `{i}remwl <उपयोगकर्ता नाम>`\n   चैनलबन व्हाइटलिस्ट से चैनल निकालें।\n\n• `{i}listwl`: सभी श्वेतसूची चैनलों को सूचीबद्ध करें।"
help_button: "-\n\n• `{i}button <बटन प्रारूप के साथ पाठ\n   बटन बनाएं यू पिक का भी जवाब दे सकते हैं\n\nप्रारूप:- `{i}button अरे!@Useultroid 😎।\n[अल्ट्रॉइड |t.me/theultroided thedssupport |t.me/ultroidsupportChat |वही]\n[टीमल्ट्रॉइड |t.me/teamultroid] `"
help_videotools: "-\n\n• `{i}sample <सेकंड में अवधि>`\n   वीडियो का छोटा नमूना बनाता है ..\n\n• `{i}vshots <शॉट्स की संख्या>`\n   वीडियो का स्क्रीनशॉट बनाता है ..\n\n• `{i}vtrim <प्रारंभ समय> - <अंत समय> सेकंड में`\n    एक लंबा वीडियो फसल ।।"
help_words: "-\n\n• `{i} का अर्थ है <शब्द>`\n    शब्द का अर्थ प्राप्त करें।\n\n• `{i}synonym <शब्द>`\n    सभी समानार्थी शब्द प्राप्त करें।\n\n• `{i}antonym <वर्ड>`\n    सभी विलोम प्राप्त करें।\n\n• `{i}ud <शब्द>`\n    उरबैंडेक्शनरी से शब्द की अपवित्रता प्राप्त करें।"
help_core: "-\n\n• `{i}install <प्लगइन का उत्तर दें>`\n    प्लगइन स्थापित करने के लिए,\n  `{i}install f`\n    स्थापित करने के लिए।\n\n• `{i}uninstall <प्लगइन नाम>`\n    प्लगइन को उतारने और हटाने के लिए।\n\n• `{i}load <प्लगइन नाम>`\n    अनियंत्रित अनौपचारिक प्लगइन लोड करने के लिए।\n\n• `{i}unload <प्लगइन नाम>`\n    अनौपचारिक प्लगइन को उतारने के लिए।\n\n• `{i}help <प्लगइन नाम>`\n    आपको हर प्लगइन के लिए एक हेल्प मेनू (जैसे) दिखाता है।\n\n• `{i}getaddons <कच्चे लिंक को कोड>`\n    दिए गए कच्चे लिंक से प्लगइन्स लोड करें।"
help_globaltools: "-\n\n• `{i}gban <उत्तर उपयोगकर्ता/ उपयोगकर्ता नाम>`\n• `{i}ungban`\n    विश्व स्तर पर प्रतिबंध/अनबन।\n\n• `{i}gstat <उपयोगकर्ता/userid/username>` का उत्तर दें\n   जाँच करें कि क्या उपयोगकर्ता gbanned है।\n\n• `{i}listgban`: सभी gbanned उपयोगकर्ताओं को सूचीबद्ध करें।\n\n• `{i}gmute` | `{i}ungmute` <उत्तर उपयोगकर्ता/ उपयोगकर्ता नाम>\n    विश्व स्तर पर म्यूट/unmute।\n\n• `{i}gkick <उत्तर/उपयोगकर्ता नाम>` `विश्व स्तर पर किक उपयोगकर्ता`\n• `{i}gcast <पाठ/उत्तर>` `विश्व स्तर पर सभी grps` में संदेश भेजें\n\n• `{i}gadmincast <पाठ/उत्तर>` `` अपने व्यवस्थापक चैट में विश्व स्तर पर प्रसारण\n• `{i}gucast <पाठ/उत्तर>` `वैश्विक रूप से सभी पीएम उपयोगकर्ताओं में MSG भेजें\n\n• `{i}gblacklist <चैट आईडी/उपयोगकर्ता नाम/कुछ भी नहीं (वर्तमान चैट के लिए)`\n   ब्लैकलिस्ट में चैट जोड़ें और वैश्विक प्रसारण की अनदेखी करें।\n• `{i}ungblacklist`` BlackList से चैट निकालें। `\n\n• `{i}gpromote <उपयोगकर्ता का उत्तर> <चैनल/समूह/सभी> <रैंक>`\n    वैश्विक रूप से उपयोगकर्ता को बढ़ावा दें जहां आप व्यवस्थापक हैं\n    - सेट करें कि क्या केवल समूहों/चैनलों/सभी में बढ़ावा देना है।\n    जैसे- `gpromote समूह Boss` ~ सभी जीआरपी में उपयोगकर्ता को बढ़ावा देता है।\n        `gpromote @username सभी sar` ~ सभी समूह और चैनल में उपयोगकर्ता को प्रचारित करें\n• `{i}gdemote` -` वैश्विक स्तर पर उपयोगकर्ता को डिमोटे"
help_filter: "-\n\n• `{i}addfilter <वर्ड> <एक संदेश का उत्तर>`\n    उपयोग किए गए संदेश से संबंधित फ़िल्टर के रूप में उपयोग किए गए शब्द को जोड़ें।\n\n• `{i}remfilter <वर्ड>`\n    फ़िल्टर किए गए उपयोगकर्ता को हटा दें ..\n\n• `{i}listfilter`\n    सभी फ़िल्टर सूचीबद्ध करें।"
help_afk: "-\n\n• `{i}afk <वैकल्पिक कारण>`\n    AFK का अर्थ है कीबोर्ड से दूर,\n    इसके बाद सक्रिय हो जाता है, यदि कोई आपको टैग या संदेश देता है, तो उसे बॉट से एक स्वचालित उत्तर मिलेगा।\n\n    ।"
help_broadcast: "• `{i}addch <id/उत्तर सूची में/कोई नहीं>`\n    डेटाबेस में चैट जोड़ें।यदि कोई आईडी निर्दिष्ट नहीं है, तो वर्तमान चैट जोड़ता है।\n\n• `{i}remch <सभी/आईडी/कोई नहीं>`\n    निर्दिष्ट चैट (वर्तमान चैट यदि कोई निर्दिष्ट नहीं है), या सभी चैट को हटा देता है।\n\n• `{i}broadcast <MSG>` का उत्तर दें\n    डेटाबेस में सभी चैट को उत्तर दिया गया संदेश भेजें।\n\n• `{i}forward <MSG>` का उत्तर दें\n     डेटाबेस में सभी चैट को संदेश अग्रेषित करें।\n\n• `{i}listchannels`\n    सभी जोड़े गए चैट की सूची प्राप्त करने के लिए।"
help_resize: "-\n\n• `{i}size <मीडिया का उत्तर>`\n   इसका आकार पाने के लिए।\n\n• `{i}resize <संख्या> <नंबर>`\n   X, y अक्ष पर छवि का आकार बदलने के लिए।\n   जैसे।`{i}resize 690 960` का आकार बदलें"
help_giftools: "• `{i}invertgif <gif पर रिप्लाई>`\n  gif को नकारात्मक बनाने के लिये।\n\n• `{i}bwgif <gif पर रिप्लाई>`\n  gif को सादा बनाने के लिए\n\n• `{i}rvgif <रिप्लाई gif>`\n  gif को उल्टा करने के लिए\n\n• `{i}vtog`\n  किसी वीडियो को GIF में बदलें।\n    वीडियो से Gif\n\n• `{i}gif <खोजें>`\n    gif खोजने के लिए।"
help_vctools: "-\n\n• `{i}startvc`\n    चैट में वॉइस/वीडियो कॉल शुरू करें।\n\n• `{i}stopvc`\n    चैट में वीडियो/वाइस कॉल बंद करें।\n\n• `{i}vctitle <शीर्षक>`\n    चैट के वाइस/वीडियो कॉल का शीर्षक बदलें।\n\n• `{i}vcinvite`\n    वीडियो/वाइस कॉल में समूह के सभी सदस्यों को आमंत्रित करें।\n    (आपका शामिल होना जरूरी है।)"
help_extra: "-\n\n• `{i}del <रिप्लाई>`\n    रिप्लाई मैसेज को डिलीट करने के लिए।\n\n• `{i}edit <नया संदेश> <रिप्लाई : ऐच्छिक>`\n    रिप्लाई अन्यथा अपने अंतिम संदेश को संपादित करें।\n\n• `{i}copy <रिप्लाई>`\n    रिप्लाई मैसेज / मीडिया की प्रतिलिपि बनाएँ।\n\n• `{i}reply <रिप्लाई>`\n    अपने आखिरी मैसेज को रिप्लाई मैसेज पर रिप्लाई करें।"
help_audiotools: "✘ कमांड उपलब्ध -\n`{i}makevoice <ऑडियो का जवाब>`\n   ऑडियो से एक वॉयस नोट बनाता है।\n\n`{i}atrim <समय से> - <समय>`\n   दिए गए समय के अनुसार ट्रिम ऑडियो।\n   समय सेकंड में होना चाहिए।`{i}atrim 50-70`\n\n`{i}extractaudio <मीडिया का उत्तर>`\n   इससे ऑडियो निकालने के लिए।"
help_chatbot: "-\n\n• `{i}addai <उपयोगकर्ता को उत्तर दें/उपयोगकर्ता नाम/userid>` दें\n   उस उपयोगकर्ता को जवाब देने के लिए एक AI चैटबॉट जोड़ें।\n\n• `{i}remai <उपयोगकर्ता को उत्तर दें/उपयोगकर्ता नाम/userid>` दें\n   AI चैटबॉट निकालें।\n\n• `{i}repai <उपयोगकर्ता को उत्तर दें/एक संदेश दें>`\n   AI द्वारा संदेश के साथ उपयोगकर्ता को उत्तर दें।\n\n• `{i}listai`\n   वर्तमान में AI जोड़े गए उपयोगकर्ताओं को सूचीबद्ध करें।"
help_ziptools: "• `{i}zip <फ़ाइल पर रिप्लाई>`\n    रिप्लाई फ़ाइल को zip करें\n    zip पर पासवर्ड सेट करने के लिए: `{i}zip <password>` इस्तेमाल करें।\n\n• `{i}unzip <zip फाइल पर रिप्लाई>`\n    रिप्लाई की गई zip फ़ाइल को unzip करें।\n\n• `{i}azip <फाइल पर रिप्लाई>`\n   ढेरों फाइल की एक zip फ़ाइल बनाने के लिए।\n\n• `{i}dozip`\n    `{i}azip` कमांड से जोड़ी गई सभी फ़ाइल को zip करें।\n    पासवर्ड सेट करने के लिए: `{i}dozip <पासवर्ड>` इस्तेमाल करें।"
help_devtools: "-\n\n• `{i}bash <cmds>`\n• `{i}bash -c <cmds>` कार्बन छवि कमांड आउटपुट के रूप में।\n    टेलीग्राम पर लिनक्स कमांड चलाएं।\n\n• `{i}eval <code>`\n    टेलीग्राम पर पायथन कमांड का मूल्यांकन करें।\n    शॉर्टकट:\n        client = bot = event.client\n        e = event\n        p = print\n        reply = await e।get_reply_message ()\n        chat = event.chat_id\n\n• `{i}cpp <code>`\n    टेलीग्राम से C ++ कोड चलाएं।\n\n• `{i}sysinfo`\n    सिस्टम जानकारी दिखाता है।"
help_beautify: "-\n\n• `{i}carbon <पाठ/उत्तर का उत्तर/दस्तावेज़ का उत्तर>`\n    डिफ़ॉल्ट सेटिंग्स के साथ पाठ को कार्बन करें।\n\n• `{i}rcarbon <पाठ/उत्तर संदेश का उत्तर/दस्तावेज़ का उत्तर>`\n    यादृच्छिक बीजी रंगों के साथ पाठ को कार्बन करें।\n\n• `{i}ccarbon <रंग> <पाठ/उत्तर संदेश का उत्तर/दस्तावेज़ का उत्तर>`\n    कस्टम बीजी रंगों के साथ पाठ को कार्बन करें।\n\n• `{i}rayso <ऑप्ट-थीम> <पाठ>/<संदेश का उत्तर>`\n  `{i}rayso list` -` विषयों की सूची प्राप्त करें। `"
help_chats: "-\n\n• `{i}delchat <वैकल्पिक- उपयोगकर्ता नाम/id>`\n    इस CMD का उपयोग उस समूह को हटा दें।\n\n• `{i}getlink`\n• `{i}getlink -r` व्यवस्थापक अनुमोदन के साथ लिंक बनाएँ\n• `{i}getlink -r title_here` -` लिंक शीर्षक के साथ व्यवस्थापक अनुमोदन `\n• `{i}getlink 10` -` नए लिंक में उपयोग सीमा `\n    समूह का लिंक प्राप्त करें इस CMD का उपयोग किया गया है।\n\n• `{i}create (g | b | c) <group_name>;<वैकल्पिक-username> `\n    समूह बनाएँ एक विशिष्ट नाम।\n    जी - मेगाग्रुप/सुपरग्रुप\n    बी - छोटा समूह\n    सी - चैनल\n\n• `{i}setgpic <फोटो का उत्तर> <चैट उपयोगकर्ता नाम>`\n    समूह की प्रोफ़ाइल फोटो सेट करें।\n\n• `{i}delgpic <चैट उपयोगकर्ता नाम -ओप्शनल>`\n    समूह की प्रोफ़ाइल फ़ोटो हटाएं।\n\n• `{i}unbanall`\n    एक समूह के सभी सदस्यों को अनबन करें।\n\n• `{i}rmusers`\n    उपयोगकर्ताओं को विशेष रूप से निकालें।"
help_channelhacks: "🔹 `{i}shift <स्रोत चैट> |<गंतव्य चैट> `\n     यह स्रोत चैट से गंतव्य चैट में सभी पुराने पोस्ट को स्थानांतरित करेगा।\n      (यू उपयोगकर्ता नाम या चैनल की आईडी का भी उपयोग कर सकते हैं)\n      उदाहरण: `{i}shift @ABC |@xyz`\n      [नोट - यह ('|') चिन्ह नेसेसरी है]\n\nOr ऑटो-पोस्टिंग/किसी भी स्रोत चैनल से किसी भी गंतव्य चैनल पर सभी नए संदेश को अग्रेषित करने के लिए।\n\n   `{i}asource <चैनल उपयोगकर्ता नाम या id>`\n      यह डेटाबेस में स्रोत चैनल जोड़ें\n   `{i}dsource <चैनल उपयोगकर्ता नाम या id>`\n      यह डेटाबेस से स्रोत चैनलों को हटा देता है\n   `{i}listsource <चैनल उपयोगकर्ता नाम या ID>`\n      स्रोत चैनलों की सूची दिखाएं\n\n\n   `{i}adest <चैनल उपयोगकर्ता नाम या id>`\n      यह डेटाबेस में उर चैनल जोड़ें\n   `{i}ddest <चैनल उपयोगकर्ता नाम या आईडी>`\n      यह डेटाबेस से उर चैनलों को हटा देता है\n   `{i}listdest <चैनल उपयोगकर्ता नाम या आईडी>`\n      उर चैनलों की सूची दिखाएं\n\n   'आप डेटाबेस में कई चैनल सेट कर सकते हैं'\n   'ऑटो-पोस्ट को सक्रिय करने के लिए `{i}setdb AUTOPOST True` का उपयोग करें"
help_asstcmd: "-\n\n• `{i}addcmd <new cmd> <उत्तर>`\n   यह उस उत्तर संदेश के साथ आपके सहायक बॉट के लिए नया सीएमडी सेट करेगा।\n\n• `{i}remcmd <cmd नाम>`\n   यह आपके CMD को हटा देगा।\n\n• `{i}listcmd`\n   अपने सभी कस्टम CMD की सूची प्राप्त करने के लिए।"
help_search: "-\n\n• `{i}saavn <गाने का नाम>`\n    Saavn से गाने डाउनलोड करें।\n\n• `{i}google <सर्च>`\n    Google खोज करने के लिए।\n\n• `{i}github <यूजरनेम>`\n    GitHub प्रोफ़ाइल की जानकारी।\n\n• `{i}img <खोजे>`\n  `{i}img <खोजे> ; <फोटो की संख्या> `\n    तस्वीर की खोज करने के लिए।\n\n• `{i}reverse <फोटो/स्टिकर पर रिप्लाई>`\n    रिप्लाई मीडिया की Google image search करने के लिए।"
help_calculator: "-\n\n• `{i}calc` - inline कैलकुलेटर चालू करें।"
help_notes: "-\n\n• `{i}addnote <शब्द> <रिप्लाई>`\n    चैट में दिए गए शब्द के साथ रिप्लाई मैसेज का नोट बनाएं।\n\n• `{i}remnote <शब्द>`\n    इस्तेमाल किए गए शब्द को नोट से निकालें।\n\n• `{i}listnote`\n    सभी नोटों को सूचीबद्ध करें।\n\n\n• Note इस्तेमाल करने का तरीका:\n    चैट के सभी सदस्य नोट इस्तेमाल कर सकते है।\n   इसे प्राप्त करने के लिए `#(note का शब्द)` टाइप करें।"
help_qrcode: "-\n\n• `{i}qrcode <शब्द>`\n   `इनपुट में दिए गए शब्द का qrcode बनाएं।`\n\n• `{i}addqr <फोटो पर रिप्लाई> <शब्द>`\n   `शब्द का क्यूआर बनाकर, फ़ोटो में जोड़ें।`\n\n• `{i}qrdecode <qrcode पर रिप्लाई>`\n   `यह qrcode को डिकोड करता है।`"
help_tag: "-\n\n• `{i}tagall`\n    चैट के पहले 100 सदस्यों को टैग करें।\n\n• `{i}tagadmins`\n    चैट के सारे एडमिन को टैग करें।\n\n• `{i}tagowner`\n    चैट के owner को टैग करें\n\n• `{i}tagbots`\n    चैट के सभी बोट को टैग करें।\n\n• `{i}tagrec`\n    हाल मे ही में सक्रिय सदस्यों को टैग करें।\n\n• `{i}tagon`\n    ऑनलाइन सदस्यों को टैग करें (privacy off रहने पर ही काम करेगा)।\n\n• `{i}tagoff`\n    ऑफ़लाइन सदस्यों को टैग करें (केवल privacy settings बंद रहने पर काम करेगा)।"
help_greetings: "-\n\n---- स्वागत ----\n• `{i}setwelcome <शब्द/रिप्लाई>`\n    वर्तमान चैट में स्वागत संदेश सेट करें।\n\n• `{i}clearwelcome`\n    वर्तमान चैट में स्वागत संदेश हटाएं।\n\n• `{i}getwelcome`\n    वर्तमान चैट में स्वागत संदेश प्राप्त करें।\n\n---- अलविदा ----\n• `{i}setgoodbye <शब्द/रिप्लाई>`\n    वर्तमान चैट में अलविदा संदेश सेट करें।\n\n• `{i}cleargoodbye`\n    वर्तमान चैट में अलविदा संदेश हटाएं।\n\n• `{i}getgoodbye`\n    वर्तमान चैट में अलविदा संदेश प्राप्त करें।\n\n• `{i}thanks on/off`\n    अपने चैट में (10, 100, 500, 1000, आदि..) सदस्य होने पर एक धन्यवाद स्टिकर भेजें।"
help_stickertools: "-\n\n• `{i}destroy <एनिमेटेड स्टिकर पर रिप्लाई>`\n    स्टिकर को तोड़ने एवम् मरोड़ने के लिए।\n\n• `{i}tiny <मीडिया पर रिप्लाई>`\n    स्टिकर को छोटा बनाने के लिए।\n\n• `{i}kang <फोटो/स्टिकर पर रिप्लाई>`\n    कैंग स्टिकर यानी की रिप्लाई स्टिकर को अपने पैक में जोड़ें।\n\n• `{i}packkang <पैक नाम>`\n     पूरा स्टिकर पैक कैंग करे, (अपने खुद के नाम के साथ रिप्लाई स्टिकर पैक तैयार करें)।\n\n• `{i}round <मीडिया पर रिप्लाई>`\n    गोल स्टिकर बनाने के लिए।"
help_locks: "-\n\n• `{i}lock <msgs/media/sticker/gif/games/inline/polls/invites/pin/changeinfo>`\n    वर्तमान चैट में उपयुक्त सेटिंग को लॉक करें।\n\n• `{i}unlock <msgs/media/sticker/gif/games/inline/poll/invites/pin/changeinfo>`\n    वर्तमान चैट में उपयुक्त सेटिंग को अनलॉक करें।"
help_polls: "-\n\n• `{i}poll <प्रश्न> ; <विकल्प> ; <विकल्प>`\n    दिए गए विकल्पों के साथ बेनामी (anonymous) पोल भेजें।\n\n• `{i}poll <प्रश्न> ; <विकल्प> ; <विकल्प> | <प्रकार>`\n    अपनी इच्छानुसार पोल प्राप्त करें!\n    प्रकार `public`, `multiple` या `quiz` में से कोई भी होना चाहिए\n\n• `{i}poll <प्रश्न> ; <विकल्प> ; <विकल्प> | quiz_<सही जवाब की विकल्प संख्या> `\n    क्विज़ पोल तैयार करें जिसका सही जवाब, आखिर में डाली गई विकल्प की संख्या है।"
help_cleanaction: "-\n\n• `{i}addclean`\n    सभी आगामी सर्विस मैसेज, जैसे- left/joined/pinned आदि को स्वतः डिलीट करें।\n\n• `{i}remclean`\n    डेटाबेस से चैट निकालें।\n\n• `{i}listclean`\n   सभी चैट सूचीबद्ध करें जहां यह सक्रिय है।"
help_unsplash: "-\n\n• `{i}unsplash <जिसकी तस्वीर चाहिए> ; <संख्या>`\n    उपयुक्त शब्दों की तस्वीर unsplash से निकाले।"
help_misc: "-\n\n• `{i}eod`\n    `आज की घटनाएं और आयोजनों की जानकारी प्राप्त करें`\n\n• `{i}pntrst <link/id>`\n     pintrest id या लिंक से तस्वीर डाउनलोड करेंं।\n\n• `{i}gadget <गैजेट का नाम>`\n    टेलीग्राम से गैजेट खोजें।\n\n• `{i}randomuser`\n   एक random यूजर की जानकारी उत्पन्न करें।\n\n• `{i}ascii <किसी फोटो पर रिप्लाई>`\n    उत्तर दिया गए फोटो को HTML में परिवर्तित करें।"
help_profile: "-\n\n• `{i}setname <पहला नाम // अंतिम नाम>`\n    अपना प्रोफ़ाइल नाम बदलें।\n\n• `{i}setbio <बायो>`\n    अपना प्रोफ़ाइल बायो बदलें।\n\n• `{i}setpic <फोटो पर रिप्लाई>`\n    अपनी प्रोफ़ाइल तस्वीर रिप्लाई तस्वीर से बदलें।\n\n• `{i}delpfp <संख्या> (वैकल्पिक)`\n    अपनी प्रोफ़ाइल से 'संख्या' फोटो को डिलीट करें।\n\n• `{i}poto <यूजरनेम>`\n    चैट/उपयोगकर्ता की प्रोफाइल तस्वीर साझा करें।"
help_database: "-\n\n• ** डेटाबेस कमांड, इस कमांड का इस्तेमाल सोच समझ कर करें। **\n\n• `{i}setdb key | value`\n    डेटाबेस में अपनी key और value सेट करें।\n    उदाहरण:\n    `{i}setdb Hello there`\n    `{i}setdb Hello there | Ultroid here `\n    `{i}setdb --extended key value` या `{i}setdb -e key value` डेटाबेस में पहले से मौजूद key में value जोड़ने के लिए।\n\n• `{i}deldb key`\n    डेटाबेस से key हटाएं।\n\n• `{i}rendb old key | new key`\n    पुरानी key को नई key से बदलें।"
help_admintools: "-\n\n• `{i}promote <रिप्लाई/यूजरनेम/यूज़र ID>`\n    वर्तमान चैट में उपयुक्त यूज़र को एडमिन बनाएं।\n\n• `{i}demote`\n    वर्तमान चैट में उपयुक्त यूज़र को डिमोट करें।\n\n• `{i}ban <रिप्लाई/यूजरनेम/यूज़र ID> <कारण>`\n    चैट से उपयुक्त यूज़र को प्रतिबंधित करें\n\n• `{i}unban`\n    चैट से उपयुक्त यूज़र को अनबैन करें।\n\n• `{i}kick <रिप्लाई/यूज़र ID/यूजरनेम> <कारण>`\n    चैट से यूज़र को बाहर करें।\n\n• `{i}pin <रिप्लाई>`\n    चैट में किसी संदेश को पिन करें\n• `{i}tpin <समय> <अस्थाई पिन करने के लिए संदेश>`\n• `{i}unpin (all)`\n    चैट में सभी संदेशों को अनपिन करने के लिए `all` का प्रयोग करे , अन्यथा किसी pinned मैसेज पर रिप्लाई करें।\n\n• `{i}pinned`\n   वर्तमान चैट में पिन किए गए संदेश देखें।\n• `{i}listpinned`\n   वर्तमान चैट में पिन किए गए सभी संदेश को सूचीबद्ध करें\n\n• `{i}autodelete <24h/7d/1m/off>`\n   चैट में स्वतः संदेश डिलीट, चालू अथवा बंद करें।\n\n• `{i}purge <रिप्लाई>`\n    रिप्लाई दिए गए मैसेज से सभी संदेशों को डिलीट करें।\n\n• `{i}purgeme <संख्या>`\n    चैट से केवल अपने संदेशों को डिलीट करें। जैसे - `purgeme 30`\n\n• `{i}purgeall <रिप्लाई>`\n    रिप्लाई किए गए उपयोगकर्ता के सभी मैसेज को डिलीट करें।"
help_logo: "-\n\n• `{i}logo <शब्द>`\n    उपयुक्त शब्द का लोगो तैयार करें\n    खुद की फोटो अथवा फॉन्ट इस्तेमाल करने के लिए फोटो/फॉन्ट पर रिप्लाई करें।"
help_specialtools: "-\n\n• `{i}wspr <यूज़र ID>`\n    गुप्त संदेश भेजें।\n\n• `{i}q <रंग>`\n• `{i}q @username`\n• `{i}q r <रंग>`\n• `{i}q <अंक> `विभिन्न संदेशों का स्टिकर बनाएँ..`\n\n• `{i}sticker <>`\n    उर इच्छा के अनुसार स्टिकर खोजें ..\n\n• `{i}getaudio <एक ऑडियो का उत्तर दें>`\n    उर वांछित वीडियो/GIF में डालने के लिए ऑडियो डाउनलोड करें।\n\n• `{i}addaudio <वीडियो का उत्तर/gif>`\n    यह उपरोक्त ऑडियो को उत्तरित वीडियो/GIF में डाल देगा।\n\n• `{i}dob <जन्म तिथि>`\n    केवल dd/mm/yy प्रारूप में डालें (जैसे .dob 01/01/1999)।\n\n• `{i}wall <क्वेरी>`\n    उर इच्छा के अनुसार एचडी वॉलपेपर खोजें .."

