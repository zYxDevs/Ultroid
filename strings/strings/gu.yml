help_ziptools: "`` {i} ઝિપ <ફાઇલનો જવાબ> `\n    જવાબવાળી ફાઇલને ઝિપ કરો\n    ઝિપ પર પાસવર્ડ સેટ કરવા માટે: `{i} ઝીપ <પાસવર્ડ>` ફાઇલનો જવાબ આપો\n\n. `{i} અનઝિપ <ઝિપ ફાઇલનો જવાબ>`\n    જવાબવાળી ફાઇલને અનઝિપ કરો.\n\n. `{i} azip <ફાઇલનો જવાબ>`\n   બેચ અપલોડ ઝિપ માટે બેચમાં ફાઇલ ઉમેરો\n\n. `{i} ડોઝિપ`\n   તમે {i} azip` માંથી ઉમેરવામાં આવેલી ફાઇલોને ઝિપ અપલોડ કરો\n   પાસવર્ડ સેટ કરવા માટે: `{i} ડોઝિપ <પાસવર્ડ>`"
