help_imagetools: "-\n\n. `{i} સરહદ <ફોટો/સ્ટીકરનો જવાબ આપો>`\n    તે માધ્યમોની આસપાસ સરહદ બનાવવા માટે ..\n    ભૂતપૂર્વ - `{i} બોર્ડર 12,22,23`\n       - {i} સરહદ 12,22,23; પહોળાઈ (સંખ્યામાં) `\n\n. `{i} ગ્રે <કોઈપણ મીડિયાને જવાબ આપો>`\n    તેને બ્લેક એનડી વ્હાઇટ બનાવવા માટે.\n\n. `{i} રંગ <કોઈપણ બ્લેક એનડી વ્હાઇટ મીડિયાને જવાબ આપો>`\n    તેને રંગીન બનાવવા માટે.\n\n. `{i} toon <કોઈપણ મીડિયાને જવાબ આપો>`\n    તેને ટૂન બનાવવા માટે.\n\n. `{i} ભય <કોઈપણ મીડિયાને જવાબ આપો>`\n    તેને ભય દેખાવા માટે.\n\n. `{i} નકારાત્મક <કોઈપણ મીડિયાને જવાબ આપો>`\n    નકારાત્મક છબી બનાવવા માટે.\n\n`` {i} બ્લર <કોઈપણ મીડિયાને જવાબ આપો> `\n    તેને અસ્પષ્ટ બનાવવા માટે.\n\n. `{i} ક્વાડ <કોઈપણ મીડિયાને જવાબ આપો>`\n    વમળ બનાવો.\n\n. `{i} અરીસા <કોઈપણ મીડિયાને જવાબ આપો>`\n    મિરર ચિત્ર બનાવવા માટે.\n\n. `{i} ફ્લિપ <કોઈપણ મીડિયાને જવાબ આપો>`\n    તેને ફ્લિપ કરવા માટે.\n\n. `{i} સ્કેચ <કોઈપણ મીડિયાને જવાબ આપો>`\n    તેના સ્કેચ દોરવા માટે.\n\n. `{i} વાદળી <કોઈપણ મીડિયાને જવાબ આપો>`\n    માત્ર ઠંડી.\n\n. `{i} csample <રંગ નામ /રંગ કોડ>`\n   ઉદાહરણ: `{i} csample Red`\n             {i} csample #ffffff`\n\n. `{i} પિક્સેલેટર <જવાબ છબી>`\n    એક પિક્સેલેટેડ છબી બનાવો .."
