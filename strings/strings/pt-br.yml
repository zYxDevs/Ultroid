help_echo: "• `{i} addecho <Responder a qualquer pessoa>`\n   Inicie a mensagem de eco automática do usuário respondido.\n\n• `{i} Remecho <Responder a qualquer pessoa>`\n   Desligue isso\n\n• `{i} listecho <Responder a qualquer pessoa>`\n   Para obter lista."
help_mediatools: "-\n\n• `{i} MediaInfo <Responder à mídia>`\n   Para obter informações sobre isso.\n\n• `{i} giro <grau/ângulo> <resposta à mídia>`\n   Gire qualquer vídeo/foto/mídia ..\n   Nota: Para o vídeo, deve ser ângulo dos anos 90"
help_mute: "-\n\n• `{i} mudo <Responder ao msg/ usuário de usuário>`\n    Usuário mudo no bate -papo atual.\n\n• `{i} ativação <Responder a msg/ ID do usuário>`\n    Usuário de ativação no bate -papo atual.\n\n• `{i} dmute <Responder ao msg/ usuário de usuário>`\n    Usuário mudo no bate -papo atual excluindo msgs.\n\n• `{i} UNDMUTE <Responder a msg/ usar id>`\n    Usuário dmuted de som no bate -papo atual.\n\n• `{i} tmute <time> <Responder a msg/ use id>`\n    S- segundos\n    m- minutos\n    H- horas\n    D-dias\n    Usuário mudo no bate -papo atual com o tempo."
help_pmpermit: "-\n\n• `{i} a` ou` {i} aprove`\n    Aprovar alguém para PM.\n\n• `{i} da` ou` {i} desaprovo '\n    Desaprovar alguém para PM.\n\n• `{i} bloco`\n    Bloquear alguém.\n\n• `{i} desblock` |`{i} desbloqueie tudo`\n    Desbloquear alguém.\n\n• `{i} nologpm`\n    Pare de registrar mensagens do usuário.\n\n• `{i} logpm`\n    Inicie as mensagens de log do usuário.\n\n• `{i} starchive`\n    Arquive Novo PMS.\n\n• `{i} Starchive`\n    Não arquiva o novo PMS.\n\n• `{i} clearchive`\n    UNARCIVO TODOS os bate -papos.\n\n• `{i} listApproved`\n   Liste todos os PMs aprovados."
help_snips: "-\n\n• `{i} Addsnip <dordm> <Responder a uma mensagem>`\n    Adicione a palavra usada como recortes relacionados à mensagem respondida.\n\n• `{i} remsnip <dordm>`\n    Remova a palavra SNIP ..\n\n• `{i} listsnip`\n    Liste todos os recortes.\n\n• Usar :\n    TIPO `$ (UR SNIP Word)` REPORTAÇÃO DESTATIDA."
help_fileshare: "-\n\n• `{i} armazenamento <plyply_to_message>`\n   Armazene a mensagem/mídia respondida e gere um link compartilhável para esse arquivo, para ser acessado através do seu Bot Assistant!\n\n• `{i} Deltored <link do arquivo armazenado>`\n    Excluir arquivo armazenado.\n\n• `{i} listStored`\n   Obtenha todas as mensagens armazenadas.\n\n• Entre em linha com o seu Bot Assistant com `FileStore` para ver arquivos armazenados em linha."
help_fedutils: "-\n\n• `{i} Superfban <Responder a User/UserID/UserName>`\n    Fban a pessoa em todos os federais nos quais você é administrador.\n\n• `{i} superunfban <Responder a User/UserID/UserName>`\n    Un-fban a pessoa em todos os federais nos quais você é administrador.\n\nEspecifique o grupo fban e os federais para excluir no assistente.\n\n• `{i} fstat <nome de usuário/id/resposta ao usuário>`\n    Colete o Stat da pessoa em Rose.\n\n• `{i} fedinfo <(fedid)>`\n    Colete as informações da federação do ID do Fed, ou do Fed que você possui, de Rose."
help_other: "-\n\n• `{i} send <nome de usuário/id> <resposta/tipo>`\n    Envie mensagem para usuário/bate -papo.\n\n• `{i} fwdreply <Responder a msg>`\n    Responda à mensagem de alguém, encaminhando -a em particular.\n\n• `{i} Salvar <Mensagem de resposta>`\n    Salvar essa caixa de mensagens respondidas e salvadas.\n\n• `{i} fsave <Mensagem de resposta>`\n    Adiante que respondeu MSG para suas mensagens salvas."
help_warn: "• `{i} aviso <Responder ao usuário> <lasoge>`\n    Dá aviso.\n\n• `{i} RESETWARN <Responder ao usuário>`\n    Para reiniciar todos os avisos.\n\n• `{i} avisa <Responder ao usuário>`\n   Para obter a lista de avisos de um usuário.\n\n• `{i} setwarn <warn count> |<ban/mute/kick> `\n   Número definido na contagem de avisos para avisos\n   Depois de colocar '|'Mark coloque a ação como proibição/mudo/chute\n   Seu chute padrão 3\n   Exemplo: `Setwarn 5 |mudo"
help_blacklist: "-\n\n• `{i} Blacklist <word/todas as palavras com um espaço>`\n    Lista negra a palavra escolhida naquele bate -papo.\n\n• `{i} remblacklist < -word>`\n    Remova a palavra da lista negra ..\n\n• `{i} listBlackList`\n    Liste todas as palavras na lista negra.\n\n  'Se uma pessoa usa a palavra da lista negra, sua msg será excluída'\n  'E você deve ser administrador naquele bate -papo'"
help_utilities: "-\n\n• `{i} kickme`: sai do grupo.\n\n• `{i} date`: mostre calendário.\n\n• `{i} listreserved`\n    Liste todos os nomes de usuário (canais/grupos) que você possui.\n\n• `{i} stats`: veja as estatísticas do seu perfil.\n\n• `{i} paste` -` inclua texto longo / resposta ao arquivo de texto.\n\n• `{i} info <nome de usuário/userID/chatid>`\n    Responder à mensagem de alguém.\n\n• `{i} convite <nome de usuário/userID>`\n    Adicione o usuário ao bate -papo.\n\n• `{i} rmbg <Responder a pic>`\n    Remova o fundo dessa imagem.\n\n• `{i} Telegraph <Responder à mídia/texto>`\n    Carregue mídia/texto para o Telegraph.\n\n• `{i} json <Responder a msg>`\n    Obtenha a codificação JSON da mensagem.\n\n• `{i} sugiro <Responder à mensagem> ou <título da enquete>`\n    Crie uma enquete sim/não para a sugestão respondida.\n\n• `{i} ipinfo <ipaddress>`: obtenha informações sobre esse endereço IP.\n\n• `{i} cpy <Responder à mensagem>`\n   Copie a mensagem respondida, com formatação. Expira em 24 horas.\n• `{i} pst`\n   Cole a mensagem copiada, com formatação.\n\n• `{i} Thumb <arquivo de resposta>`: faça o download da miniatura do arquivo respondido.\n\n• `{i} getmsg <link da mensagem>`\n  Obtenha mensagens de bate -papos com restrições de encaminhamento/cópia."
help_bot: "• `{i} vivo` |`{i} vivo inline`\n    Verifique se o seu bot está funcionando.\n\n• `{i} ping`\n    Verifique o tempo de resposta do Ultroid.\n\n• `{i} update`\n    Veja Changelogs se alguma atualização estiver disponível.\n\n• `{i} cmds`\n    Veja todos os nomes dos plug -in.\n\n• `{i} Restart`\n    Para reiniciar seu bot.\n\n• `{i} logs (sys)`\n    Obtenha os logs completos do terminal.\n• `{i} logs carbon '\n    Obtenha os logs de sistemas carbonizados.\n• `{i} logs heroku`\n   Obtenha as 100 linhas mais recentes de logs Heroku.\n\n• `{i} Shutdown`\n    Desligue seu bot."
help_sudo: "-\n\n• `{i} addsudo`\n    Adicione usuários do sudo respondendo ao usuário ou usando o (s) UserID (s) separado (s) separado (s)\n\n• `{i} delsudo`\n    Remova os usuários do sudo respondendo ao usuário ou usando o (s) UserID (s) separado (s) separado (s)\n\n• `{i} listsudo`\n    Liste todos os usuários do sudo."
help_fontgen: "• `{i} font <font name>: <sext>`\n    Gerar fontes diferentes para o texto.\n\n• `{i} font`\n    Para obter uma lista de fontes"
help_usage: "• `{i} useage`\n    Obtenha uso geral.\n\n• `{i} Uso Heroku`\n   Obtenha estatísticas do Heroku.\n\n• `{i} uso db`\n   Obtenha uso de armazenamento de banco de dados."
help_schedulemsg: "-\n\n• `{i} cronograma <text/resposta a msg> <time>`\n    Com o tempo, você pode usar o segundo como número, ou como 1h ou 1m\n    por exemplo.`{i} cronograma Hello 100` Entrega MSG após 100 segundos.\n    por exemplo.`{i} cronograma Hello 1h` ele entregue msg após uma hora."
help_downloadupload: "-\n\n• `{i} ul <path/to/file>`\n    Carregue arquivos no telegrama.\n    Use os seguintes argumentos antes ou depois do nome do arquivo conforme o requisito:\n      `-stream` para fazer upload como fluxo.\n      `--Delete` para excluir o arquivo após o upload.\n      `--não-thumb` para fazer upload sem miniatura.\n\n• `{i} dl <nome do arquivo (opcional)>`\n    Responder ao arquivo para download.\n\n• `{i} download <ddl> (| nome do arquivo)`\n    Download usando DDL.O nome do arquivo autogererado se não for dado."
help_variables: "-\n\n• `{i} obter var <nome da variável>`\n   Obtenha o valor do nome da variável fornecida.\n\n• `{i} Get Type <Nome da variável>`\n   Obtenha o tipo de variável.\n\n• `{i} obter db <Key>`\n   Obtenha o valor do banco de dados da chave fornecida.\n\n• `{i} Get Keys`\n   Obtenha todas as teclas Redis."
help_antiflood: "-\n\n• `{i} setFlood <Teger>`\n    Defina o limite de inundação em um bate -papo.\n\n• `{i} Remflood`\n    Remova o limite de inundação de um bate -papo.\n\n• `{i} getFlood`\n    Obtenha o limite de inundação de um bate -papo."
help_tools: "-\n\n• `{i} círculo`\n    Responda a uma música de áudio ou GIF para obter uma nota de vídeo.\n\n• `{i} ls`\n    Obtenha todos os arquivos dentro de um diretório.\n\n• `{i} bots`\n    Mostra o número de bots no bate-papo atual com o link perma.\n\n• `{i} hl <a link> <Text-opcional>`\n    Incorpore o link com um espaço em branco como mensagem.\n\n• `{i} id`\n    Responda um adesivo para obter seu ID\n    Responda um usuário para obter sua identidade\n    Sem responder, você vai conseguir o id de bate -papo\n\n• `{i} sg <Responder a um usuário> <nome de usuário/id>`\n    Obtenha o histórico do nome do usuário respondido.\n\n• `{i} tr <Dest Lang Code> <(Responder a) uma mensagem>`\n    Obtenha mensagem traduzida.\n\n• `{i} webshot <url>`\n    Obtenha uma captura de tela da página da web.\n\n• `{i} shorturl <url> <d-opcional>`\n    Encurre qualquer URL ..."
help_webupload: "-\n\n• `{i} webUpload`\n    Carregar arquivos em outro servidor."
help_profanityfilter: "-\n\n• `{i} addProfanity`\n   Se alguém enviar uma palavra ruim em um bate -papo, o bot excluirá essa mensagem.\n\n• `{i} remprofanity`\n   Da lista de fracassos da Lista de Profanidade."
cmda: "✘ Comandos disponíveis"
help_imagetools: "-\n\n• `{i} borda <resposta a foto/adesivo>`\n    Para criar fronteira em torno dessa mídia ..\n    Ex - `{i} borda 12,22,23`\n       - `{i} borda 12,22,23; largura (em número) `\n\n• `{i} Gray <Responder a qualquer mídia>`\n    Para torná -lo preto e branco.\n\n• `{i} cor <Responder a qualquer mídia preta e branca>`\n    Para torná -lo colorido.\n\n• `{i} toon <Responder a qualquer mídia>`\n    Para fazer isso de Toon.\n\n• `{i} perigo <Responder a qualquer mídia>`\n    Para fazer parecer perigo.\n\n• `{i} negativo <resposta a qualquer mídia>`\n    Para fazer imagem negativa.\n\n• `{i} Blur <Responder a qualquer mídia>`\n    Para deixar embaçado.\n\n• `{i} quad <Responder a qualquer mídia>`\n    Crie um vórtice.\n\n• `{i} espelho <Responder a qualquer mídia>`\n    Para criar a foto do espelho.\n\n• `{i} flip <Responder a qualquer mídia>`\n    Para fazê -lo virar.\n\n• `{i} esboço <Responder a qualquer mídia>`\n    Para desenhar seu esboço.\n\n• `{i} azul <Responder a qualquer mídia>`\n    Apenas legal.\n\n• `{i} csample <nome de cor /código de cor>`\n   Exemplo: `{i} csample Red`\n             `{i} csample #ffffff`\n\n• `{i} pixelator <resposta da resposta>`\n    Crie uma imagem pixelizada .."
help_instagram: "-\n\n• `{i} Instadl <Instagram url>`\n  `Baixar mídia do Instagram ...`\n\n• `{i} Instadata <username>`\n  `Obtenha dados do Instagram de alguém ou eu '\n\n• `{i} instaul <Responder Video/Photo> <Eingtion>`\n  `Carregar mídia para o Instagram ...`\n\n• `{i} igtv <Responder Video> <Eingtion>`\n  `Carregar mídia para IGTV ...`\n\n• `{i} bobinas <Responder Video> <Eingtion>`\n  `Carregar mídia para os rolos do Instagram ...`\n\n• Entre em linha com seu assistente com a consulta `Instatm`\n   Para conseguir as postagens da página inicial ...\n\n• preencher `insta_username` e` insta_password`\n  antes de usá -lo .."
help_fakeaction: "-\n\n• `{i} ftyping <time/in secs>`\n    `Mostre a digitação falsa no chat atual.\n\n• `{i} faudio <time/in secs>`\n    `Mostrar ação de gravação falsa no chat atual.\n\n• `{i} fvideo <time/in secs>`\n    `Mostre ação de vídeo falso no chat atual.\n\n• `{i} fgame <time/in secs>`\n    `Mostre ação de jogo falso no chat atual.\n\n• `{i} fsticker <time/in secs>`\n    `Mostrar adesivo falso escolhendo ação no bate -papo atual.\n\n• `{i} fLocation <Time/in Secs>`\n    `Mostrar ação de localização falsa no chat atual.\n\n• `{i} fcontact <time/in secs>`\n    `Mostre a ação de escolha de contato falso no bate -papo atual.\n\n• `{i} frount <time/in secs>`\n    `Mostrar ação de mensagem de vídeo falsa no chat atual.\n\n• `{i} fphoto <time/in secs>`\n    `Mostrar foto de envio falso no chat atual.\n\n• `{i} fdocument <time/in secs>`\n    `Mostrar documento de envio falso no chat atual."
help_converter: "-\n\n• `{i} convert <gif/img/sticker/webm>`\n    Responda à mídia para convertê -lo em GIF / imagem / WebM / adesivo normal.\n\n• `{i} doc <Nowename.ext>`\n    Responda a uma mensagem de texto para salvá -lo em um arquivo.\n\n• `{i} aberto`\n    Responda a um arquivo para revelar seu texto.\n\n• `{i} renomear <nome do arquivo com extensão>`\n    Renomeie o arquivo\n\n• `{i} miniatura <Responder a Image/Arquivo de Miniatura>`\n    Carregue seu arquivo com sua miniatura personalizada."
help_autoban: "• `{i} Autokick <on/off>`\n    em - para ativar.\n    OFF - para desativar.\n    Chutar automaticamente novos usuários unidos do grupo.\n\n• `{i} cban`\n    Ativar/desativar a autobanning Enviar como canal no bate -papo usado.\n\n• `{i} addwl <username>`\n   Adicione o canal à lista de permissões do ChannelBan.\n\n• `{i} Remwl <username>`\n   Remova o canal da lista de permissões do ChannelBan.\n\n• `{i} listwl`: liste todos os canais da lista de permissões."
help_button: "-\n\n• `{i} botão <text with Button Format`\n   Crie o botão que você pode responder à foto também\n\nFormato:- `{i} botão Ei!@UseulTroid 😎.\n[Ultroid |t.me/theulTroid]t.me/ultroidsupportchat |mesmo]\n[Teamultroid |t.me/TeamulTroid] `"
help_videotools: "-\n\n• `{i} amostra <duração em segundos>`\n   Cria amostra curta de vídeo ..\n\n• `{i} vshots <número de fotos>`\n   Cria captura de tela do vídeo ..\n\n• `{i} vtrim <horário de início> - <final de tempo> em segundos`\n    Corte um vídeo longo .."
help_words: "-\n\n• `{i} significado <word>`\n    Obtenha o significado da palavra.\n\n• `{i} sinônimo <word>`\n    Obtenha todos os sinônimos.\n\n• `{i} Antônimo <Word>`\n    Obtenha todos os antônimos.\n\n• `{i} ud <word>`\n    Fetch Word Defenition do Urbandictionary."
help_core: "-\n\n• `{i} instalar <Responder ao plugin>`\n    Para instalar o plugin,\n  `{i} install f`\n    Para forçar a instalação.\n\n• `{i} desinstala <nome do plugin>`\n    Para descarregar e remover o plug -in.\n\n• `{i} load <nome do plug -in>`\n    Para carregar o plug -in não oficial descarregado.\n\n• `{i} descarregar <nome do plug -in>`\n    Para descarregar o plugin não oficial.\n\n• `{i} ajuda <nome do plugin>`\n    Mostra um menu de ajuda (como este) para todos os plug -in.\n\n• `{i} getaddons <link Raw para código>`\n    Carregar plugins do link bruto fornecido."
help_globaltools: "-\n\n• `{i} gban <Responder User/ UserName>`\n• `{i} ungban`\n    Ban/Unban globalmente.\n\n• `{i} gStat <Responder ao usuário/userID/nome de usuário>`\n   Verifique se o usuário é gbanned.\n\n• `{i} listgban`: liste todos os usuários do GBANN.\n\n• `{i} gmute` | `{i} ungmute` <Responder User/ UserName>\n    Mudo/ativação global.\n\n• `{i} gkick <Responder/UserName>` `Globaly Kick User`\n• `{i} gcast <text/reply>` `Globalmente envie msg em todos os grps`\n\n• `{i} gadmincast <text/reply>` `transmitido globalmente em seus bate -papos de administrador`\n• `{i} gucast <texto/resposta>` `Envie globalmente MSG em todos os usuários da PM`\n\n• `{i} gBlackList <chat id/nome de usuário/nada (para chat atual)`\n   Adicione o bate -papo à Blacklist e ignore a transmissão global.\n• `{i} ungblacklist`` Remova o bate -papo da lista negra.\n\n• `{i} gPromote <Responder ao usuário> <canal/group/all> <rank>`\n    promover globalmente o usuário onde você é administrador\n    - Defina se deve promover apenas em grupos/canais/tudo.\n    Por exemplo, o chefe do grupo GProMote 'promove o usuário em todos os GRPs.\n        `gPromote @UserName All Sar` ~ Promova o usuário em todos os grupos e canais\n• `{i} gdemote` -` rebaixando o usuário globalmente`"
help_filter: "-\n\n• `{i} addFilter <dordm> <Responder a uma mensagem>`\n    Adicione a palavra usada como filtro relacionado à mensagem respondida.\n\n• `{i} Remfilter <Word>`\n    Remova o usuário filtrado ..\n\n• `{i} listFilter`\n    Liste todos os filtros."
help_afk: "-\n\n• `{i} afk <Motivo opcional>`\n    AFK significa longe do teclado,\n    Depois que isso for ativado, se alguém marcar ou mensagens, ele receberá uma resposta automatizada do bot.\n\n    (Nota: Defina um arquivo de mídia nas mensagens AFK respondendo a qualquer mídia com `{i} AFK <Razão>`)."
help_broadcast: "• `{i} addch <id/responda para list/none>`\n    Adicione bate -papo ao banco de dados.Adiciona bate -papo atual se nenhum ID especificado.\n\n• `{i} remch <all/id/none>`\n    Remove o bate -papo especificado (bate -papo atual, se nenhum especificado) ou todos os bate -papos.\n\n• `{i} transmissão <Responder para msg>`\n    Envie a mensagem respondida para todos os bate -papos no banco de dados.\n\n• `{i} encaminhar <Responder a msg>`\n     Encaminhe a mensagem para todos os bate -papos no banco de dados.\n\n• `{i} listchannels` '\n    Para obter a lista de todos os bate -papos adicionados."
help_resize: "-\n\n• `{i} tamanho <resposta à mídia>`\n   Para obter o tamanho disso.\n\n• `{i} redimensione <número> <número>`\n   Para redimensionar a imagem no eixo x, y.\n   por exemplo.`{i} redimensione 690 960`"
help_giftools: "• `{i} invertgif`\n  Faça o GIF invertido (negativo).\n\n• `{i} bwgif`\n  Faça gif preto e branco\n\n• `{i} rvgif`\n  Reverter um gif\n\n• `{i} vtog`\n  Responder ao vídeo, ele criará GIF\n  Vídeo para gif\n\n• `{i} gif <Query>`\n   Envie um vídeo sobre a consulta."
help_vctools: "-\n\n• `{i} startvc`\n    Start Group Ligue em um grupo.\n\n• `{i} stopvc`\n    Pare de chamada em grupo em um grupo.\n\n• `{i} vctitle <title>`\n    Altere a chamada em grupo do título.\n\n• `{i} vcinvite`\n    Convide todos os membros do grupo em chamadas em grupo.\n    (Você deve se juntar)"
help_extra: "-\n\n• `{i} del <Responder à mensagem>`\n    Exclua a mensagem respondida.\n\n• `{i} editar <Now Message>`\n    Edite sua última mensagem ou MSG respondido.\n\n• `{i} cópia <Responder à mensagem>`\n    Cópia respondeu mensagem / mídia.\n\n• `{i} Responder`\n    Responda o último MSG enviado para o usuário respondido."
help_audiotools: "✘ Comandos disponíveis -\n`.MakeVoice <Responder ao áudio>`\n   Cria uma nota de voz do áudio.\n\n`.atrim <do tempo> - <para tempo>`\n   Apare o áudio conforme determinado tempo.\n   O tempo deve estar em segundos.`.atrim 50-70`\n\n`.extraiudio <resposta à mídia>`\n   Para extrair o áudio dele."
help_chatbot: "-\n\n• `{i} addai <Responder ao usuário/dar nome de usuário/userID>`\n   Adicione um chatbot AI para responder a esse usuário.\n\n• `{i} remai <Responder ao usuário/dar nome de usuário/userID>`\n   Remova o chatbot da AI.\n\n• `{i} repai <resposta ao usuário/dê uma mensagem>`\n   Responda ao usuário com uma mensagem por uma IA.\n\n• `{i} listai`\n   Liste os usuários adicionados da AI atualmente."
help_ziptools: "• `{i} zip <Responder ao arquivo>`\n    Faça o arquivo respondido\n    Para definir a senha no ZIP: `{i} zip <stedd>` Responder ao arquivo\n\n• `{i} unzip <Responder ao zip arquivo>`\n    descompactar o arquivo respondido.\n\n• `{i} azip <Responder ao arquivo>`\n   Adicionar arquivo ao lote para o zip de upload em lote\n\n• `{i} Dozip`\n   Faça upload em lote zip os arquivos que você adicionou em `{i} azip`\n   Para definir a senha: `{i} Dozip <dasty>`"
help_devtools: "-\n\n• `{i} bash <cmds>`\n• `{i} bash -c <cmds>` Imagem de carbono como saída de comando.\n    Execute comandos Linux no Telegram.\n\n• `{i} avaliar <code>`\n    Avalie os comandos Python no Telegram.\n    Atalhos:\n        cliente = bot = event.client\n        e = evento\n        p = impressão\n        Responder = Event.get_reply_message ()\n        chat = event.chat_id\n\n• `{i} cpp <code>`\n    Execute o código C ++ do Telegram.\n\n• `{i} sysinfo`\n    Mostra informações do sistema."
help_beautify: "-\n\n• `{i} carbono <text/resposta ao msg/resposta ao documento>`\n    Carbonia o texto com configurações padrão.\n\n• `{i} rcarbon <text/resposta ao msg/resposta ao documento>`\n    Carbonia o texto, com cores aleatórias de BG.\n\n• `{i} CCARBON <CORD> <Texto/Responder a Msg/Responder ao Documento>`\n    Carbonia o texto, com cores BG personalizadas.\n\n• `{i} Rayso <Pet-theMe> <xt>/<resposta à mensagem>`\n  `{i} rayso list` -` obtenha lista de temas."
help_chats: "-\n\n• `{i} delchat <opcional- nome de usuário/id>`\n    Exclua o grupo em que este CMD é usado.\n\n• `{i} getLink`\n• `{i} getLink r` -` Criar link com a aprovação do administrador`\n• `{i} getLink r title_here` -` Aprovação do administrador com título do link`\n• `{i} getLink 10` -` Limite de uso no novo link`\n    Obtenha link do grupo em que este CMD é usado.\n\n• `{i} create (g | b | c) <group_name>;<nome opcional-eurno> `\n    Crie o grupo com um nome específico.\n    G - Megagroup/SuperGroup\n    B - Pequeno grupo\n    C - canal\n\n• `{i} setgpic <Responder a foto> <nome de usuário de bate -papo>`\n    Defina a foto do perfil do grupo.\n\n• `{i} delgpic <Chat UserName -Optional>`\n    Exclua a foto do perfil do grupo.\n\n• `{i} Unbranall`\n    Desencadear todos os membros de um grupo.\n\n• `{i} rmusers`\n    Remover usuários especificamente."
help_channelhacks: "🔹 `{i} shift <de canal> |<para canal> `\n     Isso transferirá toda a postagem antiga do canal A para o canal B.\n      (você pode usar o nome de usuário ou o ID do canal também)\n      Exemplo: `{i} shift @abc |@xyz`\n      [Nota - este sinal ('|') é nessesary]\n\n🔹 Para postar/encaminhar automaticamente toda a nova mensagem de qualquer canal de origem para qualquer canal de destino.\n\n   `{i} asource <nome de usuário ou id>` `\n      Isso adiciona canal de origem ao banco de dados\n   `{i} dsource <nome de usuário ou id>` `\n      Isso remove canais de origem do banco de dados\n   `{i} listsource <nome de usuário ou id>` `\n      Mostrar lista de canais de origem\n\n\n   `{i} ADEST <nome de usuário ou id>` `\n      Isso adiciona seus canais ao banco de dados\n   `{i} ddest <canal nome de usuário ou id>`\n      Isso remove seus canais do banco de dados\n   `{i} listDest <canal nome de usuário ou id>`\n      Mostrar lista de seus canais\n\n   'Você pode definir muitos canais no banco de dados'\n   'Para ativar o post automático, use `{i} setDb AutoPost true`'"
help_asstcmd: "-\n\n• `{i} addcmd <new cmd> <resposta>`\n   Ele definirá um novo CMD para o seu Bot Assistant com essa mensagem de resposta.\n\n• `{i} remcmd <name cmd>`\n   Ele removerá seu CMD.\n\n• `{i} listcmd`\n   Para obter a lista de todo o seu CMD personalizado."
help_search: "-\n\n• `{i} saavn <Search Query>`\n    Baixe músicas de Saavn.\n\n• `{i} Google <Query>`\n    Para fazer pesquisa no Google.\n\n• `{i} github <username>`\n    Obtenha informações completas sobre o perfil do Github dos usuários.\n\n• `{i} img <Query>`\n  `{i} img <Query>;<não de resultados> `\n    Para fazer a pesquisa de imagens.\n\n• `{i} reverse`\n    Responda uma imagem ou adesivo para encontrar seu molho."
help_calculator: "-\n\n• `{i} calc` - calculadora em linha"
help_notes: "-\n\n• `{i} AddNote <dordm> <Responder a uma mensagem>`\n    Adicione nota no bate -papo usado com a mensagem respondida e a palavra escolhida.\n\n• `{i} Remnote <Word>`\n    Remova a nota do bate -papo usado.\n\n• `{i} listnote`\n    Liste todas as notas.\n\n• Usar :\n   Defina notas no grupo para que todos possam usá -lo.\n   Digite `#(palavra -chave nota)` para obtê -la"
help_qrcode: "-\n\n• `{i} qrcode <text/responda ao texto>`\n   `Faz o Qrcode of Text`\n\n• `{i} addqr <Responder Image> <sext>`\n   `Faz QR do texto e adicione -o à imagem.\n\n• `{i} qrdecode <Responder a qrcode>`\n   `Decodifica o qrcode.`"
help_tag: "-\n\n• `{i} tagall`\n    Tag Top 100 membros do bate -papo.\n\n• `{i} tagadMins`\n    Marque os administradores desse bate -papo.\n\n• `{i} Togowner`\n    Proprietário da tag daquele bate -papo\n\n• `{i} tagbots`\n    Tag Bots desse bate -papo.\n\n• `{i} tagrec`\n    Tag recentemente membros ativos.\n\n• `{i} Tagon`\n    Tag os membros on -line (só trabalhe se privacidade).\n\n• `{i} Tagoff`\n    Tag os membros offline (trabalhe apenas se privacidade)."
help_greetings: "-\n\n---- acidentes ----\n• `{i} setWelcome <message/responda à mensagem>`\n    Defina a mensagem de boas -vindas no bate -papo atual.\n\n• `{i} ClearWelcome`\n    Exclua as boas -vindas no bate -papo atual.\n\n• `{i} getWelcome`\n    Obtenha a mensagem de boas -vindas no bate -papo atual.\n\n---- Adeus ----\n• `{i} setGoodbye <mensagem/resposta a mensagem>`\n    Defina a mensagem de adeus no bate -papo atual.\n\n• `{i} cleargoodbye`\n    Exclua o adeus no bate -papo atual.\n\n• `{i} getgoodbye`\n    Obtenha a mensagem de adeus no bate -papo atual.\n\n• `{i} agradecimentos on/off`\n    Envie um adesivo de agradecimento ao acertar uma contagem de membros de 100*x em seus grupos."
help_stickertools: "-\n\n• `{i} Destroy <Responder ao adesivo animado>`\n    Para destruir o adesivo.\n\n• `{i} minúsculo <resposta à mídia>`\n    Para criar pequenos adesivos.\n\n• `{i} kang <resposta a imagem/adesivo>`\n    Kang o adesivo (adicione ao seu pacote).\n\n• `{i} packkang <nome da embalagem>`\n    Kang o conjunto de adesivos completo (com nome personalizado).\n\n• `{i} rodada <Responder a qualquer mídia>`\n    Para extrair adesivo redondo."
help_locks: "-\n\n• `{i} bloqueio <msgs/mídia/adesivo/gif/games/inline/polls/convites/pin/changeinfo>`\n    Bloqueie a configuração usada no grupo usado.\n\n• `{i} desbloqueio <msgs/mídia/adesivo/gif/games/inline/polls/convites/pin/changeinfo>`\n    Desbloqueie a configuração usada no grupo usado."
help_polls: "-\n\n• `{i} enrida <mestion>;<pution>;<pution> `\n    Obtenha a pesquisa anônima com determinadas opções\n\n• `{i} enrida <mestion>;<pution>;<pution> |<type> `\n    Obtenha a pesquisa especificada com o tipo desejado!\n    O tipo deve ser algum dos `public`,` múltipla` ou `quiz`\n\n• `{i} enrida <mestion>;<pution>;<pution> |quiz_ <lormerno> `\n    Obtenha a pesquisa do teste onde a resposta é o número de opções que está correto"
help_cleanaction: "-\n\n• `{i} addclean`\n    Limpe todos os próximos ações de ação no bate -papo adicionado como alguém juntou/esquerda/pino etc.\n\n• `{i} remclean`\n    Remova o bate -papo do banco de dados.\n\n• `{i} listclean`\n   Para obter a lista de todos os bate -papos onde está ativado."
help_unsplash: "-\n\n• {i} unsplash <search Query>;<não de fotos>\n    Pesquisa de imagem UNSPLASH."
help_misc: "-\n\n• `{i} eod`\n    `Obtenha o evento do Today`\n\n• `{i} pntrst <link/id>`\n    Baixe e envie pinos do Pinterest\n\n• `{i} gadget <search Query>`\n    Pesquisa de gadgets do Telegram.\n\n• `{i} randomuser`\n   Gerar detalhes sobre um usuário aleatório.\n\n• `{i} ASCII <Responder Image>`\n    Converter imagem respondida em html."
help_profile: "-\n\n• `{i} setName <primeiro nome // sobrenome>`\n    Altere o nome do seu perfil.\n\n• `{i} setbio <bio>`\n    Altere sua biografia de perfil.\n\n• `{i} setpic <Responder a pic>`\n    Mude sua foto de perfil.\n\n• `{i} delpfp <n> (opcional)`\n    Exclua uma foto de um perfil, se não houver valor, caso contrário, exclua n número de fotos.\n\n• `{i} POTO <username>`\n    Carregue a foto do bate -papo/usuário, se disponível."
help_database: "-\n\n• ** Comandos de banco de dados, não use se você não souber o que é. **\n\n• `{i} SetDB Key |valor`\n    Defina o valor no banco de dados.\n    por exemplo :\n    `{i} setDB oi lá`\n    `{i} setDB oi lá |Ultroid aqui\n    `{i} setDB -Extend Variable Value` ou` {i} setDb -e Value Value` para adicionar o valor aos valores que saem em db.\n\n• `{i} Deldb Key`\n    Exclua a chave do db.\n\n• `{i} rendb Old Keyname |novo nome '\n    Atualize o nome da chave"
help_admintools: "-\n\n• `.Promote <Responder ao usuário/UserID/UserName>`\n• `.Demote`\n    Promover/rebaixar o usuário no bate -papo.\n\n• `.ban <Responder a User/UserID/UserName> <Soator>`\n• `.UNBAN`\n    Ban/Unpan the User no bate -papo.\n\n• `.kick <Responder a User/UserID/UserName> <Soator>`\n    Chute o usuário do bate -papo.\n\n• `.pin <resposta à mensagem>`\n    Prenda a mensagem no chat\n• `.tpin <time> <mensagem de pino temp>`\n• `.Unpin (all) <Responder à mensagem>`\n    Unpin as mensagens no bate -papo.\n\n• `.pinned`\n   Receba a mensagem fixada no bate -papo atual.\n• `.Listpinned`\n   Obtenha todas as mensagens fixadas no bate -papo atual\n\n• `.autodelete <24h/7d/1m/off>`\n   Ativar mensagens de exclusão automática no bate -papo.\n\n• `.purge <resposta à mensagem>`\n    Limpe todas as mensagens da mensagem respondida.\n\n• `.purgeme <resposta à mensagem>`\n    Limpe apenas suas mensagens da mensagem respondida.\n\n• `.PurGeall '\n    Exclua todas as msgs do usuário respondido."
help_logo: "-\n\n• `{i} logotipo <sext>`\n   Gerar um logotipo do texto fornecido\n   Ou responda à imagem, para escrever seu texto nela.\n   Ou responda ao arquivo de fontes, para escrever com essa fonte."
help_specialtools: "-\n\n• `{i} wspr <username>`\n    Enviar mensagem secreta ..\n\n• `{i} q <color-opcional>`\n• `{i} q @nome de usuário`\n• `{i} q r <color-opcional>`\n• `{i} q count`:` múltiplas cotações`\n    Criar citações ..\n\n• `{i} adesivo <Query>`\n    Pesquise adesivos como seu desejo ..\n\n• `{i} getAudio <Responder a um áudio>`\n    Faça o download do áudio para colocar em seu vídeo/gif desejado.\n\n• `{i} addaudio <resposta ao vídeo/gif>`\n    Ele colocará o áudio acima no vídeo/GIF respondido.\n\n• `{i} DOB <Data de nascimento>`\n    Coloque apenas o formato dd/mm/yy (por exemplo .dob 01/01/1999).\n\n• `{i} parede <Query>`\n    Pesquise o papel de parede HD conforme seu desejo .."

