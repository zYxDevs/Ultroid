help_usage: "• `{i} භාවිතය\n    සමස්ත භාවිතය ලබා ගන්න.\n\n• `{i} us} USE Heroku`\n   හෙරෝකු සංඛ්යාලේඛන ලබා ගන්න.\n\n• `{i} usage usage db`\n   දත්ත සමුදා ගබඩා භාවිතය ලබා ගන්න."
help_downloadupload: "-\n\n`{i} u} uel <path / to / file>` `\n    විදුලි පණිවුඩයේ ගොනු උඩුගත කරන්න.\n    අවශ්යතාවය අනුව ගොනු නාමයට පෙර හෝ පසුව පහත සඳහන් තර්ක භාවිතා කරන්න:\n      ප්රවාහයක් ලෙස උඩුගත කිරීම.\n      උඩුගත කිරීමෙන් පසු ගොනුව මකා දැමීමට '--delete` කරන්න.\n      සිඟිති රූපයකින් තොරව උඩුගත කිරීමට\n\n• `{i} dl <ගොනු නාමය (අත්යවශ්ය නොවේ)>\n    බාගත කිරීම සඳහා ගොනුවට පිළිතුරු දෙන්න.\n\n• `{i} බාගත <DDL> (| ගොනු නාමය)`\n    ඩීඩීඑල් භාවිතයෙන් බාගන්න.ලබා නොදුනහොත් ගොනු නාමය ස්වයංක්රීයව ක්රියාත්මක කරයි."
