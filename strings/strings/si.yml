help_bot: "• `{i} ජීවතුන් අතර |`{i} ජීවතුන් අතර\n    ඔබේ බොට් වැඩ කරන්නේ දැයි පරීක්ෂා කරන්න.\n\n• `{i} පිං`\n    අල්ට්රොයිඩ් ප්රතිචාර කාලය පරීක්ෂා කරන්න.\n\n`{i} යාවත්කාලීන කිරීම`\n    කිසියම් යාවත්කාලීනයක් තිබේ නම් වෙනස්වීම් බලන්න.\n\n• `{i} cmds`\n    සියලුම ප්ලගි ජාතික නම් බලන්න.\n\nRe '{i} නැවත ආරම්භ කිරීම\n    ඔබේ බොට් නැවත ආරම්භ කිරීමට.\n\n• `{i} log ලොග් (SYS)`\n    සම්පූර්ණ පර්යන්ත ල .ු-සටහන් ලබා ගන්න.\n`{i} ල logs ු-සටහන් කාබන්`\n    කාබන කරන ලද SYS ල logs ු-සටහන් ලබා ගන්න.\n`{i} log හෙරෙකු`\n   නවතම පේළි 100 හෙරොකු ලොග් ලබා ගන්න.\n\n• `{i} වසා දැමීම`\n    ඔබේ බොට් අක්රිය කරන්න."
