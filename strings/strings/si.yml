help_channelhacks: "🔹 `{i} මාරුව <නාලිකාවේ සිට> |<නාලිකාව>\n     මෙය සියලුම පැරණි තනතුර චැනල් ඒ සඳහා චැනල් වෙත මාරු කරනු ඇත.\n      (යූ පරිශීලක නාමය හෝ නාලිකාවේ නාලිකාවේද භාවිතා කළ හැකිය)\n      උදාහරණය: `{i} මාරුව @ABC |@ XYZ`\n      [සටහන - මෙය ('|') ලකුණ නස්සෙසරි වේ]\n\nRook ඕනෑම මූලාශ්ර නාලිකාවකට ඕනෑම මූලාශ්ර නාලිකාවකට ස්වයංක්රීයව පළ කිරීම / ඉදිරිපත් කිරීම සඳහා.\n\n   `{i} asoorce <නාලිකා පරිශීලක නාමය හෝ ID>`\n      මෙමඟින් දත්ත සමුදායට මූලාශ්ර නාලිකාව එක් කරන්න\n   `{i} dsource <චැනල් පරිශීලක නාමය හෝ ID>`\n      මෙමඟින් දත්ත සමුදායෙන් මූලාශ්ර නාලිකා ඉවත් කරන්න\n   `{i} ලැයිස්තුව <චැනල් පරිශීලක නාමය හෝ ID>`\n      මූලාශ්ර නාලිකා ලැයිස්තුව පෙන්වන්න\n\n\n   `{i} ඇඩ්රල් <චැනල් පරිශීලක නාමය හෝ ID>` `\n      මෙය දත්ත සමුදායට ඔබේ නාලිකා එකතු කරයි\n   `{i} ddest <නාලිකා පරිශීලක නාමය හෝ ID>`\n      මෙය දත්ත සමුදායෙන් ඔබේ නාලිකා ඉවත් කරයි\n   `{i} listdest <නාලිකා පරිශීලක නාමය හෝ ID>`\n      ඔබේ නාලිකා ලැයිස්තුව පෙන්වන්න\n\n   'ඔබට බොහෝ නාලිකා දත්ත ගබඩාවේ බොහෝ නාලිකා තැබිය හැකිය'\n   ස්වයංක්රීය පෝස්ට් භාවිතය සක්රිය කිරීම සඳහා `{i} සෙට් ඕටෝ ඔටෝපෝස් ටූ ෆුල්'"
