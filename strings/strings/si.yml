help_fedutils: "-\n\n• `{i} superfban <පරිශීලක / userid / userime> on පරිශීලකයාට පිළිතුරු\n    FBANT ඔබ පරිපාලක වන සියලුම පෝෂණය කරන පුද්ගලයා.\n\n• `{i} superunfban uer පරිශීලක / userid / userifide> '\n    ඔබ පරිපාලක වන සියලුම පෝෂණය කරන සියලුම ෆෙඩ්ස් හරහා\n\nFBAN කාණ්ඩය නියම කර සහායකයාගෙන් බැහැර කිරීමට පෝෂණය කරන්න.\n\n• `{i} fstat <පරිශීලක නාමය / හැඳුනුම්පත / පරිශීලකයාට පිළිතුරු\n    රෝස් හි පුද්ගලයාගේ පන්දුවකගේ තත්වය එකතු කරන්න.\n\n• `{i} foredinfo <(ෆෙඩිම්)>`\n    රෝස් වෙතින් ලබා දී ඇති ශූර හැඳුනුම්පතේ හෝ ඔබ සතු මහත්වරුන්ගේ සම්මේලනයේ තොරතුරු එකතු කරන්න."
