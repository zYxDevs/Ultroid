help_variables: "-\n\n• `{i} var <විචල්ය නාමය>`\n   ලබා දී ඇති විචල්ය නාමයේ අගය ලබා ගන්න.\n\n`{i} වර්ගය <විචල්ය නාමය>`\n   විචල්ය වර්ගය ලබා ගන්න.\n\n• `{i} db <යතුර>` ලබා ගන්න\n   ලබා දී ඇති යතුරේ db අගය ලබා ගන්න.\n\n`{i} යතුරු ලබා ගන්න\n   සියලුම රෙඩ් යතුරු ලබා ගන්න."
help_antiflood: "-\n\n`{i} සෙට්ෆ්ලෝඩ් <පූර්ණ සංඛ්යා>`\n    චැට් එකක ගංවතුර සීමාව සකසන්න.\n\n• `{i} රෙස්ට්ෆ්ලූඩ්`\n    චැට් එකකින් ගංවතුර සීමාව ඉවත් කරන්න.\n\n• `{i} ගෙප්ලූඩ්`\n    චැට් එකක ගංවතුර සීමාව ලබා ගන්න."
help_tools: "-\n\n• `{i} කව\n    වීඩියෝ සටහන ලබා ගැනීම සඳහා ශ්රව්ය ගීතයකට හෝ gif ට පිළිතුරු දෙන්න.\n\n• `{i} ls`\n    නාමාවලියක් තුළ ඇති සියලුම ලිපිගොනු ලබා ගන්න.\n\n• `{i} බොට්ස්`\n    ඔවුන්ගේ පර්මා-සබැඳිය සමඟ වත්මන් කතාබස් හි ඇති බොට්ස් ගණන පෙන්වයි.\n\n• `{i} HL <A සබැඳිය' <පෙළ-විකල්ප> `\n    පණිවිඩය ලෙස සුදු අවකාශයක් සමඟ සබැඳිය සම්බන්ධ කරයි.\n\n`{i} id`\n    එහි හැඳුනුම්පත ලබා ගැනීම සඳහා ස්ටිකරයකට පිළිතුරු දෙන්න\n    ඔහුගේ හැඳුනුම්පත ලබා ගැනීමට පරිශීලකයෙකුට පිළිතුරු දෙන්න\n    පිළිතුරු නොදී ඔබට චැට් හි හැඳුනුම්පත ලැබෙනු ඇත\n\n• `{i} sg <<පරිශීලක නාමය / id>` {පරිශීලකයෙකුට පිළිතුරු දෙන්න>\n    පිළිතුරු දුන් පරිශීලකයාගේ ඔහුගේ නම ඉතිහාසය ලබා ගන්න.\n\n• `{i} tr <des dang lang cood> <(පිළිතුරු දෙන්න) පණිවිඩයක්>\n    පරිවර්තන පණිවිඩය ලබා ගන්න.\n\n• `{i} වෙබ්චෝල් <URL>`\n    වෙබ් පිටුවේ තිර රුවක් ලබා ගන්න.\n\n• `{i} කෙටි <URL> <ID-ID-ID-ID- විකල්ප>`\n    ඕනෑම URL එකක් කෙටි කරන්න ..."
