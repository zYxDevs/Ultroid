help_globaltools: "-\n\n`{i} gban <පිළිතුරු පරිශීලක / පරිශීලක නාමය>`\n• `{i} gugban`\n    තහනම් / උන්බන් ගෝලීයව.\n\n• `{i} gstat <පරිශීලක / userid / userim>> පිළිතුරු\n   පරිශීලකයා GBANDED දැයි පරීක්ෂා කරන්න.\n\n`{i} listGBan`: සියලුම අභිජනන පරිශීලකයින් ලැයිස්තුගත කරන්න.\n\n• `{i} gmute` | `{i} uggmute` <පිළිතුරු පරිශීලක / පරිශීලක නාමය>\n    ගෝලීය වශයෙන් නිශ්ශබ්ද / නිශ්ශබ්ද කරන්න.\n\n`{i} gkick <පිළිතුරු / පරිශීලක නාමය>` `' ගෝලීය වශයෙන් කික් පරිශීලකයා`\n• `{i} gath} gate <text / resply>` `` `` `` `` engs සියල්ලම grps on\n\n`{i} gadmincate <පෙළ / පිළිතුර> ඔබේ පරිපාලක කතාබස්වල ගෝලීය වශයෙන් විකාශනය කරන්න\n• `{i} ගුෆාන්ට් <පෙළ / පිළිතුරු>` `` `` `` `` `` `` `` `` `` `` `` `` `` `` `` `` `` `` `` `` `` `` `` `` `` `` `quest පරිශීලකයින්\n\n• {i} gblacklist <චැට් හැඳුනුම්පත / පරිශීලක නාමය / කිසිවක් නැත (වත්මන් කතාබස් සඳහා) `\n   අසාදු ලේඛනයට කතාබස් කරන්න සහ ගෝලීය විකාශනය නොසලකා හරියි.\n`{i} අපොග්බැක්ලිස්ට්`` බ්ලැක්ලිස්ට් වෙතින් කතාබස් ඉවත් කරන්න .`\n\n`{i} gpromote <forcher to පරිශීලකයාට පිළිතුරු දෙන්න> <චැනල් / සමූහය / සියල්ල> <rank>` `\n    ඔබ පරිපාලක සිටින තැන ගෝලීයව පරිශීලකයා ප්රවර්ධනය කරන්න\n    - කණ්ඩායම් / නාලිකා වල / සියල්ලන් තුළ පමණක් ප්රවර්ධනය කළ යුතුද යන්න සකසන්න.\n    උදා: `ග්රාමෝට් සමූහ ලොක්කාගේ ~ සියලුම ග්රන්ථවල පරිශීලකයා ප්රවර්ධනය කරයි.\n        `gpromote @ousername dumand aread '& සියලුම කණ්ඩායම් සහ නාලිකාවේ පරිශීලකයා ප්රවර්ධනය කරන්න\n• `{i} gdemote` -' ගෝලීය වශයෙන් පරිශීලකයා."
