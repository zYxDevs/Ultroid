help_warn: "`{i} U පරිශීලකයාට පිළිතුරු දෙන්න> <time>`\n    අනතුරු ඇඟවීමක් කරයි.\n\n`{i} නැවත පදිංචිය <පරිශීලකයාට පිළිතුරු දෙන්න>\n    සියලු අනතුරු ඇඟවීම් නැවත සැකසීමට.\n\nMee `{i} පරිශීලකයාට පිළිතුරු සපයයි> පරිශීලකයාට පිළිතුරු දෙන්න>\n   පරිශීලකයෙකුගේ අනතුරු ඇඟවීම් ලැයිස්තුවක් ලබා ගැනීම.\n\n• `{i} සෙට්වර්න් <වොන් ගණන> |<band / mute / kick> `\n   අනතුරු ඇඟවීම් සඳහා අනතුරු ගණන්වලදී අංකය නියම කරන්න\n   තැබීමෙන් පසු '|'මාක් තහනම් / නිශ්ශබ්ද / කික් මෙන් ක්රියා කළේය\n   එහි පෙරනිමි 3 කික්\n   උදාහරණය: `setwarn 5 |නිශ්ශබ්දතාව"
