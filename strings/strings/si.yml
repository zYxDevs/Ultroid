help_imagetools: "-\n\n`{i} දේශ සීමාව <ඡායාරූපය / ස්ටිකර්>`\n    එම මාධ්ය වටා මායිම නිර්මාණය කිරීමට ..\n    උදා: {i} දේශ සීමාව 12,22,23`\n       - {i} දේශ සීමාව 12,22,23; පළල (අංකයෙන්) `\n\n`{i} gry <ඕනෑම මාධ්යයකට පිළිතුරු දෙන්න>\n    එය කළු ජාතික ඩබ්ලිව්.\n\nChaol {i} වර්ණය <ඕනෑම කළු එන්.ඩී සුදු මාධ්යයකට පිළිතුරු දෙන්න>\n    එය වර්ණවත් කිරීමට.\n\n`{i} ටූන් <ඕනෑම මාධ්යයකට පිළිතුරු දෙන්න>\n    එය ටූන් සෑදීමට.\n\n• {i} අනතුර <ඕනෑම මාධ්යයකට පිළිතුරු දෙන්න>\n    එය අන්තරායක් බවට පත් කිරීමට.\n\n`{i} negative ණ an ණාත්මක <ඕනෑම මාධ්යයකට පිළිතුරු දෙන්න>\n    Negative ණාත්මක රූපයක් කිරීමට.\n\n`{i} බ්ලර් <ඕනෑම මාධ්යයකට පිළිතුරු දෙන්න>\n    එය බොඳ කිරීමට.\n\n`{i} quad quad <ඕනෑම මාධ්යයකට පිළිතුරු දෙන්න>\n    සුළි කුණාටුවක් සාදන්න.\n\n• `{i} කැඩපත <ඕනෑම මාධ්යයකට පිළිතුරු දෙන්න>\n    දර්පණ පින්තූරය නිර්මාණය කිරීමට.\n\n• `{i} fore ඕනෑම මාධ්යයකට පිළිතුරු දෙන්න>\n    එය පෙරළීමට.\n\n`{i} සටහන <ඕනෑම මාධ්යයකට පිළිතුරු දෙන්න>\n    එහි සටහන අදින්න.\n\n`{i} නිල් <ඕනෑම මාධ්යයකට පිළිතුරු දෙන්න>\n    සිසිල් කරන්න.\n\n`{i} csample <වර්ණ නම / වර්ණ කේතය>`\n   උදාහරණය: '{i} csample red\n             `{i} csample # ffffff`\n\n• `{i} පික්සිලේටරය <පිළිතුරු රූපය>\n    පික්ෂීට් රූපයක් සාදන්න .."
