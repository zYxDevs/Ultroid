help_admintools: "-\n\n• `` .ප්රොගෝට් <පරිශීලක / UserId / userId / පරිශීලක නාමයට පිළිතුරු දෙන්න>\n• `` .demote`\n    චැට් හි පරිශීලකයා ප්රවර්ධනය / ද්වාරය.\n\n.\n• `.unban '\n    චැට් වෙතින් පරිශීලකයා තහනම් කරන්න / UNAN කරන්න.\n\n• `` `.කික් <පරිශීලකයා / userid / usernid>> හේතුව> හේතුව> හේතුව>\n    චැට් වෙතින් පරිශීලකයාට පයින් ගසන්න.\n\n• `` .pin <පණිවිඩයට පිළිතුරු දෙන්න>\n    කතාබහට පණිවිඩය පින් කරන්න\n• `` .TPIN <time> <temp pin message> `\n• `` .unpin (සියල්ල) <පණිවිඩයට පිළිතුරු දෙන්න>\n    චැට් හි ඇති පණිවිඩ එක්සත් කිරීම.\n\n• `.pipinded`\n   වත්මන් කතාබහට ඇණ ගැසූ පණිවිඩය ලබා ගන්න.\n• `.ListPined`\n   වත්මන් කතාබස් සඳහා සියලුම ඇල අකුරු ලබා ගන්න\n\n• ``. සුභොඩෙලේ <24h / 7D / 1M / Offer> `\n   චැට් හි ස්වයංක්රීයව මකා දමන්න.\n\n• `` .ප්රෙජ් <පණිවිඩයට පිළිතුරු දෙන්න>\n    පිළිතුරු දුන් පණිවිඩයෙන් සියලුම පණිවිඩ පිරිසිදු කරන්න.\n\n• `.phergeme <පණිවිඩයට පිළිතුරු දෙන්න>\n    පිළිතුරු දුන් පණිවිඩයෙන් ඔබගේ පණිවිඩ පමණක් පිරිසිදු කරන්න.\n\n• `` .purgeall`\n    පිළිතුරු දුන් පරිශීලකයින්ගේ සියලු msgs මකන්න."
help_specialtools: "-\n\n• `{i} wspr <username>`\n    රහස් පණිවිඩය යවන්න ..\n\n`{i} q <වර්ණ-විකල්ප>`\n`{i} q @ @ පරිශීලක නාමය`\n• `{i} q r <වර්ණ-විකල්ප>`\n• `{i} q ගණන් කිරීම:` බහු උපුටා දැක්වීම්`\n    උපුටා දැක්වීම් සාදන්න ..\n\n`{i} ස්ටිකර් <විමසුම>`\n    ඔබේ පැතුම අනුව ස්ටිකර් සෙවුම් සෙවුම් ..\n\nGe `{i} ගෙටූඩියෝ <ශ්රව්ය Ared ාවකට පිළිතුරු දෙන්න>`\n    Ur ර් අපේක්ෂිත වීඩියෝ / GIF හි තැබීමට ශ්රව්ය උපකරණ බාගන්න.\n\n• `{i} addaudio <වීඩියෝ / gif> on '\n    එය ඉහත ශ්රව්ය උපකරණ පිළිතුරු සඳහා පිළිතුරු සපයන වීඩියෝ / GIF වෙත ඇතුළත් කරනු ඇත.\n\n• `{i} dob <උපන් දිනය> උපන් දිනය`\n    Dd / mm / Yy ආකෘතියෙන් පමණක් දමන්න (උදා: .ඩෝබ් 01/01/1999).\n\n• `{i} lood loud <විමසුම>`\n    ඔබේ පැතුම අනුව HD බිතුපත සොයන්න .."
