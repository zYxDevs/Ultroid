help_utilities: "-\n\n`{i} kicmeme``: කණ්ඩායමෙන් පිටව යන්න.\n\n• `{i} දිනය`: දින දර්ශනය පෙන්වන්න.\n\n`{i} lindered\n    ඔබ සතුව ඇති සියලුම පරිශීලක නාම (නාලිකා / කණ්ඩායම්) ලැයිස්තුගත කරන්න.\n\n• `{i} සංඛ්යාලේඛන: ඔබගේ පැතිකඩ සංඛ්යාන බලන්න.\n\n`{i}} අලවන්න` -` `` `පෙළ ගොනුවට පිළිතුරු දෙන්න. '\n\n• `{i} Info Infory <පරිශීලක නාමය / userid / chatid>`\n    යමෙකුගේ එම්එස්ජී වෙත පිළිතුරු දෙන්න.\n\n• `{i} ආරාධනා කරන්න <පරිශීලක නාමය / userid>`\n    චැට් එකට පරිශීලකයා එක් කරන්න.\n\n`{i} rmbg <pic to to to to to` `\n    එම පින්තූරයෙන් පසුබිම ඉවත් කරන්න.\n\n• `{i} ටෙලිප්ග්රැෆ් <මාධ්ය / පෙළ> පිළිතුරු සැපයීම>\n    ටෙලිග්රාෆ් වෙත මාධ්ය / පෙළ උඩුගත කරන්න.\n\n• `{i} JSON <msg>'\n    පණිවිඩයේ JSON කේතන කිරීම ලබා ගන්න.\n\n`{i} යෝජනා කරන්නේ <පණිවිඩයට පිළිතුරු දෙන්න>\n    පිළිතුරු දුන් යෝජනාව සඳහා ඔව් / නැත මත විමසුමක් සාදන්න.\n\n• `{i} ipinfo <ipaddress>`: එම IP ලිපිනය පිළිබඳ තොරතුරු ලබා ගන්න.\n\n• `{i} cpy <පණිවිඩයට පිළිතුරු දෙන්න>\n   ආකෘතිකරණය සමඟ පිළිතුරු දුන් පණිවිඩය පිටපත් කරන්න. පැය 24 තුළ කල් ඉකුත් වේ.\n• `{i} pst`\n   ආකෘතිකරණය සමඟ පිටපත් කළ පණිවිඩය අලවන්න.\n\n• `{i} thumume <පිළිතුරු ගොනුව>` පිළිතුරු ගොනුවේ සිඟිති රූපය බාගන්න.\n\n• `{i} getmsg <පණිවිඩ සබැඳිය>`\n  ඉදිරියට / පිටපත් කිරීම සීමා කිරීම සමඟ කතාබස් වලින් පණිවිඩ ලබා ගන්න."
