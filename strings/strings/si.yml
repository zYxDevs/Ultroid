help_broadcast: "`{i} එකතු කිරීම <id / ලැයිස්තුවට පිළිතුරු / කිසිවක්>`\n    දත්ත සමුදායට කතාබස් එක් කරන්න.හැඳුනුම්පතක් නියම නොකළහොත් වත්මන් කතාබස් කරන්න.\n\n`{i} regioneg <{සියලුම / id / noot>` `\n    නිශ්චිත චැට් ඉවත් කරයි (කිසිවක් නිශ්චිතව දක්වා නොමැති නම් වත්මන් චැට්), හෝ සියලුම කතාබස්.\n\n• `{i} විකාශනය <msg> වෙත පිළිතුරු දෙන්න>'\n    දත්ත සමුදායේ සියලුම කතාබස් වලට පිළිතුරු දුන් පණිවිඩය යවන්න.\n\n• `{i} fore <msg> වෙත පිළිතුරු දෙන්න>\n     දත්ත සමුදායේ ඇති සියලුම කතාබස් වෙත පණිවිඩය යොමු කරන්න.\n\n• `{i} ලැයිස්තු කැන්චනල්ස්`\n    සියලුම අමතර කතාබස් ලැයිස්තුවක් ලබා ගැනීම සඳහා."
