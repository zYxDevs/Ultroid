help_channelhacks: "🔹 `{i} shift <from From Channel> |<à canal> `\n     Cela transférera tous les anciens post du canal A au canal B.\n      (vous pouvez également utiliser le nom d'utilisateur ou l'ID de canal)\n      Exemple: `{i} shift @abc |@ xyz`\n      [Remarque - Ce signe ('|') est nessesary]\n\n🔹 Pour la publication / transfert automatique de tous les nouveaux messages de n'importe quel canal source vers n'importe quel canal de destination.\n\n   `{i} asource <nom d'utilisateur de chaîne ou id>`\n      Ce canal source ajoute à la base de données\n   `{i} dsource <nom d'utilisateur de la chaîne ou id>`\n      Cela supprime les canaux source de la base de données\n   `{i} listSource <nom d'utilisateur de la chaîne ou id>`\n      Afficher la liste des canaux source\n\n\n   `{i} Adest <nom d'utilisateur de la chaîne ou id>`\n      Cela ajoute vos canaux à la base de données\n   `{i} ddest <nom d'utilisateur de chaîne ou id>`\n      Cela supprime vos canaux de la base de données\n   `{i} listDest <nom d'utilisateur de chaîne ou id>`\n      Afficher la liste de vos canaux\n\n   «Vous pouvez définir de nombreux canaux dans la base de données»\n   'Pour activer l'auto-post, utilisez `{i} setdb autopost true`'"
