help_fedutils: "-\n\n• `{i} superfban <Répondre à user / userId / username>`\n    Fban la personne dans tous les autorités fédérales dans lesquelles vous êtes administrateur.\n\n• `{i} SuperUnfban <Répondre à l'utilisateur / userId / nom d'utilisateur>`\n    Non-fban la personne dans tous les autorités fédérales dans lesquelles vous êtes administrateur.\n\nSpécifiez le groupe FBAN et les fédéraux pour exclure l'assistant.\n\n• `{i} fstat <nom d'utilisateur / id / réponse à l'utilisateur>`\n    Collectez les statistiques nourries de la personne à Rose.\n\n• `{i} FedInfo <(fedid)>`\n    Collectez les informations de fédération de l'ID Fed donné, ou de la Fed que vous possédez, de Rose."
