help_admintools: "-\n\n• `.promote <Répondre à l'utilisateur / userId / nom d'utilisateur>`\n• `.Demote`\n    Promouvoir / rétrograder l'utilisateur dans le chat.\n\n• `.Ban <Répondre à l'utilisateur / userId / username> <siash>`\n• «.unban»\n    Interdisez / Unban l'utilisateur du chat.\n\n• `.Kick <Répondre à user / userId / username> <siash>`\n    Lancez l'utilisateur du chat.\n\n• `.pin <Répondre au message>`\n    Épingler le message dans le chat\n• `.tpin <ime> <message de broche temporaire>`\n• `.Unpin (tout) <Répondre au message>`\n    UNU les messages dans le chat.\n\n• `.Pinned`\n   Obtenez un message épinglé dans le chat actuel.\n• `.Listpinned`\n   Obtenez tous les messages épinglés dans le chat actuel\n\n• `.Autodelete <24h / 7d / 1m / off>`\n   Activez Auto Supprimer les messages dans le chat.\n\n• `.Purge <Répondre au message>`\n    Purgez tous les messages du message répondu.\n\n• `.purgeme <Répondre au message>`\n    Purgez uniquement vos messages à partir du message répondu.\n\n• `.purgeall`\n    Supprimez tous les msgs de l'utilisateur répondu."
help_specialtools: "-\n\n• `{i} wspr <nom d'utilisateur>`\n    Envoyer un message secret ..\n\n• `{i} q <couloir-option>`\n• `{i} q @ nom d'utilisateur`\n• `{i} q r <couloir-option>`\n• `{i} q count`:` plusieurs citations`\n    Créer des citations ..\n\n• `{i} autocollant <wery>`\n    Rechercher des autocollants selon votre souhait.\n\n• `{i} getAudio <Répondre à un audio>`\n    Téléchargez l'audio pour mettre votre vidéo / gif souhaitée.\n\n• `{i} addaudio <Répondre à la vidéo / gif>`\n    Il mettra l'audio ci-dessus sur la vidéo / GIF répondu.\n\n• `{i} dob <date de naissance>`\n    Mettez uniquement au format DD / MM / YY (par exemple .dob 01/01/1999).\n\n• `{i} wall <query>`\n    Recherchez du fond d'écran HD selon votre souhait."
